遠啝蒲可反直騫上脣呼之慧均梁武啝胡果反胡訛反信行按字有禍音此故舊云婆婆新云索訶訶是直音禍是拗音也諸梵文中此類極多切宜思擇奢字舍下反音近舍可反字記奢上短大日經全雅大悉曇宗睿寶月慧遠玄應奢上如初阿難陀奢舒蝦反慧均梁武奢梵音沙涅槃文字信行捨上金剛頂文殊問大莊嚴義淨大師釋義捨尺也反全真爍傷我反續刊定記賒吉藏南本涅槃沙字沙下反音近沙可反一音府下反字記沙上短大日經大莊嚴南本涅槃吉藏全雅慧遠涅槃文字沙舒加反應依吳音慧均梁武灑上金剛頂文殊問大悉曇義淨宗睿大師釋義灑上屈舌寶月灑上如次阿難陀灑霜賈反全真屣使我反續刊定記娑字娑下反音近娑可反字記娑上短大日經金剛頂文殊問大莊嚴南本涅槃玄應吉藏慧遠全雅寶月義淨續刊定記宗睿大師釋義娑索嗟反梵音以娑字上聲呼涅槃文字娑上如初阿難陀娑舒可反慧均梁武娑蘇舸反北經作沙字信行薩大悉曇縒桑可反全真訶字許下反音近許可反一本音賀字記訶上短大日經南本涅槃義淨訶上聲喉鳴寶月訶壑珂反梵音同涅槃文字呵呼舸反慧均梁武呵呼荷反呼佐反信行呵大莊嚴吉藏慧遠玄應賀何馱反全真賀上如次阿難陀賀上金剛頂文殊問續刊定記大悉曇宗睿全雅大師釋義濫字力陷反音近郎紺反字記藍義淨輪上宗曰魯吽二合宗睿稜全雅叉字楚下反音近楚可反字記叉義淨叉楚我反續刊定記吃灑二合上短大日經金剛頂文殊問全真乞灑大師釋義乞叉大悉曇乞叉上如次阿難陀乞叉上急呼宗睿葛叉全雅寶月差大莊嚴荼音荼梵音朗取訶字相連急呼云訶朗涅槃文字慧遠荼南經作囉力破反又來家反信行荼盧爾反慧均羅南經注來家反此經作荼遠云矩玄應羅來家反南本涅槃吉藏梁武矩慧遠問字二合何一音呼叉耶羅荼矩等音又如何答初叉音倒反則反叉音也次矩音直讀則音是通第五點云矩也羅音荼音則叉荼羅四音相同故也盧爾反邐借音音則羅音第三轉也乞叉葛叉則連聲軌則也右九字曰超聲除字故九字也超聲解見前涅槃文字吉藏慧遠信行法寶宗睿玄應但玄應除二字歸根本聲全真滿口五音具足灌頂吸氣梁武三三相隨聲野囉羅初重三聲和奢沙次重三聲娑呵荼後重三聲信行三釋餘義者問五句中三音各存一句二句同音相雙如何答各一句彰紐聲法相並示雙聲式亦復應知舌喉二聲殊鄰近故問字及字具衆多音其故如何答一切音聲皆因舌成於舌內音中是舌本是舌中是舌末以此三音俱時呼之即成音應知字別周舌內通遍三內遍口字故本具多音誠是由也又字形三角而火大種也心藏主火舌又心條言語心之標心正則語合理心狂則辭不整心形上尖三角舌亦鋒鋭又字字相是則塵垢火燒諸物成塵飛揚煩惱塵垢唯心所作理雖本淨言生則黷又字字義一切諸法離塵垢義火燒塵穢變成淨白灰除煩惱垢因一心智火轉捨迷妄依佛語宣示云形云義字即火即心即舌即言理在絶言是故字具多音也乃至此字具諸字音如上字下明矣次字有多音則此字主涅槃理理能攝持諸法此字一切作業字歸本性鈍字涅槃翻云圓寂圓滿諸法寂靜安住之義具多種音其義可知況復後後必具前前究到佛地圓備衆德聲字即本地法身以之思之問答釋深細心霧頓銷但猶有疑若以音遍舌及亙三內為具衆音之由則字亦同何不具衆音耶答儞之所難實有其理今答有縱奪縱答者字亦應具多音而今不出者舉初例後耳奪答者字音雖同字義不同又非火大種子故不可例同字具足衆德也三合辨者麼多體文合為十四音是有多義且出三五初開善義者十二麼多中止取十字除後謂是餘聲故更取等四音攝置十二字之中央謂長汚字下也是為十四字記引之二莊嚴復解者十二麼多為六音五五五句相隨為五音為一音為一遲音為一疾音是為十四三冶城云前兩兩相隨有六次五五相隨有五後三三相隨有三合成十四四貞觀寺解者十四音者等十二第十一字更加引點為第十三第十二字更加引點為第十四五慈覺説云三藏傳云五五為五九字為九合十四音等十二為韻等四字西方好文章者所加也已上藏五六信範解云為五為九此十四音攝盡諸音如前五十字圖中明矣三密鈔卷上末
