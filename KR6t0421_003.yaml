body:
  text: 三密鈔卷上末第三門之餘問前云一字收諸法若爾又有一音該諸音耶答有矣先以圖標後應解釋圖曰麁字能攝細字所攝已上五音五十字攝三十五體文十二麼多義也次以一字攝多字者五字逆次反音悉歸一字謂反反反反也乃至例之倒反成十字次於此十字中以字對餘九字反音成反音成反音成乃至反音成如此反音諸音皆悉歸入一音無有餘也字又如此倒反倒反倒反直讀也餘又準之倒反直讀五十字皆歸入一音無有餘也是一字攝多多字歸一舉一全收一多無礙深旨顯于聲字者也真言陀羅尼文字亦復如是假令如此五字中字為本體故以字對餘四字字本體故倒反倒反倒反倒反是加空點成一字然乃五字即一字一字即五字一多無二平等一味也字義復爾下應委悉故字記云總持一文理含衆德真言實義非世所知應審思擇次五天音韻者以唐朝吳漢兩音而驗知之然如陸法言切韻序云古今聲調既自有別諸家取捨亦復不同吳楚則時傷輕淺燕趙多涉重濁秦隴則平聲為入梁益則平聲似去藏五引若爾隨國逐俗音聲區別何為楷式我日本國元傳吳漢二音初金禮信來留對馬國傳於吳音舉國學之因名曰對馬音次表信公來築博多傳於漢音是曰唐音承和之末正法師來元慶之初聰法師來此二法師俱説吳漢兩音藏五并或鈔或曰吳尼法明始來誦吳音也然中天音並以漢音得呼梵音若以吳音不得梵音其南天音並以吳音得呼梵音若以漢音不得梵音唯如娜字或依漢音北天多用漢音少用吳音又五句各第五字中天呼如空點響南天北天呼如阿字響此事最要特須審詳藏五略鈔前已引之隨要重引但不出東西二天音也二別釋三初麼多音二體文音三合辨初麼多音二初通麼多二別麼多初通麼多三初辨三內二明對注三釋餘義初辨三內者十二韻中喉內舌內脣內舌內末音脣內末音二字各通三內所謂字三內者盎音喉內安音舌內唵音脣內也字三內者惡音喉內遏音舌內押音脣內也自喉出舌自舌遷脣轉生次第等總論之中具明故今不論二明對注者短阿字上聲短呼音近惡引已上字記阿上聲如正上聲之重下準同宗睿寶月阿上大日經金剛頂文殊問大莊嚴經吉藏玄應慈覺大師表上之輕難陀正上重終加入𣘨阿可反全真噁烏舸反短聲慧均梁武帝阿入呼華嚴續刊定記惡義淨噁慧遠噁烏各反梵音烏可反稍短呼涅槃經遏景祐長阿字依聲長呼字記聲者平聲也阿去引大日經金剛頂文殊問大莊嚴涅槃文字續刊定記全真大師痾義淨寄歸傳噁全雅阿烏歌反長聲慧均梁武玄應阿引如金上聲重下準之寶月宗睿阿上如聰上重下準之難陀阿長開口呼初去後平勢慈覺短伊字上聲聲近於翼反字説伊上大日金剛頂文殊問大莊嚴吉藏寶月難陀宗睿全真大師慈覺億以伊上聲稍短呼之涅槃文字品慧遠慧均梁武玄應縊入刊續定記益義淨全雅伊去大悉曇一景祐長伊字平聲字記梁武吉藏慧均玄應寶月難陀宗睿慈覺初去後平伊去引金剛頂文殊問涅槃文字品大師縊去大日經續刊定記伊大莊嚴義淨慧遠翳全雅大悉曇景祐縊伊異反全真短甌字上聲聲近屋字記塢上大日經金剛頂文殊問大悉曇釋義全真大師烏上大莊嚴經寶月烏入續刊定記郁烏久切短聲涅槃文字品慧均梁武玄應惠圓信行侑爰救切慧遠憂短吉藏屋義淨全雅于上難陀宇上宗睿短呼慈覺長甌字長呼字記烏大日經大莊嚴經義淨烏去續刊定記汚去引金剛頂文殊問寶月大悉曇釋義大師汚塢固反引牙開不開全真憂長慧遠吉藏優以烏字去聲稍長引呼涅槃文字品優烏鳩反長慧均梁武玄應信行于上難陀于引宗睿長呼慈覺短藹字去聲聲近櫻係反字記翳大日經大莊嚴經翳異計反全真翳上如美人礙口呼之寶月翳平如正平重下同如本國疫音呼之難陀𧫦上漢音宗睿㗨義淨今考㗨平聲火皆切恐應作㗨平聲煙奚切𪾼去金剛頂文殊問釋義大悉曇續刊定記全雅大師咽烏雞切長涅槃文字品玄應咽烏溪切溪字吳音慧均梁武惠圓慧遠吉藏信行衣短以本鄉音呼之慈覺長藹字近於界反字記藹大日經續刊定記義淨愛去金剛頂文殊問大莊嚴經大悉曇釋義大師愛哀蓋反引全真愛引聰音如美人礙口呼寶月愛去聰音難陀愛引正音宗睿野烏雞反慧均信行又於來切野烏禮反以愛字稍短呼涅槃文字品慧遠吉藏梁武野烏詣反惠圓謑全雅今考謑上聲下戒切哀長以本鄉音呼初阿後伊之勢慈覺短奧字去聲近汚字記汚大日經金剛頂續刊定記義淨全雅汚去引文殊問大悉曇大師釋義汚襖固反大開牙引聲全真烏屋胡反上聲稍長引呼涅槃文字品慧遠吉藏慧均梁武烏大莊嚴烏一孤反長玄應信行烏上宗睿鷗上如美人礙口呼之寶月于平難陀於短以本鄉音呼之慈覺烏平長玄應長奧字依字長呼字記今考奧字去聲烏到切古德多用字為平聲然記已注云依字長呼則奧字應去呼必矣奧去長引大日經金剛頂文殊問續刊定記大悉曇義淨全雅釋義大師宗睿奧阿告反全真奧引如美人礙口呼之寶月奧長初是阿聲後是本鄉于字聲慈覺燠大莊嚴經今考燠去聲於到切炮烏老切奧短聲涅槃文字品玄應慧遠吉藏慧均梁武奧去難陀短暗字去聲近於鑒反字記暗去大日經金剛頂文殊問大悉曇釋義全雅大師暗平難陀暗上寶月宗睿暗輕呼續刊定記暗菴紺反全真菴短義淨菴烏含切涅槃文字品慧遠吉藏梁武慧均慧圓玄應唵大莊嚴經長痾字去聲近惡字記痾重呼續刊定記痾上短玄應痾烏破反慧圓阿惡何反涅槃文字品大莊嚴全雅阿烏呵反慧均梁武慧遠吉藏阿於阿安餓烏箇三反信行阿用力出氣呼義淨阿入如本國握音呼之難陀阿短是以本鄉阿音放氣急切呼不同初短聲阿慈覺惡大日經金剛頂釋義惡引文殊問大悉曇惡阿各反全真惡入宗睿空海噁急呼惡聲如漢國正舌呼之寶月右十二麼多兩兩相隨總成六韻此之六韻各分長短字記南天六對皆前短後長義淨傳前三對同智廣後三對前長後短已上字記藏五舉義淨説空涅槃二點俱短而云用力出氣呼忽違字記叵為判決三釋餘義者此又分五初明兩兩相隨之由者凡此十二者本是五韻韻分四謂短長二與終讀二等各二此中短長短長二韻其音易知四字二韻然此四字有三種音一曰衣衣於於皆吳音借音二曰翳翳漚漚皆漢音借音三曰愛愛隩隩皆借音今字記所出三音雜呼也初翳音者衣借音是本韻音伊借音是衣所生之能生音即能所合呼音也二愛音者阿借音是祖父之音之能生也伊借音是父之音之能生也即捨子本音韻呼父及祖音也翳音攝末歸本愛音捨末就本也三漚借音音者於借音是本韻音于借音是於所生之能生音即能所合呼音也四奧音者阿借音是祖父之音之能生也于借音是父之音之能生也即捨子本音韻呼父及祖音也於借音音直呼末當分音漚借音音攝末歸本又奧音捨末就本也是則自本生及二共末自生末之又末自生末之又末故也轉生次第總論中明故不茲贅二明全半終讀異者圖曰一全讀者等韻合體文之時使全呼其韻謂合則呼全讀韻合則呼全讀韻合則呼全讀韻合則呼全讀韻合則呼全讀韻等也二半讀者韻合重字體文之時不能使全呼其韻謂合二合反鉤音反婁音合成鉤婁雖爾一箇點不能成二箇韻故上鉤音捨其于借音韻成古借音以此古加婁音成古婁也又合反計借音反禮借音合成計禮雖爾一箇點不能成二箇韻故上計音捨其伊韻成戲吳音借音此戲本末相通轉於記借音以此記加禮音呼記禮等也以下例然謂之半讀者古婁字下半婁音獨讀韻上半古音不能讀韻記禮字下半禮音獨讀韻上半記音不能讀韻故曰半讀如云二合字阿多迦嚩三合字阿勒多薩那四合字阿勒叉微釐耶五合字等加等點則唯轉最下一字不能遍轉上頭諸字皆例然矣若復遇單字體文則遍能轉之故上圖中云亦有通全讀之義也謂合反鉤韻合反雞韻合反鉤韻合反告韻等也餘準而知三終讀者二點三內空涅槃音唯響諸字最末不轉上頭諸音故曰終讀也問何如此有全半等異耶答初十麼多五韻也然此五韻五大五智而理智色心法體則遍諸字而施其用此故若合單字母則全讀之但合二三四五六重字母則不能遍讀者梵字殊彰聲字實相之深旨有聲則必有字無字則必無聲矣如二合已上字體文多重麼多唯一字即聲故唯一點畫不能生多音是故唯轉最下一字不遍上頭諸字若轉上字則不能轉下字如大悲心陀羅尼中醯利字是也或可此字第十六章中字第七轉字也先點別麼多後點通麼多此故不失通別二麼多聲也次二終讀者菩提涅槃二轉究竟果德又是理智極際此故於諸聲終必表其韻此中字去而終之音即去煩惱塵垢之本鄉往三身萬德之覺城也字入而住之音即入住涅槃不生心殿也字若呼痾則全讀之涅槃者不生不滅而不異字故也一一聲字則歷劫之談不盡一一名實則塵滴之佛無極諒有所以庶後學者即目入玄矣問字若呼痾則去聲非入而住之音入聲叵言涅槃之音如何答自宗實義雖證涅槃悟生死即涅槃之故不住理窟即能橫行三界荒原嚬呻哮吼轉大法輪名釋師子職斯之由五祕密經云於涅槃生死不染不著於無邊五趣生死廣作利樂是也又何怪其痾去聲哉字吐而終故為去往字吸而收故為入住三明順違四句者此十二中互相對望有順違俱非四句初順句者餘十麼多上更加加順而不違謂等字是也二違句者八點互相加之則互奪不成謂若字加兩點字將呼之紀則點不成將呼之俱則點不成故如此字無音非字也今世暗梵學之人私製文字或書呼龍吳音借音或書呼竟吳音借音之類太夥誠應絶倒若取龍音應是字若取竟音應是等字如爾之人不知兩重麼多法式不別順違俱非差異恣以管見信筆書了實可恐矣三俱句者第二點違等八點而順二點等也故為亦順亦違也四非句者最初字本來遍諸字衆音微細具足非違之義雖然約音非別成韻非順之義故為非順非違也四明列次所以者是亦二義一最初字是菩提心第二字是菩提行第十一字成菩提第十二字入涅槃也以斯四字安初後則示中間八字復應有四轉謂也二初後四轉準上中間八字等自第二行開出即是大悲萬行也上總論中據祕密義以八點配普文觀彌四菩薩是此門義也五明十麼多者字記云有十一麼多已上又自注云阿阿等韻生字用十摩多後字傍點名毗灑勒沙尼此云去聲非為摩多訖里章用一別摩多已上解此文自有二家一林記自至為十麼多第十二字南天去聲呼之故同最初是以不取後字傍點者字也故云去聲矣二安然自至為十麼多以第二唯長聲餘同初除之不存也兩師俱以麼多足前十為十一也此二師義以睿師為最今字記建立故也二別麼多三初辨三內二明對注三釋餘義初辨三內者此四文俱皆舌內所發也二明對注者為便捷覽以圖示焉右此對注異音糾紛代別今古土區南北漢注音韻難取準的後生知之三釋餘義者此又分四初明能説人者一吉藏涅槃疏云有解此是攝婆跋摩外道初教婆多婆呵那王何故教之舊云彼王舌強故令王誦此字已上略抄二斐家文字云或説十四音者梵天語也根本五十一已上藏二引此以四文足四十七俱為梵王所説也三藏一舉慈覺説云三藏傳寶月云頡里等四字者西方好文章者之所加也已上四此四文非梵王所説大日如來兩部大經演之釋迦文佛文殊問大涅槃兩經説之然涅槃北本如來性品南本文字品説善男子所有種種言語文字皆是佛説非外道説已上大莊嚴經示書品説悉達太子與十千童子同入學堂俱在師前同學字母然彼中唯有四十六字母除無等四文若梵王説者彼師何不知之況西域記云梵天所製四十七言彼此吻合誰得議論二明所在者一大日經金剛頂文殊問華嚴續刊定記義淨寄歸傳大悉曇字母釋義全雅悉曇章等後前安之此有添文補汚謂二字二字異形是加點為二字故云添文又二字半體是竪書之為二字似補汚字故云補汚或云此之四文若呼里等則是韻若呼嚕留等𠴊嚧等則是韻韻具如上衆音故安中間或云此之四文非遍能生故損減字下安之二全真寶月難陀宗睿麼多後體文前安之此有二由一此四文是別麼多故通麼多十二點次列之二此四文體文中字所變麼多而體文故安麼多體文中間也三大涅槃經體文終安之此四字説常住三寶是則四十七言所歸法體也常住三寶義應字義門明之故最後明之三明單復長短者藏二引澤州解云億力短伊離長二字復呼中自分長短搮短離長二字單呼中自分長短故成四音取要四問答決疑者問何此四文具如上衆音耶答凡體文中字殊有成諸字韻之用故字變成四文初億力音則阿羅二合第三轉音二乙音則億力反音合成乙音三紇哩音則字又有荷羅二合音荷羅二合第三轉即紇哩音四履梨里力等音則阿羅二合倒反故羅阿反羅也此羅第三轉則里音五盧直音及𠴊拗音音則羅第九轉六留及流二共直音音又流拗音音則羅第五轉七阿哩二合及曷利二合音不轉上半唯轉下半如是義故具足多種音也問若是字所變則須直呼本字音如囉半體何煩呼所轉音如此瑣碎耶答囉半體出自字猶是其形相似未大改變等四文字形轉變忽失其貌音亦應然此故皆呼所轉音也若約真言實義者字是火大南方大悲萬行義也至八字音則於南方字行點開出之是以字所變等四文皆呼等韻也亦復韻知等四文示聲即韻之義若呼本字音則似局于聲若呼紇里等則聲聲之轉而帶等韻故聲即韻義于茲顯了凡聲韻則一音始終韻之凝結曰聲聲之餘勢曰韻一往別之究竟同歸本無異轍因茲體文中以二字示聲即韻義餘單章建立依斯義也麼多中説此四文彰韻即聲義第十六章建立約此邊也若約深祕則聲即韻者理韻智聲一如定韻慧聲一體金聲胎韻不二色心融即而又差別即差無差無差即差即離不謬實談在斯不可不察問何以證等四文字所變耶答大師真迹字之形如此里字即字所變應知二體文音三初辨五處二明對注三釋餘義初辨五處是又分二初五句字二遍口字初辨五句字者開之則五處合之則三內圖曰五處相配五音屬當異説如斯故今具載等為牙約末為喉約本等為齒約末為齶約本等為舌約本為齗約末等為喉約本為齒約末一往似異究竟同轍右此五句二十五字又名五類聲五處各異類故又曰從內出外聲呼聲吐聲故五處次第自喉出舌脣故亦曰毗聲毗者比也隨其流類毗比一處故慧遠等涅槃疏亦復應知清濁之異有云如云哿左哆波是清音如云我坐陀馬是濁音也有云輕清重濁也有云清開齒濁籠脣也今詳如上三義固執一隅三義相兼始方獲全復次漢土韻學唯分四類清次清濁清濁梵邦字音濁分輕重是以知中土音律獨能聖語我扶桑國境雖東垂為遮那本國承魔醯苗胤故其言語逈同佛國學梵無違支那風俗澆季變更真言音韻與梵大乖而却是自非他嗤笑我音誠足笑殺如彼呼阿彌陀為也是男聲本來有而不生不滅義是女聲流注轉變生滅無常義也此故若呼為則以法身常住無量壽命抑為凡夫無常有限短壽何其謬哉餘皆例知故今以支那風陋我朝俗盲瞽之甚不可不斥問五處三內各有所表乎答五處則五部如總論中明各有五字者各具五智也三內則三部喉佛舌蓮脣金三密三部攝五部三密皆通五部故也又三部胎藏理門五部金剛智門理智不二實義彰露于茲矣二明遍口字者此之十字非如前五句字各分口處從外入內悉皆遍口故云遍口宗睿和上名曰滿口通出五處故云遍滿十二例涅槃經名曰吸氣從外入內故又曰超聲音韻不倫次故復次雖言滿口細辨非無始起之處故藏二曰野囉攞字先從喉腭舌發然後遍口嚩捨灑沙訶字先從脣齒舌腭喉發然後遍口已上右約五處若約三內齒與腭屬舌故十二例曰其後九字有三類音一喉內始音謂野賀叉也二舌內始音囉攞奢沙娑三脣內始音謂嚩字是也已上如是雖有始起別處後皆遍口歸喉內阿韻是故曰歸根本聲也全真次第記歸本不生則大涅槃故字輪品疏以等八字同字傍二點字形段已引之或圖曰二明對注者又分二初五句二遍口初明五句字對注者迦字居下反音近薑可反字記迦上短大日經金剛頂文殊問大莊嚴續刊定記難陀全雅大悉曇大師釋義迦上吳音宗睿迦漢音寶月迦居佉反上聲全真迦紀伽反梵音以歌字上聲稍輕呼之涅槃文字品慧遠吉藏迦居寫反慧均梁武惠圓迦平玄應迦居何反古牙反信行腳義淨佉字去下反音近去可反字記佉上短大日經金剛頂文殊問大師釋義佉全雅大悉曇佉墟迦反全真佉引絶音如上之重宗睿佉上聲絶音寶月佉去續刊定記佉平玄應佉上如次阿難陀佉涅槃慧遠吉藏佉欺伽反信行佉却迦反梵音可但喉中稍重聲呼之涅槃文字品呿墟迦反此迦字音故用居寫反誦慧均梁武伽字渠下反輕音音近其下反餘國有音疑可反字記伽上大莊嚴伽平重玄應伽巨迦反梵音亦伽但喉中稍輕呼之涅槃文字品慧遠吉藏伽墟迦反慧均梁武伽其阿反信行哦上短大日經誐上金剛頂文殊問大師釋