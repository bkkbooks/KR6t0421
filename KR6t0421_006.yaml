body:
  text: 三密鈔卷下金剛乘末裔淨嚴集第四合字轉聲門之餘三第十五章又名盎迦章又名異章四初示建立二明名數三列字體四問答釋義初示建立者問當章建立其相如何答斯章以等句五句各各末之第五字各加於當句前四字之上及初句末字字加後等九字之上名盎迦安遮安吒安多唵波盎耶等是其相也二明名數者問名盎迦章則準前應解名異章義如何分別答字記前段云不由韻合名為異章此文至下應悉又後段云右此章字兩字重成不得依字呼之異於諸章故云異章已上謂若如字呼之則須呼哦迦若者等然今呼盎迦安者等故非如前來諸章故名異章也已上字記二義私解約字形則以五句末字各加當句上四字等軌則異前來諸章唯以一字通加上亦加下成于一章故云異章異章之義叵悉筆墨得一知萬問當章字數又如何答字記云其必不自重唯二十九字各用阿阿等韻呼之生字三百四十有八已上此文其必不自重者簡等五字自體重謂若自重則應大呼云哦若拏那麼不得呼盎哦安若安拏安那唵麼大呼之故便屬孤合也後段字記字注云此字有自重者便屬別章則大呼拏音非盎拏也餘並同此也是也三出字體者四問答釋義者釋斯章義枝條無窮今略釋之不存次序信毫抄録希後賢者勿責疏拙問當章能合等省除其形耶答藏第八云又此章中可用其省而作盎迦安遮安吒安多唵跛盎耶等形已上如此文則諸字皆宜省能合字也今見字記文安者字注云此是字之省未言餘字推然公意準例字作此釋耶重問所合等復如何答見先哲筆迹等字多不省之餘字多省凡夫諸字省否如上四句以分別或省或否兩俱無失問當章用音三內分別依宗睿説上已聞之復別有所據乎答涅槃文字品注𠷐膳袒彈滼是其明證也問三內分別是最應爾舌內分腭齗為三所以如何答是有二由一喉舌脣三表體相用體尤微細本末叵分用最微劣初後難辨此故喉脣但存一類相是顯彰覽而可別故於舌內分本中末以為三句若具論則喉舌脣三應各分三今且就顯作是建立二凡所有聲以舌為本妙觀察智主説法德五智布身支分以之布舌諸音本故舌內具三其理可見問此章以字加遍口九字上若爾必局字乎答是亦二義一約始且出字實五字皆可加之全雅圓行等悉曇章以字通加三十四字上以成一章準例亦須以四字通加諸字之上但其音未詳若如字正音而呼則不堪為例也二唯局字九字遍口之聲從外入內其音殊親喉內便于盎音故局字也問大日經注仰壤拏曩莽五字咸屬喉內字記分為三內彼此異衢其意如何答夫亙諸法有兼有正約正則如字記所配就兼則五句各具三內如遮那經且彰其一也復次體文本位諸字皆呼正音不雜異音此故等五字同於韻短呼為本而此字兼帶入鼻聲以韻而稍涉呼韻故喉內空點頗符契也然在異章中等字攝聲歸韻而合呼等字上故隨口處相應發盎安等音三內各別呼空點是依下字緣助也林記釋當章用音云仰等字緣迦等字其音殊常恐示斯意者耶例如一字依下字三類始音呼上字三類終音故成索訶喉內薩埵舌內三婆脣內之音又如上引涅槃經於五句各第四字呼三內空點是又因下字助生其音等五字下無復字故不生其音直呼拏那麼也然乃南天中天大日經悉曇同等五字共帶字本韻而稍呼入鼻聲寶月傳等五字皆同入鼻呼是南天悉曇也表喉內空點也然至建立章段者他字合呼成連聲故三內各別稱呼其音彼此各有其理者也問如上所聞大日經以等五字為大空理皆呼空點當章建立亦用空點若爾與本韻字辨異如何答本韻字通亙三內呼其空點是空點本韻故等不爾在體文中兼麼多用故不亂五句本音而呼終讀韻故三內別呼也既在異章五句各別呼三內空點故於孤合章成三內各別連聲也此故字與等五字空點所用通別有異但等字三內空點通局如上已釋應審思擇又於點合于諸字必成空點之音至等字隨所合字空點用不未必局定委下注之問字記所立異章用音為中天軌則將亦南天耶雖上略明重詳垂示答藏第一云其字中天云曩乃朗反莽忙傍反南天云那捺可反麼莫可反若拏字中天云娘女兩反拏陀爽反南天云若而下反拏搦下反已上略抄此釋所彰南天所傳等五字唯呼響呼自不呼終讀韻空點歟字記以仰壤等注餘國音也智廣又兼學中天悉曇故就等五字同呼空點別立此一章指南其軌則歟若爾是中天相承佛説非南天祖承摩醯首羅文也已上一義一曰當章用音亦是南天也所以者何孤合章中莽迦等聯聲字異章用音為本體連合上字呼于空點當章若非以南天法而建立則孤合連聲亦不應成故是南天明矣但等五字本母用音南天中天各殊其品中天為示是帶空點在體文中直呼仰娘等音南天體文諸字通同短聲韻故等五字亦為其列呼韻也但依寶月傳五字同雖阿韻兼帶鼻音鼻音則韻也故南天所用亦鄰喉內空點而當章建立皆於能合等捨聲呼韻故生盎安等音也是故以盎迦等字若連呼餘字則上字多吐空點聲勢故不須別加圓點是為孤合章連聲字諸梵文中莽迦僧伽建紐戰拏震多𭌈娜囉遜婆漸婆難拏漫拏攞娑擔婆曩糝薄塞建娜緊娜囉盤拏商迦羅俱蘭馱唎半拏囉滿馱曩印捺囉阿囉罕跢萬跢建吒薩罔誐多出于大佛頂等是也若等字重合他句字上之時是非當章字數故其字多聲韻具足直如本字呼之於上來第六七二章二字呼哦麼哦那不呼空點又如大佛頂中云訶哩膩野上字不呼空點又大疏第五云縛岌莽立印軌云尾覲南是等皆其例也然乃等五字隨連字便於上字空點用音存沒不定重異句字呼空點者下出其例是以稍異字必成諸字空點矣南天於本母位此五字與自餘體文齊呼短聲阿韻且為示斯字別能建立異章呼彰三內空點中天為示等五字在體文中而帶空點直於本母位呼其聲勢例如體文之中加二表空涅槃點凡五天隨方用音不同故諸文各據一塗至其大旨敢不相違問等五字重異句字而呼空點請聞其例答所見寡少略出其證嗢莽娜大佛頂奔女大師胎藏梵字次第阿鼻詵左尊勝陀羅尼散祖儞帝菩提場莊嚴經建贊拏同上問上釋異章名義引字記不由韻合文未審此文意如何答合有二義一曰合字二曰契合一合字者已前一十四章皆由韻合當章不爾故曰不由何者初章以十二韻合于諸字第二至七以用舊音和清濁叵辨而類似等韻之六字合於諸字第八已下以半體合諸字上各成其章是皆由韻而合之軌則也當章異之立各別法故云不由韻合依之立名號曰異章也二契合者謂當章用音不契合本字音而異呼故名曰異章也若契本音應呼哦迦若者等今既不爾呼異韻盎安等音故云不由也韻謂本韻合謂契合以合等為由韻合其義叵成字記第五章對注用嚩字是非清音何云唯清非濁又當章能合之中存二字不由韻合釋忽招相違過豈非胡説亂道乎初義信範後義杲寶全雅悉曇章以字加三十三字上呼誐羯等聲景祐天竺字源第十一章與今異章建立維同用音大異誐葛二合倪拶二合拏哳二合等也印度呼音非一應覽思擇問字記後段文云然盎安等將讀之際潛帶其音亦不分明稱盎安也已上此意未明請示其義答捃拾及信範私鈔為釋孤合謂孤合文中莽迦等兩字聯聲不分明所呼盎安等故作此釋也當章盎迦等字若得等字連其上則呼莽迦等則尋彼盎等音潛韻莽等末不得分明也故第六或説文云或兩字聯聲文形其後聲彰其前如麼盎迦等字似云莽迦也又孤合章文云聯聲字上下盎迦後字之聲入於前字似云莽迦也用此章字皆然已孤合中云用此章字皆然應知彼文非釋異章若指異章字云不分明稱何同章文注盎字阿黨反等示應用三內連聲之切字耶明釋孤合中連聲已上信範私鈔取要杲寶師謂按記文承來然盎安等然字抑前起後也謂從右此章至故云異章釋當章合字及得名然盎安下明當章用音而信範分文別配孤合章頗背釋段鉤鎖凡當章建立等五字不分明呼仰等音潛帶其聲直呼其韻故稍異字三內不分明稱盎安唵也且為使知五處三內品類對注盎安等字恐讀之者全呼其音作將讀之際潛帶其音釋何忽至斯文示孤合聯聲乎問等五字攝聲歸韻有何所以答攝聲歸韻聲韻一體聲韻遂別不二深義淪沒不彰今殊就等五字示此軌則者理智定慧本修不二名為大空聲居根本是本有理韻響最末則修生智攝體歸用不動本有法體便則隨緣顯現之義是則兩部理智不二一如不轉肉身得證佛體之奧旨也亦復應知聲却彰末韻潛隱本攝聲歸韻卷末收本證佛智已還同凡理猶如晦夜日月合宿是大空極理又即身成佛實義理致深邃叵悉楮面惟俟可畏之扣問耳右十數條搜古師解信毫抄録猶有遺漏後生補焉次因出以當章字安下連聲之字在諸梵文中者雖是孤合章所屬當章字居下故因便附出俱囉挽覩頓膩者尾𧂐𡄦婆扇跢難膩瞋娜難儞迦頻娜緊娜㘑遮悶膩演底惹半底粗罕底巘馱散儞陵誐建跢囉鉢囉底孕㘈藍便多滿鄧曼怛羅已上大佛頂讃尼儼婆哩三滿跢滿儞多散地野滿弟漸婆娑膽婆親娜牝娜畔惹讃捺㘑戰涅㘑扇底贊膩印捺哩已上大隨求散馱羅抳尊勝那囉謹墀千手大悲心呪儼鼻㘑寶樓閣經羶帝阿僧祇已上法花跋捺囉仁王經陀羅尼軍荼利巘蕩擬金界軌阿振底也誐度難徒健達羅嚩胎軌右隨有所見梵唐對映舉似庸生冀使因對注原梵文也四第十六章亦名訖里章又四初示建立二明名數三列字體四問答釋義初示建立者字記云第十六章用迦等字體以別麼多合之謂之訖里注云今詳訖里之麼多祇是悉曇中里字也已上此章所用訖里麼多存多異義或曰字字母表一行云第十六章迦等字皆足類例麼多字已上或曰字要集記寬智云第十六章用加諸字者是沈沒字也已上問何故如是異義糾紛耶答實四字應悉用之今各彰其一邊也就中用第三字者四文中初二字復聲不音便後二字單聲音便也單中字居初故今用也問字是麼多隨一然今何以此字為字體耶答麼多體文聲韻殊別隔域異區然有體文施麼多用又有麼多帶體文功前十五章皆彰體文而通麼多其義詳上當章反前却示麼多而通體文如上縷曲聲韻不二即離不謬故諸章不相矛盾學者知之二明名數者名準上知問當章字數亦如何答是又異義分岐一字記云成字三十有四而自注或有加前麼多得成字用非遍能生且據本字言之已上二字母表云此章加點唯行畫是故字數六十八已上三藏八注文云正使通麼多上加別麼多只成四字之聲謂初二後二聲也已上東記第二釋近斯義矣初義同表意也四藏八注中第二釋云若使別麼多上加通麼多只成十字之聲謂初二後八聲也已上初二兩義字數見上第三義者生字一百三十有六第四義者生字三百四十也今據字記列其字數矣初二等聲至下具明三列字體者字記或義云或有加前麼多得成字用已上今隨有所見注三五字後賢冀補四問答釋義者問上字下答釋云里字有聲有韻舉體皆韻舉體皆聲其義猶未審詳請為啓沃答前所言是麁論門耳若細尋則將云先已有聲此聲與上音合成訖音次此而無間有里聲故云舉而韻舉而聲又云合成訖音也問若據表意加引點則其音如何答唯長呼訖里爾今仰測祖意應是既有短聲字何無長聲耶之義也若探深意則等是諸法當體加字是涅槃真空寂滅之理也至山河草木等塵本來具此真理是字母位等也凡夫始遇此教聞此玄談如第一等萬行圓極無可復增之位本有妙理顯現分明如第二等理趣釋經説阿引字義云本來寂靜如虛空豈非修顯已了歸本理大空耶以此義故釋此章加點唯行畫也問表云第十六章迦等字皆足類例麼多字而今何云涅槃妙理耶答四文俱字所變等八字同字傍二點字縱雖類例義豈遮涅槃理乎又涅槃有四種何簡類例況復理理無數恆沙非喻乎哉此教所談非世所知豈應以常理而難耶問四字何必呼此音耶答雖上卷粗明今重詳之夫等四字以字為體字三內合呼諸音具足故以字呼麼多音而麼多中兩字全成體文字韻故無加顯音等八字其音加顯八字之中最居首故呼其韻其中初二兩字呼加客音謂體文初後二字取其所轉音紇音加呼之彰字具足諸音也三四一雙直呼字第二轉音就中第三短聲第四長聲字本是上聲短呼第三字殊相符本音此故字記用第三字也且又字形相同唯橫竪異耳問藏第八釋成初二後二聲者如何答等字先加通麼多合成音次加別麼多合成訖里音是第一轉也又先通麼多合成引聲音次別麼多合成引聲音是第二轉也是之二字長短有別故自成異音不成乃至八轉者若使合則成音次合則成音是與初用音無別若又合成音合成音是與第二用音無殊是故第三第四其聲不成若又合成音合成音是與初同音也又合成音合成音是與第二同音也是故第五第六其聲不成第七乃至第十亦復如是然則第三轉至第十轉其音不成唯存初二聲也次言後二聲者合成音合成音是第十一轉也合成音合成音是第十二轉也二點諸字終讀故必呼彰之是稱後二聲矣雖然此釋猶似未快所以者何字上短合上字必成短聲已字在下成反切何忽成引聲乎又空涅槃二點既屬上字成韻必由下字字唯帶韻無空涅槃音豈能成空涅槃韻耶然公所立定有所由識者擇焉問藏第八云初二後八聲如何成音耶答若使先以別麼多加之後以通麼多點之成初二後八聲也謂合成音合成音是為初二聲矣次後八聲者若其第三第四兩轉合成音合成音是則與初二兩轉其音不別故不別立唯立第五已下八轉為後八聲所謂合成音合成音合成音合成音合成音合成音合成音合成音是為後八聲也問後八聲其義應爾初二聲者合成訖里音此義叵信既以為韻應成迦羅音豈生訖里音耶合成訖里引音同有斯難奈何通之答字合者應呼迦羅今欲彰字本來韻是以呼迦羅第三轉音呼之訖里耳況復聲順諸音而不違拒故雖合韻猶呼訖里合又準之可見問初二後八聲者為是正義將如何答此之一義乍聞似是熟思難信何則等六點加字互奪不成若合點也音是韻故若將呼點韻不成又欲呼點韻不成也合等亦復如是二點音不違逆然則正應云先加別麼多後加通麼多唯成初二後二聲也今測然公意恐見諸梵文中有等字知有後八聲耶縱使雖然理未極成似不的當是故字記言非遍能生若簡取就精據字記唯舉本字或取表云唯加行畫藏八并東記亦存同之之義矣問等與相違義誠應然二點加最順何舍不取答非是以違逆若加二點而呼之則唯成訖里訖里引二音全是初二聲無別加顯音故不取也問字在下上字必呼韻不答如上所注訶栗鉢哩蘖哩等是上字呼本音諸梵文中不必局定但字記中上字必呼韻看其對注知其用韻耳問當章用音必帶涅槃點耶答不必局之上所出底哩地哩毗里等漢注其例非少字記亦出齒里注也問若或有不立訖里章耶答藏四云此約十二音而作此別章若約十六音應無別章所以者何義淨或為十六音韻以億力等四字加三十四字下彼中自有等四字故然而義淨字母為第一章單字字記第一章也為第二章故亦十八章也已上雖然如此何妨別立訖里一章乎所以者何如藏所出初二後八聲於點者雖無加顯自餘聲韻無有混濫然何不別立乎五第十七章又四初示建立二明名數三列字體四問答釋義初示建立者字記云第十七章用迦等字體參互加之有三十三字隨文受稱謂阿索迦等已上大凡前十七章名生字章亦名正章於其中前十六章與第十七章對比論之略有五異一前十六章能合所合守次不亂第十七章所合守次能合不爾或以遍口令冠五句或以喉聲而加牙聲百變千化不測其故二前十六章或咸二合或舉三合章章必有分齊第十七章二合乃至六合一章之中無有定限三前十六章能所不亂上中下位阿索迦章能所上下都不定準四前十六章三十四體文各成字體第十七合為一字故母字成三十三也五前十六章隨形成音第十七章雖無其形而呼其音諸字之始呼阿音是也雖有五由所合字母必守其次若不守次分屬孤合故也二明名數者阿索迦章之名準上而解問當章字數又幾乎答當章合為一及除重故母字三十有三生字三百九十有六三列字體者當章所生字用音一一反切準第二章知之故不煩注表云諦諦施施冠牙四支業如塵成第五又智慧輪悉曇章第十二翻牙句第三第四字也又天竺字源捺𠱥二合已上若梵本有異歟問牙聲第五字呼盎迦怛羅然則應同第十五章用音耶答此有多義一云此字正可呼阿哦迦怛羅然初二點呼盎迦怛羅雖同第十五章用音旨趣聊別歟謂異章中攝聲歸韻沒誐音而連合下生喉內空點故呼盎音也當章中諸字通帶音故初發其韻然合字連帶而呼之故沒哦音直呼其韻合呼下字云盎迦其音與異章同也二云信範私抄當章連合字多是耎密自音成他連聲也但如盎迦恆羅字者麁顯口內連聲也其外有穩便有不穩便又有不連合是則顯以前諸章并諸梵文有耎密麁顯連不連法軌也已上此義為連聲今左右音注各示一邊爾表云言言言言冠齒四但生一字居智上已上就之二字無異義下三字若第三生不可得字足智字之次第也若第五智字使冠生不可得字則如今所出也此中阿嚩遮字下字分三內則舌內字故上字對注縛字從口是則轉舌字從口作故以之使知呼舌內涅槃點也信範鈔云齒聲第一耎密口內連聲文此或本用縛字故云應呼喉內涅槃點也又智慧輪悉曇章并天竺字源齒聲第一第二兩字作也佛哲常曉智慧輪般若多羅悉曇章等以字合三十四字下各生十二字以成一章其中齒聲第三字當段所出字也智廣師不別立此一章攝屬阿索迦章其意應尋思矣表云鈍鈍施施鈍五字此如次第冠舌五或作此中字與下字連呼成涅槃點連聲故以入聲瑟字為對注也字不爾直呼本音故以拖為對注但字濁音拖字次清音也頗不符合或本以陀為對注此本宜歟智慧輪本舌聲第三第四如此是以字為能合異今字記佛哲圓行智慧輪般若多羅等本以字加諸字下各生十二字然字記意不別立此章於當章中唯出一字未詳其故等字諸梵文中多不呼阿音謂瑟吒瑟恥瑟𪘜瑟覻瑟抳等也但云塢瑟抳是呼阿第三轉也或有呼上字點為塢也表云諦諦言言戴喉四塵如諦名混第五當章字悉首呼阿韻故字首點其音與第八已下章同也又字若屬舌內意者上連呼應有阿剌音也今呼阿勒以字屬喉聲意乎又天竺字源第十二翻云羅怛薩那四合已上以點加左頭角而不呼阿音也表云諦諦施施戴脣四塵業鈍我四第五第五字若依表意四字合成如上若依字記三字合成也問三合字在前第十三章中何今重出乎答第十三章以第六章為字體故隨本章不除之今章是以迦等諸字交互重之故自有同前章非可怪猜也凡按當章合字之法實不應隔前來諸章字故為其準的且出此字乎創學十一表云離塵離作鈍言乘離垢業鈍言染乘如是二七十四字對譯字數合五合六作二字已上字記意初字四合次字五合也表以為二合字故云合五合六也又天竺字源第十章云囉剎麼哩耶已上此以換又以半體加左頭角而不呼阿音也藏四云或有隔字而通韻者阿勒叉微耶第一通第五韻第三隔字通第三韻阿勒叉微釐耶第一孤通第五韻第三四字連通第三韻也且據此式亦斟酌之云何斟酌縱令四五合中若見上來二三合中通韻諸字則依前式隨以呼之且如阿勒叉微耶字其初囉字須前阿勒之音呼其嚩耶字須前尾耶之音呼之又如阿勒叉微釐耶字其嚩羅字是前尾羅之音其囉耶字亦前哩也之音故今尾羅哩也連聲自成微釐耶音以連阿勒乞叉呼阿勒乞叉微釐耶非必囉有塢點嚩有伊點囉有伊點呼曰阿勒叉微釐耶如呼此字他皆倣此已上略抄諸梵文中斯例太多切須著意表云性相真如如作言上字二合下三合若例得迦索迦等字則下字於上應呼連聲歟創學十一表云慢慢諦言添後四但合沙賀除重覽已上問合者為所合為能合乎將為所合為能合乎若如初者則失位若如後者則失位字母失位體文成孤應非生字之章如何答此之合字頗異恆例今按二義一為所合是能合為所合是能合是之二義同時具足無有前後然乃二難自然拱手二如餘合字所合本位不動如主能合自外來加如客今此字俱在本位鄰次合成莫論主客不應更論能合所合矣問若出鄰次合之準的餘字亦應爾何殊合二字耶答通有二答若奪答者縱合餘字又有此難何偏難合乎又縱答者大凡重字大有兩種一當體重二異體重異體重中又有遠近近者鄰次重遠者反之兩字本在體文示於自重遠重規矩雖爾未明鄰次重之軌則今合字以示其例也殊合者梵王説體文之日在字母終示自重遠重例也已上創學抄四若依一義者當章合字之法參互重之應有隔字而合是有順逆或隨字母次而合之異今為示順次合規式合二字也捃拾抄下凡探合字本意為示多字攝一實義故呼其音亦應連促急呼故字記云重文讀之連促呼之然正章通例字源守次不亂其位故在當章能合參差所合無亂然而為示本字互融之理示鄰次重留意思之問特合別有深意耶答字諦義即法爾之理法性本體字因義即緣生之法修顯末用今合之示本修體用理智色體心用胎體理本色金用智末心兩部二而不二也理奧詞遠審察造妙四問答釋義者問字記第十一或釋云或有其聲而無其形此即阿索迦章等字字則無阿讀之皆帶其音也已上已無形何呼其音乎答大日疏十九百字成就持誦品云然此迦義釋作百字即明阿字義也如迦字若上不置橫畫即不成迦字聲所以不成者以迦中闕阿聲也此迦字上頭即有阿形當知此百字皆爾下例可解若無阿聲在中即不開口亦自無有聲也已上此意諸字初一點是字故不可言無阿形也然無其形者謂無字別體也藏四問若爾者諸字應通呼阿音何當章獨然乎答大疏第十七阿闍梨真實智品云一切真言者即阿字也以一切言音皆從此字為首若無此阿聲即離一切之語無有可説當知但開口出聲即是阿字之聲也上文俄若拏那麼並上聲雖云離阿聲然阿有內外若外聲雖無然不得離阿字內聲內聲者即謂喉中阿聲也已上如此釋則讀諸字或約外聲直呼阿聲當章建立是也或約內聲不呼外聲餘章建立是也問字記第十或釋云或有所成而異其名謂數字重成一字而其下必正呼中上連合短呼之不必正其音如上娑下迦稱阿索迦等也已上此意如何答連合急呼阿索故阿索二音各如半音故云不必正音也然捃拾中云開口出聲即是阿字聲故唯呼索迦不可稱阿索迦矣但至當章注阿聲者為顯諸字有聲者忽乖記釋不足依用必是謬解上娑下迦之注也又用此入聲索字之所以者顯連聲意下字有喉聲宗睿牙聲智廣之兩傳若依喉聲義則上字呼喉內涅槃點故應呼索蘇各切也若依牙聲傳則牙舌內攝故上字讀舌內涅槃點呼颯也而密攝涅槃音不分明呼之故如云阿沙迦矣但常呼云阿蘇迦則阿沙並是體聲故相連不音便也若呼阿蘇則連合有便故也問高尾口訣云據漢字二合三合乃至五合字但將梵字極四合字不登五六合字也已上是與表合五合六釋互相矛盾如何和會答表合五合六約兩字此兩字共冠履兩半體類點畫故高雄口訣不為字體而為三合四合字故云極四合字也雖類麼多實是字體故字母表云合五合六也然則兩文似異實歸一塗矣問餘字且置最初字戴字有何所表答表云第十七章互字相依理難覺更作頌已上古聖已云其理難覺今愚何輒但依一義者者本理者緣生作業智故合者理智不二玄極亦復應知是聖觀音大悲是十一面大悲悲故有説是曰言教今欲彰言教極故合以置章始也二孤合章者即第十八章是亦有三一明建立二釋名數三出字體初明建立者凡諸合字或單字字源守次皆悉為正章其餘字源不次或字無其形而呼其音或三五麼多字等或當體重等或聯聲字等或兩重麼多字或半體文等或印文字如此諸字衆類非一集以建立是其相也二釋名數者問何義名孤合耶答或不加麼多體文孤合謂等字也是據字記第三或釋也或雖生十二字源不次單孤之字謂等也是據字記第四或釋也或不生十二本來單孤之字等如此諸字合集成章故名孤合也問當章字數又幾何耶答此章字數約實無盡故表云此外無盡無盡字猶攝第十八章字已上若據字記所載如下出之又據捃拾鈔并信範私鈔等各存其數委如下載又藏有義皆至下悉之三出字體者且先據字記出見在字次據諸師略載梗概此字有多種音注烏𤙖集經呼𤙖大佛頂虎𤙖蘇悉地經戶含略出經𤙖要略念誦經大日經疏大妙金剛經金胎字記詬十住心論吽特牛合口聲呼之羂索經問此字古來呼如云字反音樣如何答此有數義一形音義第三云字者字加點可云俱或可云戶此加空點可云俱牟二字借音或可云戶牟二字借音今直云吽者何耶略出經云戶含二合蘇悉地經云虎𤙖二合大佛頂經云呼吽二合豈非正音云戶吽二合耶然陀羅尼集經云烏𤙖二合者汚戶二音相通故可云戶𤙖一合而云烏𤙖二合歟如小野可云古乃二字借音而人云於乃二字借音小關可云古世幾三字借音而人云於世幾三字借音又正可云俱牟二合然云宇牟二字借音者宇俱二音相通故歟日本可云和良久津四字借音然云和良宇津四字借音可云之太久津四字借音而云之太宇津四字借音此其例之已上今按明覺意字若反音反為俱借音此加空點成俱牟二字借音今呼云借音是宇俱相通義也宇俱相通則相通也相通者就字義頗有深意又即攝聲歸韻也本末不二一體實義二藏四云其吽字或云呼吽且唐吽字玉篇云吽呼垢反去牛反或真言注云牛鳴聲也故據師承世皆云吽不開口呼之若就單字言之講是喉內聲捍是舌內聲唅是脣內聲今約二麼多字言之呼應和音是喉內聲呼恩是舌內聲呼吽是脣內聲今者合三內聲直呼云吽已上此意三內空點一音合呼云牟借音是則示字諸音具足終極聲勢長宴大原僧都云東寺讀俱牟山門云牟已上又或云小野讀宇牟廣澤呼牟已上兩俱不爾東寺諸流皆以通用宇牟與牟之二音也問二音對比孰是輸贏答二音俱相承祕音叵輒優降初宇牟音是君借音末音麼多體文聲勢顯了又宇喉內牟脣內中兼舌內三內分明喻如修顯佛德也次直呼牟非唯收俱宇二音攝密三內空點而呼該羅衆音無漏無脫所以者何字本性極源故一切開口之始字因緣最末故牟音則諸聲合脣之終也所謂衆音總分三內則喉本舌中脣末末脣之中又有三類謂和本跛中摩末最末摩音又有三轉則摩本是脣中之喉彌中是脣中之舌牟末是脣中之脣故以牟音為一切聲之最末也凡法彰極還歸本際字本體字因緣即是有也點損減即是空也圓點大空不生中道又字因緣故非空因緣故非有是則中道點是空圓點是字吾我增益是有與字有表德空遮情不生遮表不二無二無別復次二字出入息風即是一切衆生性德本具自證字又字化他字又字也恆沙萬德莫不包括斯二音兩字也是吐聲權輿一心舒遍彌綸法界也是吸聲條末卷縮塵剎攝藏一念也一團三內空點以為字分析字為三內點開喉聲字為五十字卷于五十字歸一字也字是毗盧遮那字則金剛薩埵也又是菩提心為因是萬行損減惡法是方便為究竟果三句法門總歸字一一深義不能縷述尋決知之凡兩重麼多字諸梵文中其例太多今且舉少以例其多如左已上字記所載若藏所出自外居多字也如左次聯聲字準第六或釋所出麼盎迦三合字可有二十九箇三十三字今略出其梗概約實三十四箇二十九字也下具注之右聯聲字有三十四科二十九字藏云二十九箇三十三字似猶未快於中除自重大呼字二十九故存九百五十七字石記意亦爾今考諸梵文中此例太多謂澀比尸奢瑟鉢𡅏瑟波殿訖怛㘑訖底得乞灑答半悉怛利野訖唧訶拏乞瑟拏澀箆吉悉蘇佉澀茗跛囉藍吒播囉拏如此之類不遑毛舉是二字者以本韻字加字母上藏四云雖非兩重麼多兼合之字而以孤合章十或説中亦無彼文猶屬此中已上然公所立其據未詳又字所據如何今例此第五字更有第五字金剛手字蓮華尊字文殊字已上四字大疏二十例之諸尊種子字皆應存第五字也但是於字母加二麼多矣又更有五轉二字此是宗極祕要難可容易又大悉曇章終文有字也是例字然公云應各存五轉三科理尤可然是長韻如何長短各存五耶次有闕首橫一畫下加怛達畫之字凡三十四箇字記第十三或釋云或字有所闕即首橫畫則加怛達之文而音掣呼之掣尺制切王弼云滯隔不進也又自注云如迦佉等字下有達畫則云秸吉八反稧苦八反等也已上故帶畫之字必半音呼半音者如入聲也藏第四云又隨求真言中有阿半音準例十二韻字皆可或闕字聲云云今見諸真言中此半音字或注其字或不注之觀音儀軌云阿魯里迦半音蘇悉地經云爾囊職而翼反阿路力嚩日囉特勒又諸皆唯云㧊已上㧊普活切問何故不注字字耶答形音義第三云半體字音者智廣云如迦佉等字下有畫則云秸吉八反稧苦八反等也此文未得意然私見諸文云發云力云職云苾云挽定知此等半體字直成上字終響故以此云半音字也凡字上橫畫皆是形也今半體字省此形故無阿響但成半音也字津阿二字借音音也今字省首形下加畫故直成津借音音也與相合呼云發也字久阿二字借音音也今省形加畫故直成久借音音也與相連云力也一切例之已上此釋精微不可不知問用音應爾字形何如答林記云哆達之體如一字右頭稍細已上捃拾云問多達之文與烏點有何異乎答山記云怛達小鉤烏字大鉤已上問加此文於諸字其處有定乎答東記云或梵文中加悉曇麼多字作阿半音等形或梵文中斛字作形勿字作形此等雖非半音之字猶是可攝孤合之文已上或鈔云字或作字或作或作形已上此意畫為字省也涅槃點異形有形省之作形也若為字異形者字中點是其形也右據藏意出孤合字體了都一千二百八十字也是猶舉綱示目耳次依捃拾出當章字者聯聲字九百五十七字如前所出自重字六十六字除二字自餘三十三字各有自重用皆加引點故成六十六也半體字七十字體文三十五字各成半體皆加引點故成七十字也五字各生十二合六十字兩重麼多字三十四字除字餘皆有兩重麼多用故三五麼多字一字右合一千三百二十二字也是又撮其樞要未盡自餘次據信範義者聯聲字九百五十七字當體重字三字前來章除之屬于孤合自重字及字母中自重字通計一十五字謂第二章第三及第八章第四章第五章第六及第十五第七及第十五第九第十一第十二第十三第十四第十五第十五第十五字母中當體重孤合文五字各生十二合六十字兩重麼多文三字印文一字半體文二字連聲字一字三五麼多字一字右計一千一百四十三字是又舉要右字記舉少餘家出多似有異途皆歸一致語厥要則所漏正章之字不論全半單重悉入此章此故無盡無盡譬如衆水投海萬珍共有是當章之大綱也冀諸梵學得意忘筌二定章數者一云表金剛頂一十八會一切言説皆字功德故金剛頂經云我本無有言但為利益説已上上句字字義自證言説本有言故無有緣生之言是為言説不可得義下句字字相當體即言故大日釋迦為衆生説劫初梵王為世間製法爾自性一十八章隨緣流傳故一云一十八則表胎九尊金九會也字母表云二九十八悉曇章五相五輪觀行字已上五相則金剛九會諸尊無非種三尊之觀行五輪則胎藏八葉九尊悉具字印形之性相是故以二九章段彰凝然衆德普門塵數諸三昧遠離因果兩界則本有因果而非緣起之因果法然具建立斯梵章開示諸未悟也故表云一見法曼荼頓人字門入於蓮花門胎往生密嚴土金若就梵天表色界十八梵初二三禪各有三天第四禪有九天故復約生身表對治十八界初二義深祕三四義淺略如是義故以一十八章為梵章中最既定章數訖三明生起者是又分三初約聲韻反切軌則此一約音二約流轉還滅二門三唯約還滅一門後二就字義初約聲韻反切軌則者初章正彰聲體文韻麼多和合軌則第二至第七六章揀取清濁叵辨相似等韻之六字如次各加諸字之下擬于聲諸字韻等加於字下不加其上準直讀故次後七章前七章字上通加半體是擬倒反次第十五章分五處三內彰麁顯耎密異上來軌則故立異章名次第十六章以字加諸字下是翻前等字體文而有麼多用顯字本是麼多而有體文義次第十七章對前來諸章而立焉謂上諸章各以一類字而合成也今章諸字參互合成是故當正章終建斯軌則合字之法于茲窮矣次第十八章非如已前諸章定于字體使生十二以前來章所漏之諸字聚集而建立一章也二約流轉還滅二門者但約前十四章先初章明因聲緣韻和合萬法成立之軌則此故衆生成立之始流轉生死之原無出于茲也第二章衆生乘業受果義故加諸字下以乘字第三章加字者染著六塵境界之義字塵染義第四章加字者取著諸法之相也字相義第五章加字者取相故起言説之義字言説義第六章加字則戲論言説之上計吾我之義字我義第七章加字則計我故執名相也字名義已上七章皆就流轉門而立焉次第八已下七章皆加半體者以字智火燒如上妄執也惑智必待對故所斷已七則能斷亦七也第十五已下應準第三義也三唯約還滅一門者初章因緣所生法位如上第二章為至所詣先乘寶乘也第三章乘寶乘故離妄想塵垢也第四章離妄執故諸相皆空第五章諸相空已言語道斷第六章言語道斷處如太虛空第七章空名又亡是為絶空字名不可得而大空義故也已上七章寂滅空故空病未痊是故後七章前七章字上加字此字南方自證三點圓滿理智色心迷悟人法不二一如故於差別諸法不取不捨不取捨故空執頓亡是為空不空不二大空三昧前七顯乘遮情分域後七密教表德奧旨次第十五章明字不生中道大空故以五字冠各句字上彰五智真實大空義也次第十六章用字者字是沈沒義上章大空義是菩提今章沈沒是入涅槃如次二轉妙果也是要集記義以字為沈沒字也次第十七章諸字皆帶音是不生又是生義也上入涅槃不生義已成矣雖然不生而生故入涅槃後以大悲方便現隨類變化身化衆生界也次第十八章自證化他已滿足故萬德集會遍一切身故名孤合復次萬德合集故此章字類流派無盡也私解此義則約五方五轉也謂初章中央本有在纒理身第二及第七東方智故遮遣為用後七章南方火大理智不二位第十五菩提大空故西方也第十六涅槃北方第十七還同本覺冥會在纒衆生故能隨機變化是方便為究竟位也第十八五轉已圓滿故衆德具足是橫平等遍一切身也上五轉竪次第故本有修生橫竪生佛無量法門攝盡此一十八章也宜乎諸梵章中獨斯為正也三密鈔卷下上終
