body:
  text: 三密鈔卷上金剛乘末裔淨嚴集今將明此梵字略述八門一梵字本源門二悉曇題目門三本字形音門四合字轉聲門五重字混聲門六聯聲合呼門七音韻相通門八字相字義門第一梵字本源門初梵字本源者粗辨三段初明法爾常恆體二釋隨緣相承別三辨淺略深祕異初明法爾常恆體者大毗盧遮那經第二具緣真言品云祕密主此真言相非一切諸佛所作不令他作亦不隨喜何以故以是諸法法如是故若諸如來出現若諸如來不出諸法法爾如是住謂諸真言真言法爾故已上同經疏七云以如來身語意畢竟等故此真言相聲字皆常常故不流無有變易法爾如是非造作所成若可造成即是生法法若有生則可破壞四相遷流無常無我何得名為真實語耶是故佛不自作不令他作設令有能作之人亦不隨喜是故此真言相若佛出興於世若不出世若已説若未説若現説法住法位性相常住是故名必定印衆聖道同即此大悲漫荼羅一切真言一一真言之相皆法爾如是故重言之也已上法爾法體者即是六大法身謂言字體則五種形方圓三角半月團形色黃白赤黑青語聲韻則阿等音響談義趣則法性五大不生離言離塵離因等空等也即識大所了是故大日疏七云復次如來一一三昧門聲字實相有佛無佛法如是故即是故不流即是如來本地法身已上開口發聲一一言語體全法身故信修之者成就世間一切願證獲出世無上果故大毗盧遮那經與上同品云真言三昧門圓滿一切願所謂諸如來不可思議果乃至是第一真實諸佛所開示若知此法教當得諸悉地已上雖然如是必待修成愼勿執自然成故同經疏七云且如阿字門無生妙慧一切衆生等共有之但以不自證知故如貧女伏藏不能得其勢力發行時如方便開發入證時如寶藏現前爾時隨意受用所求必獲已上而復於修有淺觀有深修淺觀但信唯成世間願望深解觀達頓證無上悉地故同疏又云然此悉曇字母幼童皆亦誦持至於護摩供養等韋陀世仙亦皆共作而今此真言門所以獨成祕密者以真實義所加持耳若但口誦真言而不思惟其義字義句義只可成世間義利豈得成金剛體性乎故偈云最勝真實聲真言門語密之體也真言字形真言相實相即字義也行者諦思惟得成不壞句已上句者行迹止息處也不壞句者安住金剛心殿也如上諸文於真言行最為緊要應知二釋隨緣相承別者夫法爾之法必隨緣而彰故大日疏七云為欲以此法身遍施衆生故還以自在神力加持如是法爾聲字故此聲字即是諸佛加持之身此加持身即能普作隨類之身無所不在當知加持聲字亦復如是種子字即是佛菩薩身也是故行者但一心諦緣觀此聲字自當見佛加持身若見加持身即見本地法身法爾即隨緣故不動本地體即加持身也若見本地法身時即是行者自身行者色心實相即理智法身故故此一一字門即是如來不思議果不從別處來也已上疏文隨緣相承且有四別初梵王相承者劫初成時摩醯首羅即商羯羅初禪梵王與毗𮇼劍和合生子名婆藍摩略云梵彼有四面説四婆陀又云吠陀又云圍陀此曰明並是世法後面所説名阿闥婆陀即聲明也後人更造六論解四婆陀其一名毗伽羅論新云毗阿羯喇拏此云聲明記論廣記諸法能詮即解阿闥婆陀也西方重此聲論經十二年乃有通解非初學者之所能解常騰法花論注婆藍摩亦曰造書天三兄弟作三行書梵王造左行梵書伽婁仙人造右行伽書最弟蒼頡造下行篆書藏一所言梵王所説者根本四十七言也謂十二麼多三十五體文合字轉聲有無盡字且立一十八章以為標準字記智廣云南天祖承摩醯首羅之文是也又義淨南海寄歸傳云悉曇總有一十八章則中天所用又十八章也藏一今取彼傳要云一創學悉談章亦名悉地囉窣覩此云成就吉祥章根本四十九字展轉成一十八章總有一萬餘字合三百餘頌一頌四句一句八字都以三十二字而為一頌相傳是大自在天之所説也六歲童子六月學了二蘇咀囉一切聲明根本經也此云略詮略詮要義一千頌昔北天竺健馱羅國婆羅覩邏邑婆羅門波儞尼仙為大自在天之所加被所造八歲童子八月誦了三馱覩章一千頌專明字元四三棄攞章棄攞是荒梗之義譬如田夫創開疇畎也三章各一千頌一頞瑟吒馱覩明七例曉十羅聲述二九韻二文荼合成字體三塢拏地大同前例廣略為異此三荒章十歲童子三年勤學方解其義五苾栗底蘇咀囉即釋前蘇咀囉上古作釋其類實多於中妙者有十八千頌中天竺那爛陀寺學士闍耶昳底之所造十五童子五年方解六朱儞釋苾栗底蘇咀囉二萬四千頌學士鉢顛杜攞之所造明經學此三年方了七伐㨖呵利論釋前朱儞二萬五千頌大學士伐㨖呵利之所造八薄迦論敘聖教量及比量義本頌七百釋七千頌作者同上九萆拏窮天地之奧祕極人理之精華本頌三千伐㨖呵利之所造釋一萬四千頌法護論師之所製斯等諸書法俗通學已上寄歸傳略抄唯識樞要上末云劫初梵王創造一百萬頌次帝釋略為一十萬頌次迦多沒羅仙又略為一萬二千頌次波膩尼仙又略為八千頌上四論總名處所復有聲明論三百頌略本頌一千頌八界論八百頌名因緣聞釋迦論一千五百頌溫那地論二千五百頌此五並名根裁二龍宮相承者釋尊滅後初五百年小乘教興諸大乘經皆移龍宮後五百年大乘教興龍猛菩薩入海取經所傳字記中天兼以龍宮文者是也藏一三釋迦所説者文殊問經五十字母成道初七日華嚴經中善財知識善知衆藝童子説四十二字第二七日説唐譯經七十六卷方廣大莊嚴經示書品説悉達太子示入學堂創唱四十六字母第三七日大集經海慧菩薩品第十卷説二十八字門句第十六年大般若經中亦説四十二字等語等三十年中大涅槃經亦説一十四音五十字義八十年終佛滅度後文殊彌勒與阿難等結集傳世藏一四大日相承者大日如來金剛頂瑜伽經中有釋字母品説五十字四十七字中除字加等四文大日經具緣真言品及字輪品説五十字金剛薩埵結集龍猛菩薩入南天鐵塔誦傳流通中天龍樹龍智善無畏金剛智不空真諦義淨一行難陀全真宗睿慈恩慧果全雅大師慈覺智證東天僧睿慧均日照三藏南天智廣寶月青龍寺寶思惟大師傳教慈覺西天北天健馱邏國喜多迦文胡地慧遠傳牟尼三藏胡地十二章根本五十二字大日五十字加二字亦為三十六章三辨淺略深祕異者一淺略釋謂造書天作梵字者是也二深祕釋釋迦如來諸經中説字義者是也三祕中深祕釋大日尊兩部大經中説諸字門皆入不可得又説百字為頭光等十二為舉身光等是也四祕祕中深祕釋是此聲字即是如來本地法身故亙三世而常恆遍十方以不改者是也不改法爾常法而全隨緣顯現故前三釋皆收此位前引疏文見加持身即見本地法身即是行者自身者其指之耳弘法大師所謂我口輪出一一文字皆金色佛理觀啓白亦是非唯是佛字是地字是水火風空識準知字是天字是人字是修羅字是獸字是鬼字即地獄復次字即一切聲聞字即一切緣覺字字字等直是諸大菩薩字字等又即諸佛復次自心能成十界故字字即是諸趣有情乃至字字各攝諸法無所不收無所不盡此是奧府佛乘肝膽切誡勿淺解而誤也問儞之所立四釋何異然公所立藏一耶答然公以造書天造梵字為第一以三兄弟各造一書為初二孰是淺深故吾不取又以楞伽本住法等為最彼拘顯網故執無相真理我探祕藏故貴事法本有何足怪矣第二悉曇題目門中天成就吉祥翻云成就吉祥章南天歸命一切智成就此中一切智者即能説梵王也或云文字即一切智也自宗實義法即人故字義云四種曼荼即是真佛已上成就者能成就義趣乃至成就萬德佛果故復次二字悲智一體理智兩部不二等深義不遑毛舉今且出一二者觀音字愛著義即觀音化他大悲也點根本義即大悲為根義也又字三諦義點自在義於三諦理得自在則觀音自證妙智也復次二字合解以大悲方便施與法界是觀音三昧蓮華部三諦理故若合解者觀音文殊共蓮花部即法曼荼羅也字者法門身故也悲觀音故理蓮花部故又三諦故胎理故涅槃字呼入聲是涅槃音故文殊字施與不可得即不取空也不捨有也義有空不二也字法界不可得義是則有空不二又不著中道法界是文殊自證大智也故加大空點又施與法界大空果德是文殊大悲後得智用也金剛部大空法界智故若合釋者字於三諦得自在是則大智力故二字共金剛部也智文殊故智金剛部故又大空法界故金智故菩提字呼大空點菩提音故第三正字形音門梵也字也南天中天三正字形音者是有二門初示字形二出音韻初示字形又有三門初摩多二體文三孤合半體初摩多又分二門初通摩多後別摩多南天悉曇不説別摩多也初通麼多者普加諸章字故名通通有一十二字通中又二初十是別無互相加故二字是通通加上諸點之上故復次通十二又二初全體二半體一全體摩多此云點畫或云韻二半體合諸字用之次別麼多又云紇里四文中天悉曇以加第十六章為四文中字此有異義一行字母表為字智廣字記為字也大日釋迦共字次説斯四文梵王不説二體文又二初全體二半體初全體又二初五句二遍口初五句字異名等至下出已上且就等五字明大空義若據實通論則五句二十五字皆大空義也五五二十五字表五部各具五智故五智皆契會阿字不生大空故大日疏字輪品十四曰仰壤拏曩莽亦有五字即同上頭之點也已上二遍口字異名等至下出此中一字大日金剛頂文殊問涅槃大莊嚴等經不説之也此字於字母中頓示異體重軌則以出二字重字之法盡矣猶字有連聲界畔義亦有多種異音至下詳悉問諸字皆應重當體疊異字而殊重字纍有別所以耶答賴寶東寺寶嚴院鈔云字是當體重當體重必大呼大呼義遍口聲最勝遍口聲中初二二字有成麼多之義麼多自重非常重字軌則故閣之至第三字重之也字取二字三十五體文疊帖五五之時是始行初是終行初也故尤取之也取要悉曇十二例安然第五下字連成上字音例云疑云濫是攞字重體叉是迦灑一合何故梵王安之字母之中今云濫是合字之式法叉乃連聲之軌模標合字則舉終顯始舉第十八章自體之重以示前十七章他字之合標連聲則舉始字顯終所以梵王元製以為準的今體文中自有迦沙而以最初之迦字更合末後之沙字欲示一切字母皆有連聲之合法先標喉內之聲字欲顯脣內之聲影示舌內之聲既知內喉聲外脣內自得中間舌內所以梵王元製以為準的已上略抄次界畔義者大師真迹字母本此字加書涅槃點要集記引又全雅手書悉曇章又同如上引是則擬前麼多中字為涅槃點也此故以二字為菩薩涅槃字是曰界畔義也問二字為二轉妙果定有深義冀聞之矣答字重相字上加涅槃點也夫凡夫著諸法實有相外道執實我相二乘保但空化城顯諸大乘拘二空真如是皆著有無斷常二相不得字不生中道是為重字而以不生知見證不二平等大空有無一體有無二相頓盡疾證菩提故加大空點也次字作業性鈍重成大日疏七云自性鈍者即是極無分別心不愚不智無識無智無妄無覺乃至一切諸法不能動搖等文字是世出世善惡染淨一切諸作業也若悟如是作業非始起法本來有則釋摩訶衍論云今始起德本來有故一概本不生本來不生今又不滅不生不滅是大涅槃又是自性鈍此涅槃理含藏諸法無所不盡此故字為盡義食義金剛頂大集等此等字義玄微叵了留意思察耳復次遍口十中等八字皆主涅槃點故大日疏字輪品十四云其也囉等八字即同字傍之二點是除之義也除即遠離遠離即字義也又八字則胎藏理界八葉四智四行也相配一一有旨次體文半體重成之時字合上則省字下合下省上頭三孤合半體有形無音問此等半體文彼彼用之頗有深意耶答梵字悉曇一一聲字即是實相今之諸字何無其義今為揚㩳初字根本義故以安文初二字吾我義有我見則自他差別此故以安句絶處三字施與義一章功德回施衆生故以安章終也二字菩提涅槃二轉妙果究竟極際故安一部終準界畔義思之畫加無命點之字還生法身慧命故雖存異義以本不生不滅為最殊勝諍論義鬪諍必欲滅他故以滅字點之下不至本字橫畫影像義影像則必如似本質故以等為疊字重句也問梵字重纍何異漢文總以一字代多字耶答本質有礙影必無礙喻如萬花影都集在一處更不質礙故能以一文代多字也此等義猶是字相淺略若就字義有無量深密義須者更問二出音韻二初總論二別釋初總論者原夫玄理沖漠畢彰于色像實性幽邃全驗於聲響達觀者即宮商而曉其實癡暗屬外丹青而求其玄歷塵劫以少到遇空亭而頓駕誠有所以乎哉是以法帝加持指厥旨歸梵王弘宣示茲聲字言字也則五句八字十二麼多之文綺分語聲也則五音四聲十二律呂之調派別四聲者鳴于四序應于四方形于四轉也一平聲者平謂不偏哀而安之聲春陽氣起於東德澤不偏發生萬物則是初發自他平等之心也二上聲者上謂上升勵而舉之聲夏陽氣溢於南草木茂盛炎熾如火則是大勤勇行使菩提樹王漸次滋繁也三去聲者去謂去逝清而遠之聲秋陽氣衰耗于西霜凝木落去根離本是則去無明濁穢之本鄉徂菩提淨妙之樂土也四入聲者入謂收入直而促之聲入而止也冬主北方陽氣收盡天地閉藏萬物僉收是即入住涅槃之理窟也四季四方四轉配屬了矣又此四者於無情物也生住異滅遷流之四相於有心族也生老病死變壞之四苦也寓物探賾隨事釣玄靡不該括五音者體於五行形于五方顯於五色本乎五大五智也乃至五常五藏五味五受五根五處五氣五聲五戒莫不貫攝且以圖示此多依藏第二角角舌落故為牙角者氣動耀也故為春甲謂萬物孚甲乙謂物蟠屈有節欲出故甲乙為春草木發生故為木曲直木性作酸尚書酸者達生五味得酸乃達故屬木青則木之色春象也眼者肝之使肝象木色青有枝葉八葉目能出淚不能納物木亦能出枝葉不能內也仁者好生故能不殺為東方春陽第八賴耶無記不隔善惡含容一切故喻鏡一時能浮萬象豈非仁能含蓄乎木即空精鏡明如空不空三藏傳地則萬物能生之本春仁是圓鏡智最初菩提心發心也無畏三藏傳團是空輪方則地大各配一義阿閦此云不動圓鏡發心堅固不動如大地似金剛故為金剛部仁者不動故樂山也迦諸聲之本故安字母始春也發生始故故或云喉聲唐宗睿也亦春蠢也萬物蠢生也徴舌拄齒故為齒徴止也陽度極也故為夏丙謂其物炳明丁者強也故丙丁為夏盛陽承動故為火炎上火性作苦尚書苦者長養五味須苦可以養故屬火赤則火之色夏象也舌者心之候心火之精色赤而鋭三角舌能別五味轉衆語是火光照明諸物也禮別尊卑辨自他故不邪淫為南方火德第七末那恆計內我能異彼此此識轉時平等知見平等性智茲窮豈非禮則貴賤分明上和下睦夫唱婦隨彼此不背耶南方尊陽在上卑陰在下為禮火能焚燒萬物無偏無頗平等性智故也純陽普長一切平等修行故為火兩三藏傳全同寶生佛心內萬德無缺現證如火遍照似寶珠能滿諸願故為摩尼部者舌本之聲是心藏而火也今別云齒聲聲自喉之舌故安次是之次第非佛所作非梵王所作法爾列次勿謂作為亦夏玄駕切假也假大也萬物假大也宮舌中音即喉宮者中也土王四季各十八日合九十日為一時土所以王四季何木非土不生火非土不榮金非土不成水非土不高土扶微助衰歷成其道木火金水戊識茂也物皆茂盛己起也象抑屈其起之形也萬物藏詘歸土屈曲包容之象也故象腹圓曲人腹中央也又己紀也皆有定形可紀識也土形者之最也本也故戊己為土又為中也稼穡土者稼穡之本作甘尚書中央者中和也故甘五味以甘為主故屬土黃則土之色四色得黃而增色四方離中則不立故為中為土身之肉皆屬脾土故能周一身也土尚任養萬物生物無私信之至也信申也相申束使不相違故不妄言第九菴摩羅此云無垢自性淨心是為法萬法界差別體性猶如地為諸法本源不空義也此約本有胎藏又如空出過萬象無畏義也此約修生金剛而又諸法所依二師之義果是落一方則地圓則空各據一邊摩訶毗盧遮那此云大日除暗遍明空大修生金界光無生滅地大本有胎藏諸位最頂空義諸佛總體地義名為如來部吒舌中之聲三內喉舌脣之中為舌中之中中故安五句中央也又則中臺遮那也商開口而張即腭商者章也物成熟可章度也秋萬物熟又商傷也金氣遒徑傷殘萬物故為秋音庚更也物變更也又庚堅強貌金氣辛陰始成也又辛新也物初新者皆收成也又金剛味辛辛痛即泣出是肅殺之意故庚辛為秋秋揫也物揫斂乃成熟又秋之為言愁也秋心為愁亡也草木凋落金能殺也從革金性作辛尚書辛者能殺傷五味遇辛乃委殺故配金白則金色秋天清明是金色也鼻者肺之使風冒肺則鼻液先出肺象金色白三葉半月形即風形也鼻出入氣高而有竅山亦有金石纍積亦有孔穴出雲布雨以潤天下義者宜也斷決可否得宜成事分別自他故不盜竊第六是意分別事識妙觀察智五眼高臨邪正不謬金之斷割也金則風精入秋風怒風之成物則世界本依風輪而住身中風能成人胎也秋之成熟風之壞物則秋氣夷戮也佛智能滅無明亦能成菩提果不空義水色白水能照衆象明了無錯妙觀察故也金剛頂説我見自心形如月輪虛圓白者水是圓白也無畏義半月是風圓形是水配二師義阿彌陀此云無量壽息風則壽之本體佛智慧命永劫不盡自證果後大悲與生界無竭化他亦翻云無量光佛慧光照無量白之至也又翻甘露王風水和合能起音聲自在宣説衆生得嘗法味能愈煩惱之病喻之甘露金斷割之水潤澤之配前二義舌音聲之根語言之本多舌末之音故為説法智又在舌中聲次也羽撮口聚即脣羽之為言舒也言萬物始孳又羽宇也物聚藏宇覆之也故為冬冬終也萬物終藏冬古終字壬妊也陰陽交而物懷妊癸揆也揆度而生故壬癸為冬陰氣凝閉氷雪交至故為水潤下水性作鹹尚書鹹出于海豈不是水耶鹹堅萬物五味得鹹乃堅故屬水北方之人袵金革死而不厭勇悍堅強水為之也水能潤物攝持使堅堅故能浮三億二萬金輪而不陷也黑則堅色水之象也鐵堅則黑潭水深積則黑冥海名於玄也耳者腎之候腎衰而耳聾腎象水其色黑又主潟水故陰竅尿道為之候智者進止無所疑惑又不滯吉凶水亦進止應節又能隨方圓也又智者不狂故不飮酒眼耳鼻舌身五識能緣前塵成辦諸事遍緣五識緣五境外境盡矣水遍至用能作智用能作二利是名成所作智釋迦名能仁能化衆生成就利他牟尼名寂默三業常寂成就自利故又曰不空成就水又自體澄淨能滌外物右不空義風有能殺能成二德斷惑證理之極名為涅槃風大黑色北方之神玄冥佛日既隱涅槃山故其色黑風是命息以合涅槃常住無有變易之壽命右無畏義波是脣音聲之極末故安最後句亦合終極涅槃也已上類通五法無量無邊且出塵涓餘例應知又非唯不盡事亦不盡理若吐露胸襟則恐人勞披讀如豫井蛙小見猶然況夫玄覽宇宙吞納沙界者乎誠以第一實際非局色聲者之所了又非離言象之所應求若聲若字舉體不生冀諸後進務了諸法本有不生不取不捨則自然現證法界若言第一義諦無佛無衆生無有文字別求意味則是唯解佛權巧未知元意所以者何若外文字者則是有捨有捨之者必又有取若以有取捨為真人則十方諸佛同音證明悉是魔説我何點頭若求教證者大論云為不知名字相初習行著者不知他意者故説無衆生是方便説為知名字相久習行不著知他意者故説言有衆生是約佛本意若説總持無文字又言文字性離即是解脫是為不知名字實相著文字者耳而強執不立文字呵佛罵祖則非啻瞎却學人慧眼未下語前已失自眼了也亦招剜眼拔舌之報有日在矣但為己見未達不能觀機徒自空腹破檀呵戒廢置讀誦不信士女下載順風帆滿腹謂得一快競奔就之猶如群蟻之慕腥羶逐彼腐爛何知聚蛾之投爝火喪其軀命是以密嚴經云寧起有見如須彌不起空見如芥子已上中論觀行品頌云大聖説空法為離諸見故若復見有空諸佛所不化釋青目云譬如有病須服藥治若藥復為病則不可治如火從薪出以水可滅若從水生為用何滅法説可解摩訶止觀天台第十云夫聽學人誦得名相齊文作解心眼不開全無理觀據文者生如無證者死右斥誦文法師夫習禪人唯尚理觀觸處心融暗於名相一句不識誦文者守株情通者妙悟右破暗證癡禪兩家互闕論評皆失雙非教禪若見解無滯名字又諳以見解問他意無窮盡如曲射繞鳥飛走失路若解釋難問綽有餘工如射大虛箭去無礙當知非由學成必是見發右論兩具禪源都序宗密云且達磨受法天竺躬至中華見此方學人多未得法唯以名教為解事相為行欲令知月不在指法是我心故但以心傳心不立文字顯宗要也破執故有斯言非離文字説解脫也故教授得意頻讃金剛楞伽云此二經是我心要今時弟子彼此迷源修心者以經論為別宗講説者以禪門為異法已上今者學教癡人局滯名句習定暗者破斥言教俱皆不免佛祖呵責者也前引諸文顯教破黯證禪者證也今密教意大異常途所談天台所言唯諳名句耳吾宗所立文字三密中語密此語密中又具三密謂形身音語義意也四曼中法曼而是法性法爾之聲字本來本有之言象也不動言文即是平等法身如上引疏不轉色聲即是全身舍利出寶篋印經及末法一字呪經此故誦之則速轉重業障念之則頓開佛知見從一文字通徹法界以一義趣貫攝諸法是豈唯諳之言句亦葛藤之文字耶又如五字門者萬德基本諸法根源也三種悉地儀軌云山島大地從字出生河海萬流從字出生金玉珠寶日月星辰火珠光明從字出生五穀萬果衆花開敷因字結成秀香美人人畜長養顏色滋味端正相貌福德富貴從字莊嚴已上非唯如此諸字門各成諸法大毗盧遮那經云一切諸法本不生故現字形諸法遠離造作故本有故無可造現字形乃至一切法離因故本有故離因緣現字形祕密主觀是乃至三十二大人相等皆從此中出等文略抄欽告可畏請鑒上來文證知一切諸法悉歸一字不離解脫現作聲字耳問若聲字全是實相者漢土篆隸倭那俗字蠻言夷語龍吟虎嘯亦是聲字應皆實相何獨局梵字作斯談耶答儞之所言尤有其理但是二門一本有平等門謂一切聲字直是實際大日疏云至論真言法教應遍一切隨方諸趣名言但以如來出世之迹始于天竺傳法者且約梵文作一途明義耳已上二修生差別門大師祕藏記云梵字從本有理起漢字從妄想起所以梵字正漢字邪已上時處軌云所説觀諸字皆瞻於梵字非是隨方文已上若約本有平等則雖塵塵皆是若分別是非是則修生顯得故梵字正通實相漢字邪乖真理若得此意則疏家高祖各據一義不應偏執勿存取捨矣問所言平等差別如次聖凡二見乎答大論之則爾佛悟平等衆生局差別故細辨之不然佛若不知差別則不能説諸法衆生若不解平等則言三平等句法門為未來末世衆生佛豈妄語耶又若本有無差別應修生無差別若修生無平等平等之言教因何而存應知兩存乃是偏取則非我先所言了本不生不取不捨則有現證菩提之日者是也若就實義世諦即第一義諦故一塵一法皆從本際片言隻字直是法性非彼膠固文句之法師揆却聲字之禪流所跂望也今世間有瞎禪徒剃髮染衣才關道流禪床上瞪眼便道我證悟了與釋迦老師都無異路昔增上慢人有少分證今未得謂得未嘗有證所謂大妄居首者也又道斥相指心以呵罵佛祖謗譏教法為己任也夫佛法心耶非心耶若即心者不應謗罵若外存心是則非心況復蔑佛像詬教文未曾詈君王謾公矦笑密印侮祕言遂未擲敕詔汚綸命敬喜慢恚親愛疏憎所謂但見眼前利何知地獄火者也惡在其斥相指心也復有一等緇侶託以參詩如參禪而其實也泥醉篇辭黏黐詩賦一生沈吟至死不厝惡得詩禪一致之旨也又何合不立文字之大言耶若得詩禪一致何亦不教禪一般也讐教與詩廢戒興定我未為公道人焉庾哉夫沈湎章句與欣樂經教孰利孰害珍玩棒喝與觀行印呪誰輸誰贏冀後智人自擇而居本朝無住和尚悲諸家木之弊而有言曰土律僧麁真言禪我不對營於麁人復不結社于土木唯悲損害之多耳我未見拘律行密而有大損多見奔波麁禪撥無因果蘖栽阿鼻發起上慢賺殺癡人故覼縷云云永嘉曰欲不招無間業莫謗如來正法輪炳戒在汝不可不顧次十二律者律均布也均布節氣故曰律也六律六呂以配十二月陽曰律陰曰呂呂旅也陰氣旅助陽氣也十一月律黃鍾黃中和色鍾動陽動黃泉下動養萬物也十二月律大呂呂拒陽氣欲出陰氣旅抑拒難之也正月律太蔟蔟湊萬物始大湊地而出二月律夾鍾夾謂孚甲萬物孚甲種類分也三月律姑洗姑故洗鮮萬物去故就新莫不鮮明四月律仲呂陽氣極將微故復中拒之五月律蕤賓蕤下賓敬陽上極陰始敬六月律林鍾林衆萬物成種類衆七月律夷則夷傷則法物始傷被刑法八月律南呂南任陽尚在任生薺麥故陰拒之也九月律無射射終物隨陽終當復隨陰始無有終十月律應鍾萬物應陽動而下藏是亦例上四時所表可知亦十二者應麼多數也次十二麼多者若依世聲明一切音韻不過喉舌脣三內所發三內各有本末分為六韻每韻短長開為十二若祕釋者據世法則十二月十二支十二支神名出大集十二時十二宮人身十二經絡等也據出世則菩薩佛果十二地也又流轉十二因緣也又就真言門者胎藏四智四三昧祕密八印功德也所以者何初後四悉是男聲智慧字果德表示故為四佛因行證入義全彰聲字故為四方四轉伊伊引等八字皆是女聲三昧字因德表示故為四菩薩果總因別以別攝總故以四阿布初後伊等八字安其中間四佛果故各居四方正位是中德也菩薩因故各住隅角擬于脅士隅兩際共會故有持兩端之義故各合二為一則八德混成四菩薩然乃十二麼多則八葉四智四行佛菩薩也又胎藏十二真言王金剛界十二供養并十二大天等皆此門表識也如是一一聲字各各具無盡德請勿拘執一隅棄置三隅而已問前云一切音韻不出三內所發其故如何答此問至要今當略述凡一切音聲不過五十字等五十字音盡攝十四音五韻也九聲也合為十四十四音收五韻十二麼多五韻為體後當具述五韻總三內所發也謂是喉內舌內脣內也尚究而論則五韻統收一音諸法皆歸本不生際諸音悉基之一音衆形畢攝字方形衆德僉總毗盧遮那是則聲字即實相人法一體實義也留心思之五韻三內十四音五十字能生所生分別并十三直拗等且圖示童蒙圖曰圖中以本邦假字示之者為使童蒙而易解也下去準知此中第一橫行十字皆聲也各為下四字為本體若約麼多者為下十一字之本體也故配父配男配慧配因因緣之因十中初字復遍等九字為韻此故云聲韻一體聲韻不分則本有不變義即聲即韻聲韻歷然則修生隨緣義本修不二法爾隨緣一如深義於字音分明顯現留意思之四唯韻非聲者字為下等九字為韻字為下等九字為韻二字如此準知故為母為女為定為緣也喻如世父母和合生子聲韻和合生諸字門是則因緣和合能生諸法之理全彰于時此五十字中五韻等九字聲十四音為根本生餘乃至三十六音也故此三十六音注聲韻和合所生復此三十六音中所生中二音所生中四音已上六音同本韻也畢竟以能生十四所生三十四十四音盡攝梵漢一切音也又十四音中五韻攝十麼多麼多開長短五韻合立二點通冠聲韻等等故不取之等九攝體文三十四字除如上注之是則體文分輕重清濁等故成多字等不分輕重清濁等以同類音統收一音故但九種也問以三為喉舌唇以二為末舌末脣如何答凡論一切音聲生處喉中有風名憂陀那此云內風此風與外風和合必入臍輪鼓乎胃海胃海者腎水也腎二命門胃海次第觸臍心喉頂腭舌脣七處發生言語雖然微細別之就增相論不無其異此故存五處表五部五智三內表三部異也問若諸音皆觸七處而出者何強分三內等乎答雖諸音皆觸七處據勝為論七處舉成是為喉內七處舉成是為舌內等也初字者開口最初即有聲不假舌脣但從喉出故為喉內次聲觸舌之時自成韻故為舌內次又轉觸脣之時自成韻故為脣內是從內出外次第自本有位修生出現之義彰于聲字亦是佛喉不二蓮舌理金脣智三部約胎藏韻則麼多胎藏故出現次第也復次必自生是則呼最初微隱帶音故能生本音所生末音也是以為末舌也次必自生是故呼最初微隱帶音然乃能生本音所生末音也是以為末脣也當知麁論門雖為末音細論日末不離本實惟本末俱時本修不離實義在斯不可不察右此五韻雖展轉相生次第出現猶是微隱柔軟聲故各遍橫行餘九字中為韻也亦一字上轉起故約竪行為喉聲也問自餘竪九行中為喉為舌為脣為喉舌為喉脣又為牙為齒如何答初為喉聲者喉內聲麁顯而生之時即成聲故為喉聲麼多始安字體文始安字細麁俱喉聲唯以麁細為異故也相通準而思之就字義有深義次四音皆觸舌成聲韻中音雖觸舌成彼微隱也此麁顯也此故有異此中舌本舌中舌末兼喉遍舌故以此四為舌也次二音先合脣後生音生音此中脣輕脣重也其相易解次為喉舌者是所生也呼必最初微隱帶音若不呼則音不成然是舌內帶之音故喉內兼舌喉二成故為喉舌下本韻拗音有音即是次為喉脣者呼自最初微隱帶音若不呼則音不成然是脣內帶之音故喉內兼脣喉二成故為喉脣下本韻拗音有音即是次為牙聲者音雖喉聲必以舌拄牙出音故為牙聲是則約本為喉約末為牙得意而解次為齒聲者音雖舌聲必以舌拄齒出音故為齒聲明覺又云開脣合齒自齒間初發聲漸開齒後究聲故為齒聲林記是則約本為舌約末為齒熟思知之又為牙齒則五十字分于五處之義邊也若分于五處則喉舌牙齒脣也又以三為脣內則脣末脣中脣本也此以單屬脣也此時又以單屬喉也問二行注云通本末為母何耶答二音為橫行十字之為母謂合為合為是為本韻之為母也又合為合為又合為合為又合為合為又合為合為又合為合為又合為合為又合為合為此中為自自作自釋摩訶衍論云自自作自無他力故又合為合為又合為合為是又自自作自已上九為末聲為母也次二音為橫行十字之為母謂為為是為本韻之為母也又為為已下例然乃至為是又自自作自為乃至為為是又自自作自已上為所生字之為母次二音為橫行十字之為母謂為為是為本韻之為母也又為為乃至為為乃至為為已上為所生字之為母也次二音又為橫行十字之為母謂為為是為本韻之為母也又為為乃至為為乃至為為已上為所生字之為母也次二音又為橫行十字之為母謂為為是為本韻之為母也又為為乃至為為乃至為為已上為所生字之為母也如此二行十字遍本末諸字為母此中母義者約助緣也謂如為親因故如父疏緣故如母又如為親因故如父疏緣故如母已下準知又如為自即父母父母也已下準知又如為上自作父下自作母父母如前自餘諸字如上準知如是等等十字遍于諸字為助緣故又曰鹽梅音是猶鹽與梅能入諸食遍助其味故也又云鹽味字也尚書説命下曰若作和羹爾惟鹽梅已上又是曰第二為母第三為母第二為母者五字為下則必以等橫行十字為上是則字所生故也是為第二為母也第三為母者五字為下則必以等橫行十字為上是則字所生故也是為第三為母也又此分內戚父親外戚母親之二類謂如為是為之內戚也之四音皆音父也轉生故猶兄猶弟故為內戚也是音轉生故非父一類猶他種族雖然等九音皆帶音有親眤義非父族而又親則喻之母族故曰外戚也雖然如此是猶定名目一邊義門也以通而論應言橫為親竪為疏也復上所出有橫竪無盡義門或子孫成父謂如所生故如子所生故如孫成又是攝末歸本義修生皆收本有義也或子弟成父謂所生故如子喉舌故如弟成之類也或子我成我謂所生故如子成之類也或我弟成我謂喉脣故如弟為之類也或自自成自謂為為等也如是廣説父子成子子父成父兄弟成弟弟兄成兄親疏成我我疏成我等無量無數也若約真言門自自成自從本有三密上之自因生起三密之行下之自緣以之為增上緣能證三密三身身法口報意應佛果成自之自即所生法義也又父子成子本尊大悲之應父因行者機感子緣為緣擁護加被開示引攝行者則蒙應觀行成就子之成就義也前人頓證後人漸悟也如是義門不遑毛舉庶幾有識即聲悟旨見字知人而已深義更問問十三直拗者其相如何答先宜辨直拗之異直音者一音呼之謂阿伊汚等可左多那等類是也是約梵字若就漢字則東冬江支於絞微虞齊等是拗音者拗上聲巧韻於教切折也又去聲效韻切心戻也已上韻會謂二音呼之枳也之也等類是也是就梵文若於漢字則魚灰淳桓戈等也今十三者一直音等等五十字音是也十二拗音是也十二者本字四本韻四鹽梅四是也且就字者直呼可一種直音本字四拗音者第二為母第三為母第二末音第三末音四也此四以自體音安下故云本字四種也本韻四拗音者第二為母第三為母第二末音第三末音四也此四以為字本韻之字安下故云本韻四也鹽梅四者第二為母第三為母第二末音第三末音四也此四為鹽梅者前已詳矣直音直截呼之拗音紆曲呼之直音略攝呼之拗音開顯呼之為異又南天用直音故對注漢字多用吳音如迦佉伽伽等少用漢音如娜等中天用拗音故對注漢字多用漢音如迦枳字假也佉同上等少用吳音如塢等五字如空點響南天五字音如阿字響也北天多用漢音少用吳音先哲料簡曰北天多少對南天多少五句末字如阿字響又南天已下取藏第五意略明問何以第二第三為母又以第四第五為母耶答凡生一切音必自喉成一切聲必依舌脣若但喉內則成阿音更無餘音故欲成餘音或時先舌進則第二為母如云佉或時先脣進則第三為母如云過竪十行皆通第二是舌內第三是脣內也故云以第二第三為母也第四第五末音故是同但以本為正以末為兼也問何別以等等十字為鹽梅耶答是喉舌和合音是喉脣和合音也中舌音猶如本韻中音中脣音猶如本韻中音也故轉聲中有本末二音與本韻中同也轉聲中有本末二音與本韻中同也中喉之之與本韻同也此故二字合論具五韻是以如本韻三內遍諸字二行十字復遍餘諸字也此義非淺智之所能解也審諦觀察造其極底是又入字義門有深義更問問今所出圖中初竪行本字本韻無異如何答五字當體即韻故本字即本韻也問十二拗音中間有同音如字下本韻之四與鹽梅之四同音等如何答音雖同有所異是轉聲是轉聲是轉聲也故別立之餘皆準知
