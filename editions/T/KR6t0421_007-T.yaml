body:
  text: 三密鈔卷下中第五重字混聲門五重字混聲者是又分二一釋門稱二出字體初釋門稱者重字者謂重自體重異字混聲者謂大呼之也大呼者何二字同音總呼一音也二出字體者是又分二一當體重二異體重初當體重混聲者雖上已出之爲避檢尋之勞今復重明右三十四字若依藏意皆生十二以諸梵文中有枳金軌弱大師眞蹟契隨求等字也或云應唯生初二後二者有何所據哉後哲冀辨之又檢諸梵文當體重字上下加異體字而大呼之者若通計之者上異字下自重有三十三科三十四字合一千一百一十二字下異字上自重又有三十三科三十四字通數如上二類都凡二千二百二十四字也此約三合今略出其證此中沒帝等一體不絶聯聲也雖爾字已例同此故載之未見四五六合字猶俟冥搜又自重而帶兩重麼多字大樂軌有重吽字也二異體重混聲者據藏一及四五句中當句二字相重則應大呼之唯除五句各第五字爲上四字而作麼多此約異章例之遍口中同音字若重之則應大呼矣今具出其字形者右八十八字若遍口中字與五句中脣聲等五字又三字與五句中齒聲等五字又字與五句中牙聲等五字也則雖似同音不應互重而大呼之所以者何遍口字從外入内五句字從内出外似同而異故如室者字不用大呼而直呼本音也已上或擴然公之意出増分字若的依然公解則如下所引也又十二例云諸梵文或有車駄駄頗等字提地曇等字檢尋文例毎五句字上四字中各以下字隨合上字之下皆成下字之音未見當句四字之中相合以爲二合之音已上若依之者五句毎句各唯三字謂第一句第二句第三句第四句第五句若如是則當句重大呼止一十五字未云遍口字故問此當句異重混聲法必可爲定準乎答訪諸梵文并據字記難許斯義所以者何第十七章齒聲第五字注云阿社若當句異重若應大呼則字必當大呼是第三是第五口處音勢悉皆同故此已不然彼等何大呼況案其理當句五字口處雖同清一次清二濁三濁四清濁五其音大別何以應一音合呼乎若云唯第三第四同濁音故應字獨大呼者是輕濁是重濁輕重既別豈應混呼耶但諸梵文中有等字者毎有此等字多於上字註空涅槃對譯故知下二合等上半字爲上字成他音屬自連聲故唯註下半聲車馱等對譯是其意也但大佛頂陀羅尼中尾儞也馱羅喃并尾儞也駄羅斯二字似當句重大呼今按之凡梵文中多隱上字唯呼下字藏五云且如薩嚩社若或直呼薩嚩若乃至今以孃音之響密挿腭舌之間直呼云若亦皆得也已上準彼思之上所引字又沒上半字而唯呼下半字又大佛頂陀羅尼中娑引練娜羅文此字亦是沒上而呼下也然者然公所立頗難立歟難云字初屬上字而不呼其音者然公之所破也十二例云全眞相公次第記云如薩嚩字其上薩字終音含下囉字之半音如沒馱字其沒字終音含下娜字之半音西域呼之以爲半音或以迦字爲半音者非也文然半音字即是今紀第十八章怛達文是乃於迦等若加此畫則呼秸古八反等諸字皆然諸梵文中以爲半音未見沒馱之娜以爲半音之注亦無字母迦以爲半音之文故知馱字成下音非上字終含下半音已上十二例文所破旨趣此文彰灼然如之何答此釋未得其意凡下字攝於上字不呼其音然公又許之謂藏一釋云以囉半音隱娑字下故云薩嚩已上字已屬上字字屬于上字何爲不然但是爲半音者字闕下畫以合字形體既半音豈非半音耶彼雖云半體未云半音而然公既云半音字半體何不云半音乎然乃半體有二種一不從字生如怛達祇耶二從字而生諸字分其本形成半體但處處文以與云兩半體者此之兩字殊類點畫且立其名非必遮餘爲半體也全眞已云西域呼之以爲半音然公受生于東垂豈應是非西乾風範耶第六聯聲合呼門六聯聲合呼者是又分三初明相貎二列種類三廣其相初明相貎者謂二字三字聯綿之時呼所無本字之空涅槃點之音是爲其相至下悉之二列種類者大分二家一東寺大師宗睿等之所立二山門安然所立也東寺立二種連聲一二體相續二一體不絶也山門立四種連聲一第十五章聲二加他麼多聲三自音成他聲四他音屬自聲也今依藏五分科示之右都計有四十八種連聲三廣其相者問麁顯耎密其相如何答學者料揀異義非一今且依頼寶法印相傳一義者謂五句字在下而上字呼空點遍口字在下而上字呼涅槃點名之麁顯聲又五句字在下而上字呼涅槃點遍口字在下而上字呼空點曰之耎密聲所以然者五句屬吐氣而成音故元形空點八字以吸氣而成聲故本主涅槃然則毘超兩聲如次成空涅槃則正所能故顯了易知故名麁顯然實吐不孤立必依吸氣吸不獨成必頼呼息呼吸相依成出入息此故五句兼具吸勢八字密帶吐用因茲言之五八如次成涅槃及空點其傍用故微隱難知號耎密聲耎謂耎弱對于麁強密則隱密非顯露故問若然四種連聲各分顯密是皆如次五句空涅槃點八字涅槃空點配之耶答不必悉爾自音成他他音屬自二種如上所言第十五章與加他麼多二種五句八字兩倶麁顯空點耎密涅槃所以然者第十五章雖言八字毎字戴字加他麼多又雖八字字皆冠空點故約麁顯五八倶呼空點約耎密五八同主涅槃也問大疏十四釋字五點訖云如阿字者當知迦字亦五字乃至佉等凡二十字當知亦爾次有十二字謂伊上伊鄔烏嚕留盧留翳愛烏奧十二字即同字上之點謂行點也謂三昧也仰壤拏曩莽亦有五字即同上頭之點也其也囉等八字即同字傍之二點是除之義也已上依此釋唯等五字主於空點也而等等四五同主空點者厥證在何乎答涅槃經意五五爲吐聲九字爲吸聲故慧均玄義記云其三十四字中二十五字聲從内出轉至脣外九字聲從外還内吉藏涅槃疏云眞諦三藏解後九字是吸氣聲此九字從外入内故是吸氣已上兩文藏五引之五八既形吐吸氣成外内聲然則以配空涅槃點非無所據但至疏釋配立無盡不可局一得意而知問前圖分三内是又有種類乎答三内連聲各有音便不音便兩種音便者謂如下有喉内字上呼喉内空涅槃點舌内脣内亦復如是不音便者謂如下有喉内字上字呼舌内二轉或呼脣内兩種舌内脣内準之交互問第十五章聲者其相如何又此中五句八字麄顯耎密音便不音便等請具辨之答第十五章聲者第十五章字在下上連屬餘字之時生僧伽賛拏遜婆等之音是也五句八字等差別以圖示之問加他麼多聲者其相如何答然公意謂本韻麼多中大空暗字本無仰月故以仰等五字或爲仰月各加當句上四字之首各戴圓點所謂竟字爲仰月占字爲仰月𪉜字爲仰月擔字爲仰月𭈠字爲仰月等字類也或以等各通冠五句各上四字之頭上以爲仰月謂仰字竟字仰月孃等見字仰月麼字劍字仰月他皆倣此初是據勝爲論後是據實通論思之應知復次言他麼多者五字也揀自麼多而得他稱自麼多者等十二麼多也此本來自性主麼多徳故得自名等五字居體文中而施麼多功非本來自性麼多故名他麼多也問就等字者圓點半月倶等字耶答依東寺傳則兩字等五字共皆成圓點復成半月故非今義加他麼多之義不立故也若依安然意則有二義一義云等五字皆即圓點復是半月也所以者何理趣釋經釋吽字空點云其字頭上有圓點半月即謂麼字已上然公寧違此文乎測知兩點倶一字所成也一義云圓點字仰月等也藏四云其吽字等頂上仰月此是麼字之省而非麼多之點今加仰月令戴圓點心義未詳何書云大空義釋云重空謂空中空故云大空亦云重空何者阿字圓點本名空點麼字仰月亦名空點兩空相重故云重空以空亦空故云大空已上同三云是麼暗相加屬孤合章已上依此兩釋圓點仰月定是二字也但至釋經文者應訓其字頭上有圓點半月即謂麼字然則無違矣二義之中後義順藏問何故以之立爲連聲耶答藏五云亦與諸字能爲通聲已上此意加仰月圓點之字爲下諸字爲上上下連續則下字與上字能爲連聲所以爾者圓點仰月二空相重共而發聲故其聲高大故能爲隣次上字通聲譬如此寺鐘鼓其聲高大故能通隣寺是故別立此連聲也麄顯耎密等圖諸梵文中罕見其例今爲教蒙多新緝綴問已上兩種連聲建立爲有其理將如之何答先第十五章聲者若爲連聲義則與他音屬自連聲全同故不應別科之若攝聲歸韻義則第十五章中盎迦安者等字非是連聲諸梵文中有僧伽扇多遜婆等字是則他音屬自連聲字偶同第十五章字耳然公以偶中混爲的當耶次加他麼多聲者非啻諸梵文中未見其本據亦忽違字記意字記文云形非麼多獨爲嚴事之文已上既云非麼多何以等五字爲仰月點成其音乎又如大日疏以等字全同第十一圓點如然公則却爲仰月是又違無畏意又乖釋經圓點半月倶爲麼字而云四字具足之文又藏五明爲加他麼多聲此是上字終響與下字始相連於上字呼空涅槃音然則連連成二點音全非圓點仰月連于上字何云加他麼多連聲乎若云圓點仰月連於上字者有超音之失多如斯過然則加他麼多聲連聲恐可謂然公自由料揀乎追應謗彼門流之人也問自音成他聲者其相如何答欲辨此連聲者須先知自他之異謂數字連綿之時上字云他下字云自然爲下字功使上字呼空涅槃點而亦不失自聲是則自音能成他韻故云自音成他聲也與東寺二體相續全同也麄顯耎密等圖問他音屬自聲者其相如何答他音屬自聲者上他下自如上數字聯屬之時下字全成上字空涅槃之韻而失自音也是則他音屬自故名之也與東寺一體不絶全同也麄顯耎密等圖問東寺一家所立一體不絶二體相續者名義相貎如何答先釋其相者如前所註二體相續者即是自音成他聲也謂上下二字各呼其音名爲一體爲下字功使上字呼空涅槃音是曰相續是則依字記十五或釋中第二所建立也彼釋云或異體字重之即連聲合呼謂悉多羅等是也已上此字者上字本無涅槃點而呼悉音則二字相連之故下字使上字呼入聲也是五句耎密舌内音便之連聲也次一體不絶者是亦如上所註即是他音屬自聲也是則依字記十五或釋中第六所建立也彼文云或兩字聯聲文形其後聲彰其前如麼盎迦三合等字似云莽迦等也已上是則字居字後故云文形其後其音連字先本字而呼之故云聲彰其前謂終韻與盎始聲全同故下連上擧體全收一音合呼盎終宇韻爲所牽同彰其前也此故云爾名之一體不絶者上下全體密合一音合呼故云一體麼與盎兩音不間絶故云不絶一體約表不絶約遮而立斯名也問字記兩箇或釋中連與聯別而書之頗有其故乎答林記云問連與聯有何異耶答共得力延反訓釋有少異連續也聯不絶也故知二體相續名爲連一體不絶方稱聯以爲異耳已上廣韻平聲仙韻云連力延切合也續也又云聯同前切聯綿不絶已上問如此連聲成韻頗有所以耶答一切諸法皆從衆縁而生假下字助縁上字生韻是其義也右顯教意若約密教諸法生起必假増上縁而起自用猶如榖種待雨日水土縁生起本有萌芽故五祕密經云三密金剛以爲増上縁能證毘盧遮那三身果位已上是其義也應思擇而知耳第七音韻相通門第七音韻相通者本末横竪同内異内一切皆無不通矣謂通者同義然非全同同同相似義也此且分三初横相通二竪相通三非横非竪相通此三又有韻韻相通聲聲相通聲韻相通分別至下應悉初横相通者是有十別其十種者初初後相通謂等與等相通也此中相通則韻韻相通相通相通等則聲聲相通也聲韻分別上卷具明也又等雖是聲韻和合就親屬聲也是猶衆僧行道上座下座相隣又如合宿際是即表本修無二初後一際之深旨也漢字亦有此例謂阿訶薩多那婆摩羅和陪背煗右皆呉或漢音左皆唐音等貪曇朴殼發濁法右皆漢左皆呉等也二二四相通又曰相通謂等與等相通也是則本末相通也此中則韻韻相通等則聲聲相通也諸梵文中字呼移字呼計之族寔繁安然十二例中立伊翳難定例須者往撿漢字之中亦有此例謂施衣戲氣希皆呉皆漢展本音叶音院漢呉平漢唐淵漢呉麗齊韻支韻是呉漢三三五相通又曰相通謂等與等相通也是又本末相通也此中則韻韻等則聲聲準上知之諸梵文中呼句注祖呼蘇等極多又有以上句終字點爲下句始字謂胎藏轉法輪眞言者是身是我也字加點而呼者之與之合耳又愛染王眞言若離分而言則是金剛是頂也今與合故加點而呼日嚕爾今世眞言師或改書或以呼日囉誤之甚矣不可不改佛眼呪中大佛頂中等皆同又淨三業眞言末清淨我也三部三昧耶眞言是如來是發生也蓮華下如上也金剛下準上也金剛起眞言如上云起也等皆悉例知漢字亦有此例謂通空豐孔蒙公亥工峯封句后口豆右皆呉左皆漢文問聞蚊紋右皆呉左皆漢寸呉漢都統補部布歩右皆呉左皆漢四初二相通謂等與等相通也字呼瑟置利等也梵字對註體呉音對譯等亦是也漢字亦有此例謂差歌卦支韻儀宜猗思右皆叶音左皆本音涯麻佳支韻池歌支韻麗呉音支韻五二三相通謂等興等相通也第十五章中等本應呼蘡荊等而呼蘡荊等是也漢字亦有此例謂子師慈右皆漢左皆唐鬼歸誄垂呉右皆直音漢左皆拗音群郡右呉左漢窮宮躬弓經慶生清精情青淨定貞楨停挺屏病丙并俜秉明命名盈令冷寧迎右皆呉左皆漢六三四相通謂等與等相通也未見其例而漢字之中有其例謂直歳呼直歳西瓜呼西瓜皆唐音也等是也七四五相通謂等與等相通也未詳其例而漢字之中多規準謂獻言權健遠婉寃怨反返嚴越右皆漢左皆呉八初三相通謂等與等相通也字呼瑟吒之類是也瑟則拗音則直音又漢字有其例謂鎚磓魋挼推右皆灰韻左皆支韻堆漢呉退對煨回右皆漢左皆唐九初四相通謂等與等相通也字呼閻字呼劍字呼欠字呼戰等也又相通是也等類不遑毛擧漢字之中其例維夥謂體帝啼替弟提題齊西妻米戻麗禮右皆呉左皆漢卦灰悔誨外快怪掛解界芥壞懷會膾淮瑰回右皆漢左皆呉十二五相通謂等與等相通也第十五章應紀等本合呼憂紀而呼應紀是也漢字之中又多其例謂欣近勤饉銀覲斤筋今金禁芩琴飮音瘖陰蔭隱殷乙右皆漢左皆呉論崙右元左眞韻右十科之内本末相通二四三五兩科也初二初三初四初後四科亦本末相通亦親類相通也二三三四四五二五四科唯親類相通也以圖示之大科二竪相通者是有三別其三種者細分條科則成九種初同内相通是亦分六初口内相通謂已上十唯口内已上五口之舌已上五口之脣之二十音同口内音故互相通也虚空藏轉明妃眞言中菩提場一字頂輪王經文又千手大悲心陀羅尼中波摩阿文又羅什譯法華陀羅尼中郵樓哆文又云辛阿文是不空譯觀智軌僧訶文是與與與相通之證也漢字之中此例維多謂或惑右呉左漢洫呼域切侐同上右呉左漢雄熊二共胡弓切雘蠖二共屋郭切馘古或切尤疑求切會壞懷右呉左漢右例梵文名相通又名口内相通韻鏡名疑喩往來等也二舌内相通謂上五舌端或曰舌本上五舌中上五舌本或曰舌端上五遍舌上五口中之舌已上二十五音同舌内音故相通也字母終字字記注叉南本涅槃註羅北本註荼是其證也此中二五殊相親近謂等清音等濁音唯此爲異故也諸梵文中注娜漢呉注弩漢呉等又注儞呉漢注尼呉漢等是其事也曰之同也漢字之中多舌内相通之例謂潤人仁忍認日兒爾二而耳珥餌如汝女怒奴努乳能泥乃耐内嬭禰奈輭愞蝡難攤灘赧睍撚捺痆涅捏然熱暖猱撓鐃腦惱瑙閙尿嫋饒橈嬈遶擾那儺娜橠袲奈拏若惹嚢曩獰儜孃壤弱諾寧寗佞溺紐忸耨糅柔蹂揉肉任壬姙絍賃入廾南諵男楠喃黏鮎拈念納衲鑷匿右皆呉左皆漢三脣内相通謂右五脣末右五脣中右五脣本又口之脣已上十五音同脣内音故相通也諸梵文中盤陀或注滿駄等毘婆尸或云維衞毘摩羅訖里帝略云維摩詰四毘或吠或婆陀典或云四韋陀典舍婆提城云舍衞毘瑟拏或瑟紐天或云韋紐婆蘇枳龍或云和修吉等又穆陀羅或注母陀羅等是其例也等清音等濁音故之二音殊親又復須知等清音等濁聲也脣内相通以之知之同漢字之中其例最多謂蒙朦夢雺彌弭無武霧務迷米毎梅昧皆右呉左漢等不遑毛擧四相通是前口内相通之中別揀取與二音相通也是有深義非取等與等之相通矣五四音相通又曰四音相同謂前舌内相通之中別簡持四音相通也準相通而知之是亦入于玄義有奧祕也六三音相通謂前脣内相通之中特取三音相通也準上思之是亦祕賾更問二異内相通是亦分二初口舌相通謂藥師十二夜叉中伐折囉集經呪云和耆羅是轉舌内爲口内耆也鳩摩羅什婆之什婆或云耆婆等是或名之相通對注枳字又呼只音往往而在亦是也二五音相通謂遍口八字互相通也合於八字成五音謂一一一五也此八字主涅槃理理一味爲性故相通也娑婆世界新云索訶是縛字有和音故也三亦同内亦異内相通謂等十互相通等十等十等十等十各横行互相通用也曰之同韻相通矣大科三非横非竪相通是亦分五初同字相通同者一義謂一字有多音也字有那拏二音字亦同字有阿羅荷羅二音等其例惟多不克具出二聲相通謂體文三十四字互相通也是又有深意也三聲韻相通謂麼多本或末與體文末或本通也是又本末相通也四内外一轍相通謂音與通是爲内又與通是爲外又音與通是爲内又與通是爲外二音準而知之已上口内次音與通是爲内又與通是爲外四音準而知之已上舌内次音與通是爲内又與通是爲外二音準而知之已上脣内五三内相通謂五十字皆互相通也右大分三門細論二十四種從狹之寛自堂入奧聲韻相通之旨殆盡矣庶後學者即聲入眞問何如此瑣碎辨相通耶答瑣碎何言耶如上自在通用却是寛廓也此是表旋轉總持無礙自在焉窮極論則一切諸法差別而無差無差而差別差別則胎藏多法界實義色法多差爲宗無差則金剛一法界實義心法平等爲性無差別門諸音聲旋轉無礙差別門非無限隔是故或局親眷或分口處一一用音皆住極際悉盡玄趣字形可見音聲可聞義理可念三種理趣煥炳目下雖爾若無法佛説示則等覺十地不能見聞聲字實相漫拏此之曰祕密藏焉是則此三密鈔名之所以由而建也第八字相字義門第八字相字義者大分爲二初總論二別釋初總論二初直叙二對判初直叙者疏家大師處處釋文字相字義分別非一今依古徳相承實義作四重祕釋會同諸文其四重者一淺略釋字相者童蒙所知字義者法性實義也所謂一切文字語言内心生分別外取境界相五處三内衆縁和合而生一一文語唯有形聲全無義趣而以文字詮顯義趣者且於無名相中立名筌蹄以爲觀智方便雖然約實名義互爲客猶如虎杖草名而非虎之杖蛇床草名而非蛇之床是爲字相如此文字所詮義趣幽深玄妙逈絶名言因字表之應名字義良惟一一文字表示内心示於他故一一形聲必帶義理所謂字諸音始故詮本初不生之理字造作始故詮作業義如是聲字即實相文字是義趣名爲字義此初重淺略相義分別也是則釋論以四妄言相夢妄無始爲文語如義言説爲義語之意也又大師釋中作字相即顯字義即祕分別此重義也此重字相形音與義不相契合形音虚假事法義則法性眞實故即是顯教所談事法縁生無自性分齊也字義聲字外無義趣聲字即實相故聲字能詮義理實相必彰文句一一文字皆自本有起而非虚幻故即是密教所演如義言説境界形音義三皆住眞實義也二深祕釋字相者字作業字等空乃至字因業等是字義者各各字門不可得義也此重相義於眞言教中約世諦字輪等一字能詮一義爲字相隨文字相帶其義趣彰實相故除遣實相證入無相名爲字義所以然者諸字所詮義趣若就文字論則雖有差異約理體而言則平等一味無二一相也一相無相故還無定相隨一一字門各顯義趣此故就字言説字塵垢字因業字等空等並觀不可得則法界一相不見聲字一門之相是名字義即身義離言無垢等以爲等字義等虚空爲字字相吽字義吾我爲字字相我不可得爲字義等即此重義也又大日經五種三昧道眞言中二乘及人天教法所説眞言一一字句安立布列依一字詮一義依句義而不依字義則此字相也諸菩薩眞言於一字中詮無量義一相無相不住一縁則此字義也又諸尊字輪觀初無點觀字言説等字相後加大空點觀不可得字義或自始觀字因業不可得字義字眞俗二諦不可得字義等皆此門攝也然乃約五種三昧道就前四種中分此相人天二乘義菩薩約今四重於初重字義中分斯相義故相義共以眞實也十住心論第十簡顯教劣釋未知字相字義等眞實之義正當于茲此重差別爲相平等爲義三祕中深祕釋字相者不可得義第二重字義也字義者圓明心體也謂依一一字門所詮義趣爲本觀無相相證不可得是則依彼差別一門言説塵垢等詮此不分法體故能詮字義言説等所詮不可得不同猶存二相此是立文字相見能詮徳能所尚在總名字相次字義者文字即圓明心體能詮之外無復所詮三摩地軌云八葉白蓮一肘間炳現阿字素光色文蓮華者心素光者心也字則二心精靈不二一氣也然乃兩部理智體性全歸一字體即義趣全無別法是名字義疏第二十云謂能達字之本性即是圓明當住本來不生即心是也文又字輪觀終捨不可得或住字或住圓明皆此門攝也四祕祕中深祕釋者能所不二圓明字體名爲字相還存能所字體能詮義用名曰字義即身義云雖有能所二生都絶能所法爾道理有何造作能所等名皆是密號絶能所而唯一圓明則猶是遮情實義也能所等名皆是密號即表徳深趣也凡自宗實譚平等法界無能所雖甚深奧猶是果地境界所謂金剛界一印會大日及大日經毘盧遮那遍一切身所證也於此中還存能所建立差別表徳本源即本有金剛薩埵行者平等智身境界也大疏臺實爲因外花爲果文色體心用金淺胎深等法門思之察之疏第六云而諸衆生入道因縁種種不同若應以文字言語得度者則如來不動實際以自在神力加持彼彼聲字而演説之文此義以聲字爲法體以實相爲義用喩如自珠發光以言語體發實相用言語能詮徳義既成立故名字義也若依此意初重淺略字相還隣近此字義但初重字相縁生如幻能詮今之字義本來法爾文字至極絶待論之初重字相位形音更非始起法爾能詮故初重字相之外無第四重字義也疏云若聲若字擧體不生即此義也二對判者上來四重對判顯密與奪二門若與而論則初重與人天二乘齊第二重與三乘教齊第三重與一乘教齊第四重眞言不共譚旨也若奪而判則有多塗一者九種住心並初重字相攝也初重字義即第二重字相故並屬祕乘不關顯教前所證十住心論釋文等即此義也二者初重字相爲三乘教字義爲一乘教一乘教中分以諸法爲眞如一分徳故第二重字義已上獨爲眞言三者第二重字義尚與顯乘四家大乘共以寂滅絶離爲宗極故不可得且屬常途自心圓明常教絶譚故獨爲密如是重重據實通論則初重字義已上竝皆於聲字即實相門建立之故悉是自宗玄旨詳而思之二別釋者亦分四初麼多二體文三合論四旋轉初麼多又二初通麼多二別麼多初通麼多十二初阿上短字者大日經第二入漫荼羅具縁眞言品第二之餘云阿字門一切諸法本不生故瑜伽金剛頂經釋字母品同之又第六百字成就持誦品第二十二云阿字以一切法本不生故顯示自形已上大品般若四念處品云阿字門一切法初不生故已上大論四十八云菩薩若一切語法中聞阿字即時隨義所謂一切法從初來不生相阿提秦言初阿耨波陀秦言不生已上明覺形音義四解曰凡梵書作法一字不詮義必二字已上和合方詮一義故於字母或上加字或下加字方詮一義故諸經論釋字母義各不同也須得此意義淨三藏千字文云初也始也首也元也雖非字阿音同故用亦無過心經梵本云不生文其實云不云生故大論云阿耨波陀秦云不生也已上華嚴經新譯七十六入法界品三十九之十七善知衆藝童子章云唱阿字時入般若波羅蜜門名以菩薩威力入無差別境界已上華嚴四十二字觀門不空云稱阿上字名時由菩薩威徳力得入無差別境界般若波羅蜜門悟一切法本不生故已上清涼澄觀大疏云皆言般若波羅蜜門者從字鈔曰有相入於無相智故字義爲門故毘盧遮那經中皆言不可得智無所得即般若故乃至一阿者是無生義以生之理統該萬法故經云無差別境而菩薩得此無生則能達諸法空斷一切障故云威力鈔云見智論文則知四十二字皆是所依之相從此入於無得般若故名爲般若之門放光云阿者謂諸法來入不見有起光讃云阿者因縁之門一切法已過去者亦無所起釋曰上二經起即生義因縁之門從縁生也文殊問經云阿者是無常聲普曜云然此言云無者是宣無常苦空無我之音上二經似同小乘之無若取無彼常等即與無生義同涅槃云噁者不破壞故不破壞者名曰三寶喩如金剛亦同無生義略抄文殊問經字母品不空云稱阿上字時是無常聲已上方廣大莊嚴經第四示書品中天竺地婆訶羅譯云唱阿字時出一切諸行無常聲已上大涅槃經北本八如來性品云噁南本云阿者不破壞故不破壞者名曰三寶喩如金剛又復噁者不流故不流者即是如來如來九孔無所流故是故不流又無九孔是故不流不流即常常即如來如來無作是故不流又復噁者名爲功徳功徳者即是三寶是故名噁已上明覺解曰文殊問經及莊嚴經並云無常義涅槃經云不破壞義不流義云云並隨所加字有此不同也大集經第十海慧菩薩品十二云阿字一切法門阿者言無一切諸法皆悉無常已上守護國界主陀羅尼經罽賓國般若譯第九陀羅尼功徳品云善男子陀羅尼母所謂唵字所以者何三字和合爲唵字故謂婀烏莽一婀字者是菩提心義解曰字五點始故是諸法門義諸字不可得即字本不生義故亦無二義不生中道一實境界故亦諸法果義覺自心從本已來不生即是成佛故亦是性義大師引言諸法性義也離諸因縁常住不改故是自在義猶如國王黒白善惡隨心自在無所不作故又法身義萬法所依故又解已上七義以配五一則初二三次萬行非一故平等性故四則字菩提果故五則字涅槃理故六七字具衆徳故體依聚故又第二卷陀羅尼品第二云善男子云何名爲大聲清淨陀羅尼門乃至若諸菩薩深入如是一字聲門一切諸法悉入此門即從此門出生演説一切諸法且初第一説婀上短呼下皆準之字門出生無邊無數法門所謂婀字者一切法無來以一切法體無來故解曰本不生故無來又婀字者一切法無去以一切法體無去故本不生故不滅不滅者無去故又婀字者一切法無行體無行故行者遷變不生故無有遷變也又婀字者一切法無住體無住故遍一切處故不住著一法又婀字者一切法無本性體本清淨故平等故無一性而清淨潔白又婀字者一切法無根本體初未生故本有故未曾有始生又婀字者一切法無終體無初故又婀字者一切法無盡體無去處故遍法界故無別去處又婀字者一切法無生體無行故離遷流造作故無可新生又婀字者一切法無出體無作者故無作者則無能作所作此故無出生死趣涅槃出涅槃入生死又婀字者一切法無求體無相故無無相之相故無可願求又婀字者一切法無礙體相渉入故六大無礙常瑜伽故又婀字者一切法無滅體無主宰故諸法融通無局定主當指何法言此獨滅又婀字者一切法無行處體無願故無可願求則無行去處非言諸法都無覽者正好著眼下不復煩注又婀字者一切法無生死體離分別無分別故又婀字者一切法無言説體極聲入故又婀字者一切法不可説體無聲故又婀字者一切法無差別體無處所故又婀字者一切法無分別體清淨故又婀字者一切法無心意體不可求故又婀字者一切法無高下體本平等故又婀字者一切法不可解體如虚空故又婀字者一切法不可説體過語言道故又婀字者一切法無限量體無處所故又婀字者一切法無生體無生處故又婀字者一切法無本淨體本無相故又婀字者一切法無我體即無我性故又婀字者一切法無衆生體本清淨故又婀字者一切法無壽者體無命根故又婀字者一切法無補特伽羅體離所趣故又婀字者一切法無本空體性寂靜故又婀字者一切法無相體性實無際故又婀字者一切法無和合體性無生故又婀字者一切法無行體本無爲故又婀字者一切法無爲體過行無行故又婀字者一切法不共體無能解人故又婀字者一切法無聚會體無積集故又婀字者一切法無出體無出處故又婀字者一切法無本性體本無身故又婀字者一切法無相體相本淨故又婀字者一切法無業體無作者故又婀字者一切法無果體無業道故又婀字者一切法無種植體無種子故又婀字者一切法無境界體不可取故又婀字者一切法無地界體無諸結故又婀字者一切法無縛體本散滅故又婀字者一切法無聚散體本無爲故又婀字者一切法無漏體惑不生故又婀字者一切法無自性體初無生故又婀字者一切法無濁體無有對故又婀字者一切法無對體本無作故又婀字者一切法無色體無大種故又婀字者一切法無受體無受者故又婀字者一切法無想體過諸相故又婀字者一切法無行體離有受故又婀字者一切法無識體無分別故又婀字者一切法無界體空平等故又婀字者一切法無入體過境界門故又婀者一切法無境界體無去處故又婀字者一切法無欲體離分別故又婀字者一切法無色體無根本故又婀字者一切法無本色體難思見故又婀字者一切法無亂體無可亂故又婀字者一切法不思議體不可得故又婀字者一切法無意體本無二故又婀字者一切法不可執受體過境界道故又婀字者一切法無阿頼耶體無因縁故又婀字者一切法無常體本無因故又婀字者一切法無斷體不礙因故又婀字者一切法無名體無相貎故又婀字者一切法無雜體不相入故又婀字者一切法無住體無住處故又婀字者一切法無熱惱體無煩惱故又婀字者一切法無憂惱體無惡業故又婀字者一切法無習氣體本無垢故又婀字者一切法無垢體本清淨故又婀字者一切法無本清淨體無形質故又婀字者一切法無體體無依止故又婀字者一切法無依止體無動作故又婀字者一切法無動體離執著故又婀字者一切法無障礙體同虚空故又婀字者一切法同虚空體無分別故又婀字者一切法無色相體無境界因故又婀字者一切法無顯示體皆相似故又婀字者一切法無相似體無境界故又婀字者一切法無境界體如虚空常平等故又婀字者一切法無闇體無明故又婀字者一切法無明體無對故又婀字者一切法無過體妙善故又婀字者一切法無是體無妄故又婀字者一切法無開解體無動故又婀字者一切法無見體無色故又婀字者一切法無聞體無聲故又婀字者一切法無嗅體無香故又婀字者一切法無嘗體無味故又婀字者一切法無觸體無所觸故又婀字者一切法無知體本無法故又婀字者一切法無念體離心意識故又婀字者一切法不思議體性菩提平等平等無高下故又婀字者一切法寂靜體本不生亦不滅故善男子菩薩如是得此大聲清淨陀羅尼門入第一婀字時演説諸法或經一年或復十年百年千年或百千年或一小劫或一大劫乃至無量無數大劫説此法時不離婀字如説婀字義無有盡説餘諸字亦復如是不可窮盡已上大師字母釋義云音阿上聲呼訓無也不也非也乃至又一切諸法本不生義内外諸教皆從此字而出生也已上毘盧遮那經疏第七云阿闍梨言若佛菩薩所説則於一字之中具無量義且略言之阿字自有三義謂不生義空義有義如梵本阿字有本初聲若有本初則是因縁之法故名爲有又阿者是無生義若攬因縁成則自無有性是故爲空又不生者即是一實境界一實境界即是中道故龍樹云因縁生法亦空亦假亦中又大論明薩婆若有三種名一切智與二乘共道種智與菩薩共一切種智是佛不共法此三智其實一心中得爲分別令人易解故作三種名即此阿字義也又同卷云經云謂阿字門一切諸法本不生故者阿字是一切法教之本凡最初開口之音皆有阿聲若離阿聲則無一切言説故爲衆聲之母凡三界語言皆依於名而名依於名故悉曇阿字亦爲衆字之母當知阿字門眞實義亦復如是遍於一切法義之中也所以者何以一切法無不從衆縁生從縁生者悉皆有始有本今觀此能生之縁亦復從衆因縁生展轉從縁誰爲其本如是觀察時則知本不生際是萬法之本猶如聞一切語言時即是聞阿聲如是見一切法生時即是見本不生際若見本不生際者即是如實知自心如實知自心即是一切智智故毘盧遮那唯以此一字爲眞言也而世間凡夫不觀諸法本源故妄見有生所以隨生死流不能自出如彼無智畫師自運衆綵作可畏夜叉之形成已還自觀之心生怖畏頓躃於地衆生亦復如是自運諸法根源畫作三界而還自沒其中自心熾然備受諸苦如來有智畫師既了知已即能自在成立大悲漫荼羅由是而言所謂甚深祕藏者衆生自祕之耳非佛有隱也已上大師祕藏記云夫一切諸法或執空或執有爲除空執説有爲除有執説空爲除空有病説非空非有是稱中道言尚留中道爲除其言又説中道不可得是不可得入阿字門見者不可得亦不可得於茲絶言是一切諸法本不生不可得義已上又大日經第二具縁品云我覺本不生云云同疏第六云次有二偈明菩提實義我覺本不生者謂覺自心從本以來不生即是成佛而實無覺無成也一切衆生不解如是常寂滅相分別妄云有生輪迴六趣不能自出今雖聞正法音還於種種有爲事迹中推求挍計冀望成佛何有得理耶已上此中無不非三字字相淺略義常途顯教所談也阿若云無知阿閦云不動阿修羅云非天此故此三云訓也有空不生三字字義澡祕唯眞言門所説也謂本不生者本者本有本初之義不生者不始生之謂也不生之言揀顯乘因縁所生本者異常途本空寂滅唯一眞如所以者何眞言教旨塵塵悉以六大爲其體性凡聖十界及山河草木等皆是全性成相六大者何地水火風空上五名理攝持爲義非眞如理識此一名智心也即色五大心識大二法也此之色心體性微密周遍無礙爲六大性相貎麁顯區域分剖爲四曼相此上作業爲三密用然則體相用三大倶有本有無有前後絶生滅去來等散動畢竟常寂雖云常寂事法常故未曾同於顯教所談空寂無相眞常諸法當相不改塵許直是常住法性六大故也顯教極説者事法皆由因縁而生從因縁而滅故是幻化都無實體報應二佛猶隨衆生事業二識迷見而現而實無有佛相唯有空寂理號之法身佛矣然則顯乘以事法本無理性獨存爲終窮説密宗以色心事法本有諸法宛然爲眞實譚不復立無相理此故顯密教相天殊地別有誰盲聾同日對論末代密侶菽麥不分薫蕕無辨屡以字不生圓珠錯渾眞如本空龜毛誠可悲矣彼無相説纔彰字字相無不非義未嘗眞實字義不生理味此故顯經中多約無生無常等説阿字義皆是遮情執之權示曾非指實體之直談冀後可畏好著力看問本不生義或可如言上所引疏縁生説有無性釋空此中有空常教空假果有何異望辨別焉答來問太佳此之有空多人所謬今試論之有者諸法本有即本不生非言因縁初生之假有疏言縁生之有是約隨縁法之本體雖常現起凡眼所見有生有滅常現故雖暫生實常有也常有故能隨縁而生似生而有故疏云不生而生不改法爾而隨縁故不動隨縁而法爾故疏云因亦是法界縁亦是法界因縁所生法亦是法界已上故雖言因縁之法故名爲有即是釋本有之有也即是表徳萬有無有一塵而非本有之者此故此有即本不生也宜乎爲字義也次空者表徳大空非無相頑空也其大空者一塵一法若擇而取之則早蹉過了也擇取之者亦所擇捨故有取捨者皆墮邊見不是正見今都亡取捨見故且言無性無取捨則諸法歴歴目前陳列故曰大空故疏第六云空與不空畢竟無相而具一切相故名大空三昧已上故雖云空實本不生也取要而言本不生者空金智遮情有胎理表徳一際兩部不二遮表一如之本際也空者空有不二之空遮表不二之遮也即不二金剛界有者有空一如之有遮表不二之表也即不二胎藏界然乃有空不生三義不二而二即不二離而二不謬而一法之三義也又曰理有智空人不生三點或曰金胎蘇悉地矣嗚呼今世庸學之輩不細教旨不訪師承纔聞説大空便謂爲縁生無性頑空阿黨顯乘破斥本有忽乖法佛之説頓蔑高祖之言不知後報如何今茲所引字義須知顯密之別故茲贅耳復次下去諸字皆轉釋本不生義諸字皆自字而生故也旋轉總持職而斯由阿引去字門一切法寂靜故金剛頂明覺解曰翻梵語云阿練若此云寂靜故云爾也稱阿引去字時是遠離我聲文殊問明覺解曰此云我故云爾也唱長阿字時出自利利他聲大莊嚴復次阿南云長阿者名阿闍梨也阿闍梨者義何謂耶於世間中得名聖者何謂爲聖聖名無著少欲知足亦名清淨能度衆生於三有流生死大海是名爲聖又復阿者名曰制度修持淨戒隨順威儀又復阿者名依聖人應學威儀進止擧動供養恭敬禮拜三尊孝養父母及學大乘善男子等具持禁戒及諸菩薩摩訶薩等是名聖人明覺曰云聖人云依也又復阿者名曰教誨如言汝等如是應作如是莫作若有能遮非威儀法是名聖人是故名阿涅槃經明覺曰大日義釋云阿字障也文障也義釋又云字攝召也云召也已上形音義大疏十四云若見長阿字當知修如來行已上又第十云長聲第二字是金剛三昧已上理趣釋經云阿引字一切法本來寂靜猶如虚空已上大疏第十云阿長是第二聲即是空義以本不生故同於虚空也已上解曰此字則本不生字加於一點即是不生之行又三昧也入本不生三昧則諸行悉不生故不行而行故曰寂靜非息行而寂也行而寂寂而動曰虚空矣伊上字門一切法根不可得故金剛頂伊上字時是諸根廣博聲文殊問唱伊字時出諸根本廣大聲大莊嚴明覺曰倶舍記云因姪利炎此云根文五根二十二根等之根也普賢讃云伊畝文善根之根也已上億南云短伊者即是佛法梵行廣大清淨無垢喩如滿月汝等如是應作不作是義非義此是佛説此是魔説是故名億涅槃明覺曰云此也已上私曰云此大疏十四云若見伊等等等七字及等四文即顯三昧已上解曰第二字雖是長聲音未轉猶屬本有第三字聲轉之初自喉移舌修生中本故云根本猶如自種生根此根又爲莖枝葉等作本又是舌内之韻舌爲諸音之根又屬行大悲萬行爲根又持戒梵行決斷是非佛法根本宜得意知伊引去字門一切法災禍不可得故金剛頂稱伊引去字時是世間災害聲文殊問唱伊字時出一切世間衆多病聲大莊嚴伊南云長伊者佛法微妙甚深難得如自在天大梵天王法名自在若能持者則名護法又自在者名四護世是四自在則能擁護大涅槃經亦能自在敷揚宣説又復伊者能爲衆生自在説法復次伊者爲自在故説何等是也所謂修集方等經典明覺曰翻梵語云伊沙翻云自在文西域記云伊濕嚩二合囉此云自在已上復次伊者爲斷嫉妬如除稗穢皆悉能令變成吉祥是故名伊涅槃明覺曰翻梵語云伊舍羅譯曰嫉妬文信行音義云伊利沙此云妬文解曰諸法動轉生則必成災禍諺曰好事不如無則是謂也若入字門悟生而不生則即於災禍吉祥功徳是災禍不可得義也又四王種子字皆帶聲是自在義帝釋種子字自在天種子字皆同義也塢字門一切法譬喩不可得故金剛頂明覺曰此云譬喩稱塢上字時是多種逼迫聲文殊問唱烏上聲字時出世間諸惱亂事聲大莊嚴郁南云短憂者於諸經中最上最勝増長上上謂大涅槃復次郁者如來之性聲聞縁覺所未曾聞如一切處北欝單曰最爲殊勝菩薩若能聽受是經得名最上最勝是故名郁涅槃明覺曰云上云最勝也已上解曰諸法已生起則災禍吉祥因果善惡相待而立若有相待則可譬類是名譬喩若入字悟譬喩本有則因果善惡待而不對是名譬喩不可得義也復次云上云勝皆是對比凡有待對不免逼惱是以知顯教唯説字相未説字義也汚引字門一切法損減不可得故金剛頂稱汚引去字時是損減世間多有情聲文殊問唱烏字時出諸世間一切衆生智慧狹劣聲大莊嚴優南云長憂者喩如牛乳諸味中上如來之性亦復如是於諸經中最尊最上解曰已上短烏字義若有誹謗解曰損減即謗當知是人與牛無別復次優者是人名爲無慧正念誹謗如來微密祕藏當知是人甚可憐愍遠離如來祕密之藏説無我法是故名優已上解曰纔有損減即有増益増益損減是相對法於平等法増益有常等見損減無斷等見即是誹謗無慧正念又増益損減即是我見説無我法是斷誹謗也若入字則即増益損減直是本有平等之法是損減不可得義也字義吽字義廣説須者往撿曀字門一切法求不可得故金剛頂稱曀字時是起所求聲文殊問唱翳字時出所希求諸過患事聲大莊嚴㖶者即是諸佛法性涅槃大涅槃明覺曰云是也已上解曰凡於諸法起我我所増益損減是有所求有所求則爲大過患入字門能求心所求法本有不生是求不可得實義也又則呼召聲帶聲也謂呼是人呼是物也又呼之則求之也愛字門一切法自在不可得故金剛頂稱愛字時是威儀勝聲文殊問唱愛字時出勝威儀聲大莊嚴明覺曰大佛頂陀羅尼自在天云愛提里二合已上私解神通自在則勝威儀也野南云黳者謂如來義復次野者如來進止屈申擧動無不利益一切衆生是故名野涅槃經解曰凡有求得於所得法得自在矣若入字則無得無不得是自在不可得義也又如來義者是自在義法華經云我爲法王於法自在又如來進止是勝威儀須得意知汚字門一切法瀑流不可得故金剛頂稱汚字時是取聲文殊問字母表云執瀑流執則取義也唱烏字時出死瀑流到彼岸聲大莊嚴私解死則有生生死如暴流也烏者名煩惱義煩惱者名曰諸漏如來永斷一切煩惱是故名烏涅槃明覺曰吉藏云彼云烏伽此翻爲漏流已上解云諸法生則必滅猶如暴流水刹那無停時見生滅是執見故曰執瀑流矣又謂到彼岸猶滯生滅又暴流則漏流謂永斷又未免漏流若入字則即漏無漏無漏無不漏是瀑流不可得義奧去引字門一切法化生不可得故金剛頂稱奧引字時是化生之聲文殊問唱燠字時出皆化生聲大莊嚴炮者謂大乘義於十四音是究竟義大乘經典亦復如是於諸經論最爲究竟是故名炮涅槃解曰於本無生滅之法計生滅則是幻幻化之生即是化生又談事法幻化大乘究竟眞實之義也未及自家即幻生而本有也是爲化生不可得實義闇字門一切法邊際不可得故金剛頂稱暗字時是無我所聲文殊問唱菴字時出一切物皆無我我所聲大莊嚴菴者能遮一切諸不淨物於佛法中能捨一切金銀寶物是故名菴涅槃大疏十四云暗是成菩提已上又同卷云暗字爲火者梵音阿竭喃是火也已上理趣釋經云暗字者等覺義由證無邊智解脱三摩地陀羅尼門摧伏四種魔羅受十方一切如來三界法王灌頂轉正法輪已上又云菴字者覺悟義覺悟有四種所謂聲聞覺悟縁覺覺悟菩薩覺悟如來覺悟覺悟名句雖同淺深有異自利利他資糧小大不同以四種覺悟總攝一切世間出世間上上已上大疏第十云暗成菩提種子也前字是菩提心更加上點即是大空證此大空是成菩提已上解曰菩提智是諸法畢竟至極邊際又諸法空則無我我所無我所故能捨寶物有我所則是不淨又若入字菩提智又非始起猶如猛風吹雲日光顯照亦非始生是邊際不可得實義也明覺解曰翻梵語云菴婆羅者比云空文故以之云空點歟惡字門一切法遠離不可得故金剛頂稱惡字時是沈沒聲文殊問唱阿字時出一切法皆滅沒聲大莊嚴阿南云痾者名勝乘義何以故此大乘典大涅槃經於諸經中最爲殊勝是故名阿已上理趣釋經云惡字者涅槃義由斷二種障謂煩惱所知之障證得四種圓寂所謂一者自性清淨涅槃二者有餘依涅槃三者無餘依涅槃四者無住涅槃前三通異生聲聞縁覺第四唯佛獨證不同諸異乘則此四字是毘盧遮那佛自覺聖智四種智解脱已上又曰惡字名爲涅槃由覺悟諸法本不生故二種執著皆遠離證得法界清淨已上大疏第十釋除蓋障種子字云又加不動之點是降伏義也已上又同卷云噁涅槃種子也傍有二點者皆急呼之是訶聲也是除遣之義遣諸垢是入涅槃也已上解曰遠離煩惱所知二障故證得二種涅槃故以二點而標之又沈沒者涅槃寂靜理也又勝乘義者大經以涅槃理爲勝義故若入字則無應遠離之法煩惱生死皆自家本有具徳故又遠離非別物是功徳也本來遠離非始離故即遠離而不離不離而遠離是爲遠離不可得實義也二別麼多四其四者謂哩字門一切法神通不可得故金剛頂稱𠴊字時是直軟相續有情聲文殊問解曰凡於諸法有自在義是則神通又有不測徳是神通義若入字則自在與繋縛平等平等更無差別即能得於生死縛涅槃脱自在遊戲是名神變神通亦則是不可得也明覺曰普賢讃云㗚地文譯云神通已上哩引去字門一切法類例不可得故金剛頂稱𠴊引去字時是斷染遊戲聲文殊問此經所説長短字義似相通用解曰諸法生起則有同類相例之義若入字門諸法一概本不生論何同異故即類例法平等一相是不可得實義也亦即眞類例也𠴊字門一切法染不可得故金剛頂稱力字時是生法相聲文殊問解曰諸法生起則有染相有不染相是名染也若入字則染淨悉本有不生故即染相能知不染是名染不可得義也嚧字門一切法沈沒不可得故金剛頂稱嚧引字時是三有染相聲文殊問解曰纔有染相即能沈沒生死大海又有生死染則有涅槃淨涅槃證入是爲沈沒先哲義也若入字煩惱菩提生死涅槃皆是自心佛之名字焉捨焉取是沈沒不可得實義也又等四文皆字所變故至此顯離塵染義矣涅槃經云盧流盧樓如是四字説有四義謂佛法僧及以對法言對法者隨順世間如調婆達南云提婆達示現壞僧化作種種形貎色像爲制戒故智者了達不應於此而生怖畏是名隨順世間之行以是故名魯流盧樓已上涅槃經合于四文説於其義大日經不説字已下一十五字之義又等四字同于等爲三昧字也已上通別麼多字義了
