body:
  text: 三密鈔卷中本金剛乘末裔淨嚴集第四合字轉聲門四合字轉聲者以麼多合體文生字轉聲軌轍千殊今且依智廣字記示其軌則有一十八章段大師傳之安然據之雖有多塗此爲大道是又分三初出字體二定章數三明生起初出字體又二初正章後孤合初明正章又五流類各別故初前七章二後七章三盎迦章四訖里章五阿索迦章初前七章又分三類初單章二三餘單第四已下重章也初單章又三初明名數二出字體三釋餘義初名數者問何名單章耶答初章唯是體文未重成故問此章生字幾多耶答三十四字母除字故加十二麼多故生字四百有八也如下具出二出字體者自下注脚皆用倭字爲便童蒙耳庶後學者莫責鄙拙今約最初字十二轉各注反切軌則以備一章龜鏡已下例知等四行與字同音故反切亦同但清濁異此中字大空種子也空含容諸法故字有迦暗音所謂迦音體文始終阿音麼多始終空點音諸音終極聲勢也諸音悉歸入本不生大空故存迦暗音矣是東寺眞言的傳祕旨也寛信勸修寺宗意安祥寺一存此義愼勿處聊爾耳三字皆濁音故音皆同字書異形者爲第二正字濫初異形也斯例太多應得意而書矣已上牙聲五字了此中等字諸梵文中多拗音用又字制字對註用尼例切註羂索經青頸觀音眞言是相同故字第二轉書本體字已麼多似點故又書已上齒聲五字了此中字第一轉異形書正字第二轉字第一轉異形濫渉故異形書第二轉異形上又引點加故書又書上字字第二轉是準知又字第一轉異形書是第八章至諸字上頭半體加時字位至書此時異形濫故本體字位異形書第八章字位至書但半體頸長書濫故只今如書相違前字異形書是又準知此字形牙聲第五字濫字本體形半月如字本體下點下引書故其異能辨又字左點端直引若下少引曲書如如字點異形加濫但如如字第五第六兩轉書諸梵文皆如書又執持字不堅字濫字左下點尖書字左下角圓書又字異形住處字異形濫得意書凡諸梵文書能考書天竺風俗委知難故古徳書置證外他事但中古已來梵文更證足辨別事已上舌聲五字了此中字異形字如如字濫能辨中古已來梵文字書多是字異形見誤故字第十五章字故必空點音帶更二字大呼法已上喉聲五字了此中字遍口第六字濫意著書別又瑟閉字下字惡書字省字省濫字下左方圓書字省左下尖右竪畫高書字省左下尖字同右畫低著反半月如書能辨第二字執持字差別上注了又字即泡沫形第三字遍口第四字差異上卷形音門委細今略云今縛字懷内蓮子形如上尖下圓遍口中言説字腹中半月如是等對註字見其字體究知下具對註出事多後生囑累梵字誤正第四字省字諸字下續時形諍論字下續字形相濫所謂二合字形書是二合字下字字形相似字其本體字能究知濫又字二合字濫若又異形書相字第二轉濫第五字惡書遷變字濫又字省字省異上注如已上脣聲五字了此中第三字第二轉字諍論字或二合字濫又二合字濫二合字書歟但此又字混第四言説字縛字異上已辨又此言縛二字省法界字異上卷字形中辨滅惡趣眞言中字法界縛二字合成上腹中三角形下腹中蓮子形書第五本寂字異形等空字混第六性鈍字第一義字中點端出不出異第七諦字書有字混第八因業字如此書作業字濫又字第十一轉字書用心眞言行者通不動種子字馴故本引點覺引點加予往往是見故後生知爲如注五大中風輪種子護摩扇上書誤引點加多又不動十九布字中引點加不加兩種差別辨書已上遍口十字了次因出初章諸字對註問何不上本字對註次而出耶答上卷合字轉聲之字未顯故不須出其對註也凡看漢註知梵文究梵書正對譯梵唐合存最爲緊要不宜容易又舊家翻註其音不正須學新譯唐書又趙宋初施護法賢天息災等三藏譯間或乖角不可不知一已下對註就諸經軌等撰出若逢異此者尋于韻鏡逐同韻同行同位字知屬其字母即是矣但又有四聲相通非而難悉一下諸對註字若其梵字非第十二轉註帶入聲又其梵字非加空點對註則練震欠等字又其梵字非第九第十第十一轉對註則穰楞登弓等字是則連聲覽者能擇而居則可矣迦羯訖吃見劍大隨求呪長聲故與字對註通用枳己紀機頡謹緊胎軌吉訖結大日經疏長聲故與上字同句屨寠拘瞿區𤘽倶矦苟鳩久具究垢溝休𦁐吼弓大佛頂呪求法花陀羅尼矩鉤二共大隨求軍金剛界軌長故同上計繼繋薊髻雞稽罽荊字記皆介字記罽隨求句憍字記矯嬌佛頂見鑑字記劍胎軌建佛頂檢慈氏軌兢千手軌脚屩蹻佉竭朅胎軌渇隨求棄弃棄古字企欺字記丘字記寇谿集經憩掲稽契隨求曉欠大日經𭕻切身慈氏軌却渇立印軌蘖竭釳乾犍健虐隨求伽哦誐仰㖸疙千手軌儗胎近疑擬宜耆祇蟻大流岐䞘羂索經𭔈切身慈氏軌祁其虞麌隨求愚無量壽軌喁胎禺寠唯識疏求瞿君獄玉佛頂藝詣倪霓皚瞿橋澆壽命經戞魚照反金軌儉儼嚴巘金軌虐伽誐㖸𠷐儗祇岐隨求瞿契祇岐曳反隨求瞿橋健金軌儉日經覲立印軌噱日經哦我俄餓呀語引昂仰日經覲宜倪義偶喁耦愚藝詣倪霓語嘋噞日經虐㖸者遮左戰日經賛立印旃散讃隨求訕造塔延命經作胎軌斫折淅胎拶隨求支斯氏訾肢施尸脂旨思紙只紫資制摩利支眞言西同上砥咨止室喞隨求質佛頂振震大疏注芻珠足朱徂主祖隨求際隨求制尼例反羂索經祖主佛頂占日經灼日經車磋瑳𭑥切身續刊定記捙鵄親隨求瞋佛頂姝芻樞烏瑟沙麼軌掣砌金軌襜日經綽日經社若惹闍結搓𭽐切身慈氏座法華日嚩日囉之日是入入嚩囉之入是什什皤囉之什是折跋折羅之折是大日疏而耳餌爾時似市詞字集經呰隨求駟誓二共大疏殊日經樹乳孺日經儒金軌濡逝消災軌際無量壽軌誓佛頂𮍚切身慈氏儒擾烏瑟軌粗佛頂祖隨求邵壤髯染漸隨求穰佛頂弱日經若柞社鄼闍杓醝諾膳涅槃饍禪樹甥韶瞻日經杓日經若社如壤孃兒而耳儒孺髯弱擿金峯置金峯智徴知致緻恥智金峯胝佛頂吒烏金峯拄羂索經跓千手軌駐紐佛頂都株𪘨千手軌都𮭫隨求吒暗立印軌磔侘吒姹咤詫咃癡恥樗廔羂索蠆叢勅句反金軌諂日經坼荼拏那提雉大疏膩佛頂法花膩馳二共佛頂豆禰佛頂嬭仁王經怒度土喃搦荼𢴉拏袒䘺檀豆土濁金軌湛日經擇日經拏那曩呶胎軌儜日經抳尼儞膩法花怒禰嬭泥儜儞佛頂乃呶喃𧹞赧同上然搦日經多羂索全眞哆橠續刊定記怛大日旦閻曼徳迦軌埵答隨求得咄二共隨求跢跢黨日經佛頂底怛寶篋印經袠法花𭙪切身慈氏登胎軌丼玄法寺軌窒羂索妬都覩咄佛頂敦女佛頂帝諦摘羝羂索帶胎軌戴金軌都妬登等撜集經兜法花徳佛頂到擔日經淡丹日經單寶篋印亶法花耽大疏膽隨求呾答他託詑羂索闥尊勝體剃最勝王經替都免佛頂韜探日經託日經陀柁荼娜那乃隨求諾納訥儞眤涅墀千手呪𡫸羂索捻無量壽軌蟄佛頂豆特訥佛頂弩訶利帝母經耨隨求突集經禰泥儞提乃奈地法花徒胎軌道腩難曇檀胎軌能日經南諾陀駄娜但彈檀達特地朕金軌豆度特睇台軌弟隨求臡羂索經提淡曇蕩金軌彈集經殿金軌鄧佛頂誕隨求鐸溺闥佛頂沓那娜拏曩納慈氏諾南嚢𩕳爾尼泥入儞入涅入𡫸切身羂索奴弩努耨免二共法花拏甯泥禰寧聹胎軌𩕳隨求奈金軌奴怒弩猱日經惱南難腩慈氏諾波跛簸法花博胎軌鉢佛頂播毘比二倶佛頂賓白衣布補本奮怖普分大疏芬怖布箆閉隨求背佛頂朋褒金軌報𠷖日經般半大疏幡播博頗叵破怖普發㧊普活切蘇悉地經泮佛頂枇怖普佛頂嫓𭈠日經頗大疏泊日經婆麼滿畔盤韈毘尾寐費弭味母蒲蒱佛勃沒𮪶切身慈氏吠鞞費切身慈氏米吠佛頂廢羂索陪倍吠字房廢切故音然今世人音得意字音呼是誤安祥寺流古來呼來是正音能分別菩冒勃𭍊梵𤚥盤畔望烏瑟刎千手軌菵胎軌漠日經婆𠴸全眞滼嘙𭊃佩胎軌罰薄佛頂鼻牝二倶隨求頻擗二共佛頂避入毘鞞歩部勃陛閉寶篋印䏶佛頂薜佩消災軌吠同上鞞陪偝佛頂部寶篋𭊃畔伴便法花盤佛頂婆𤙖二合慈氏嚩博薄麼摩磨莽日經忙胎軌滿曼沒物沫隨求弭密二共金軌彌履法花泯隨求咩佛頂母隨求慕畝寶篋印門胎軌穆金軌木梵網經牟佛頂悶目同上謨無膜謀金軌寐金軌茗名銘禪要迷謎集經彌咩佛頂米羂索毎梅昧慈氏謨慕暮無膜謀畝羂索蒙千手大悲心經懵隨求目佛頂𭷢切身慈氏𤚥瞞曼鍐滿縵漫懵𤜁切身慈氏芒𮫩佛頂摩含二合略出經莫末佛頂沫隨求也夜野耶蛇藥野引異金軌夷易以庾瑜諭愈欲尊勝曳拽裔法花與余庾裕瑜欲閻琰炎焔演延鹽衍藥譯翼囉荷羅二合梁武哩唎㗚剌字三五麼多軌則前後諸字此例多準知哩㗚唎利履梨律陵犁理離詈魯嚕盧樓法花郵樓二合同上勒路㖮字郵樓音讀事字音故轉聲下三五相通口囇嚟禮佛頂瀬麗盧路露大疏嘮胎軌藍囕二共日經蘭磷纜大疏楞𠻱林朗金軌𠺘壽命經𡀩日經邏攞羅砢洛臘哩𭌆利力魯楞㘑麗歴𭌈佛頂路盧虜慈氏嘞佛頂浪藍日經攬隣稜楞蘭二共佛頂臘隨求落日經瀝嚩婆啝啝媻𭭸切身慈氏𬻪切身同軌末沫靺拔罰尾毘鞞味八字文殊瑋韋二共法花維維摩詰經冒勃沒𮪶切身慈氏鞞鼙吠衞吠味𡲼切身慈氏廢癈冒舞毛金軌𢋑無古切羂索經鍐日經挽奉二共佛頂懵胎軌罔佛頂𭤚慈氏嗼日經縛奢捨賒爍舍釋日經鑠設舍三倶佛頂攝金軌柘太元帥軌室濕鎖詵輸舍扇隨求尸始金軌勝失八字文殊施佛頂尸師試施設室輸戍秫修首舜世勢輸戍睒苫羶法花昇勝大悲心呪餉歡喜天呪商佛頂陝千手軌閃釋鑠日經沙灑屣刹澁察瑟鏟殺師史使詵色隨求私試蓰數芻瑟澁曬胎軌曬殺上佛頂衫日經釤胎軌山嗦娑薩縒三參散拶颯隨求斯死枲隨求徙佛頂悉字記西徙日經枲佛頂蘇素酥祖修須窣塞佛頂遜羂索西細棲洗佛頂賽素操桑法花燥佛頂三參糝散僧常法花素訶呵賀㰤羂索歌佷恨紇頡呬紇纈護戸虎羂索係醯繋奚隨求界呼大疏護隨求法花斛號唅日經頷憾悍盱佛頂亹虚覲切羂索經矐日經郝金軌鶴胎軌壑金軌濫藍輪稜魯吽二合唐宗睿叉乞叉乞灑葛又乞察胎軌䞘灑羂索經上五種皆二合差荼羅矩荼盧爾反惠均刹佛頂史乞史二合差初几反法花芻乞芻二合栖乞曬二合佛頂差乞差二合閦蒭乞芻金軌崛芻造塔延命經屈數佛頂上三種共二合操鏟乞鏟胎軌吃衫日經乞參訖刪二倶佛頂上四種皆二合吃索二合日經已上對註雖似繁縷隨有所見載示童蒙所希後學梵書之者因是爲梯姑蘇雲師纂翻譯語博則博矣惜乎不委賒切少利後學讀之者著眼翫焉三釋餘義者問字記云次下十有四章並用初章爲字體又云此初章爲後相次六章之體此之二義似相矛盾如何答是有四義倶皆有由不可相非一以初章爲第二已下六章本體以六字各加初章諸字下建立第二已下六章故二第二至第十四章皆以初章爲本體第八已下七章唯以半體加字上爲異不失字源次第故上二義依字記三二至第十五章皆以之爲體第十五章雖諸字皆戴大空字字源猶守其次故是依林記四一十八章皆以初章爲體初章是諸梵文本源故又皆不出麼多體文外故第十六七兩章字源尚守其次第十八章字母失序字體無外故學者一義問第一字爲合字轉聲將又字母位乎爲之如何答既列之一十二字初故非字母位是合之轉之之字也但不有形音改變則切韻二音攝歸歸納一音故無別音字上横畫即是點故無別形若就字義則一切諸有所作字作業義不動當位本有不生故字義更非別理法華方便品中云諸有所作常爲一事字唯以佛之知見本不生理示悟衆生密説斯義也相通深旨思之問若如所説則字母位字又約形音義更無差別與合字轉聲位字何以取別答所疑有理今爲啓沃夫字母本位字者一切衆生生死輪迴作業當相也此位法爾有韻則不生妙理故字母字是迷悟一際猶如晦夜合宿際色本迷心本悟不二正當本有薩埵位是曰六大無礙常住瑜伽亦名毘盧遮那平等智身是以文字居體文位義趣住本初地也次合字轉聲位字者約形雖無別體寫字之人若得斯意而書之則本字母位修合字位不異自有別體喩如造木偶人而摸木偶人新舊木偶雖同而異其義可知又約聲雖無異音呼之人知而呼之則如和他典調不異有殊又約義則字母位字本有作業此中韻本不生理也合字位字修顯作業此中韻不生妙智謂佛知見也又是本有字母字修生合字位金剛薩埵也胎藏遍知院大安樂不空眞實金剛菩薩種子即此字也覽者知之大日經疏所謂覺修生知見自心從本已來不知本有妙理即是成佛本修不二還同本覺而實無覺無成已上疏文是之當也冀後書生得意而書則不生而生不増而増妙義在是不可不知非唯字初章第一位三十四字悉以如此歴形音義皆有深旨細心研覈即能詣極又就之有四句一本有約自體本有未合麼多是字母位字二本有約自體修生不動自性合麼多縁故是合之字三修生加引點故本有與第一字同音故是第二字四修生加點畫故修生音又轉故是乃至十字大日疏十七阿闍梨眞實智品云阿字遍一切字若無阿字則字不成要有阿字若字無頭即不成字阿爲頭也遍謂遍一切一切有事理謂言説理證眞言理皆遍故重云一切也乃至然迦字等若口無阿字之聲則不成字當知此字本無言説名字因阿字而得有也如人無頭即一切支分皆死此迦字等亦如是若不以阿字爲頭即不成亦不名字也故阿字爲命也乃至假令迦字若無阿但於喉中作短械聲道迦字不成也以加阿字即成迦故當知阿字不生迦是無作其義即是相應和合成他放此已上問當章諸字書法如何答先書乃至字三十四體文各一十二字都盧四百有八字次從各第二字已下加彼彼麼多字形各別而四百有八字宛然彰著是其書法也字記云先書短迦字一十二文從第二字已下加其麼多即字形別也是且約字下一十二字而實通一章何以知之者字記注文云先書字體三百九十六然將祇耶合之後加麼多準彼知之又藏四釋文下引此有平書擬對書著成音四科藏四云先須平書三十四科一十二字次以阿等十二字聲擬對毎科一十二字次以阿去聲點及以十麼多書著毎科後十一字後以毎科一十二聲爲上阿等十二字聲爲下一一對呼以成其音已上是又原字記文字記云初章將前三十四文此句兼毎科一十二字是明平書對阿阿等十二韻擬對呼之成音増以麼多書著又云迦之聲下十有二文並用迦爲字體平書以阿阿等韻擬對呼之成音増其摩多合于聲韻各成形也書著又云且先書短迦字一十二文平書從第二子已下加其麼多即字形別也書著用悉曇韻擬對呼之則識其字名也成音是之三文四段不次故然和尚倫次明之今世書一十八章之者毎字先書字母次加麽多如此則根本體文増加麼多似無埌埓字記所載西乾書法希依彼則矣二餘單章二初第二章二第三章初第二章又三初明名數二出字體三釋餘義初明名數者問何故名餘單耶答當章諸字皆足祇耶半體故字母爲單祇耶半體爲餘非全體字故猶如餘殘故云餘也號餘單章也問或曰祇耶則是字省也是不答有字記第二章注文云今詳祇耶當是耶字之省也已上即是所謂字有二種一本來半體字二字省上下之形也若約爲字省當章或應號重章謂重成爲重成爲等故取要言之約字形則半體合全體故名餘單約音義則兩音全存二義完備故名重章亦可祇耶本來半體文則約之獨號餘單省省全上下爲半體故半而有全用故約之或名餘單又屬重章字記第二章注云若然亦同除重是也問當章字數幾何耶答若爲増半體者非是重字故除重覽及里耶字體三十三故生字三百九十有六字記麁文意若云加省者是當體重故屬孤合章故此除之字記注文云今詳祇耶當是耶字之省也若然亦同除重唯有三百八十四是也二出字體者右字十二轉聲大概如此以此初一行規準一章諸字又以當章用音例知第三四五六七五章間有小違乃掲而示藏八云盎野此章可除之第十五章可存之又云今以五句第一句末仰字合後九字之上謂是屬第十五章可除一字已上今云第十五章字是呼連聲音第二章字呼義借音也二音字體雖同所用之音霄壞邈殊字記據此義故不除字然公未得的當矣已上牙聲五字了此中字音一音呼藥師大眞言并大佛頂呪等逝對註用是牙聲第二行中字音金界軌契對譯用此軌轍諸眞言漢註好意著看已上齒聲五字了三行用音十二轉音同但濁音異字音呼事藏八出是諸字皆字離故又各初音示意已上舌聲五字了已上喉聲五字了字藐對註用人聲呼是連聲法謂大佛頂呪中又下字上字涅槃點成下字上半字上字涅槃點成故如音成是一體不絶連聲軌則怪事已上脣聲五字了次因出當章字對註在諸眞言中者此中間有兩重麼多字是本屬當章字故此雜出唯別以肩書兩字又夫無空涅槃點之字注其韻字是據連聲也己也二合字記吉也二合胎軌紀耶二合字記枳耶二合同上紀以已下對註不必注二合讀者知之字記紀夷同上矩庾同上矩兪同上枳曳同上枳尳與蓋反同上句兪同上句曜庾告反同上矩焔同上迦上夜同上企也金軌迦夜青龍軌契金軌企孕立印遮之夜反引佛頂爾耶佛頂捨消災軌惹野北斗逝消災軌孺胎軌擾烏瑟軌荼雉也反金軌尼也胎軌惹佛頂底耶隨求丁夜金軌怛耶胎軌𬺼切身不空底孕佛頂底庾同上底聿隨求窟丁聿切羂索底曳佛頂帝曳金軌帝絏略出經帶曳胎軌點最勝王經姪千手大悲心呪儞也尊勝儞演金軌睍奴見切略出經儞也佛頂儞野隨求𠆙𭔞二共切身羂索經儞以胎軌儞庾佛頂儞曳隨求爾法花泥觀智軌儞庾金軌儞與寶樓閣地野隨求𠆙金軌儞庾隨求地蠅廣大軌地庾隨求殿佛頂金界鈿隨求杖羂索儞也胎軌若法華禰法花𩕳寅隨求寧演阿麼提軌撚焔曼比野阿麼提弭野隨求𡖺切身羂索尾也青龍軌尾野仁王軌梅無蓋反曳日經吠曳青龍軌微曳弭庾隨求弊夜佛頂毘也金軌便佛頂弊日經毘夜阿閦軌瓢𭍇𭍇胎軌毘庾同上便演胎軌毘焔金軌毘琰千手瑜伽毘藥隨求弊耶佛頂弊青龍沒藥胎軌藐佛頂藐造塔延命經唎耶佛頂里耶字記哩也如意輪念誦法哩野無量壽軌哩夜十一而軌哩曳隨求唎曳佛頂哩庾金軌哩演隨求哩郯閻曼徳迦軌問字當章除而不存十二字何以諸眞言中存字諸轉耶答縱而言則當章除之爲對第八章字耳若當章獨立何無轉生故不爲妨若奪而言則般若菩提除而不存餘家悉曇聲明論等軸溢緗帙彼中豈無勿以燕雀小知測鴻鵠霄也哩也隨求略里也反佛頂隷千手呪略盧遮反法華捨也金軌灑隨求使也金界曬隨求使喩金軌寫隨求徒也無垢淨光經細瑜祇經暹隨求呬耶佛頂呬野寶篋印呬夜寶樓閣醯胎藏問或曰當章諸字如等應二音呼枳耶之夜等或曰應一音呼之如呼迦捨等字兩義取捨如何答當章字體本是二合故須分字兩音呼之雖然不可遮一音而呼所上出遮𠆙寫𭍇醯等對註是其證也所以一音而呼者字鹽梅能助諸音類似於韻此故枳也底耶等二音而猶一音縱使呼遮𠆙亦未太乖之夜地野是以離合倶是不可偏取三明餘義者問字若字半體者應直呼以也何呼祇耶乎答喉舌脣三喉爲其本喉聲是迦迦轉聲中帶字本母音是枳音也故轉以也呼祇耶是且約爲本爲始也若遍亙諸音則應呼之也底耶比也儞耶里耶彌夜等故涅槃經呼蛇喪假反是出其一者也是則顯字具足諸字音矣重問何此字又具諸音耶答字類字近本韻而又遍諸字成鹽梅遍諸故自音又具諸其理可知若約深祕字義則字是乘義顯密大小言教無一不是乘也況復自宗直以等言文爲乘乘此寶乘直至道場非彼以名句爲關楔而不進學教法師道文字爲葛藤以廢置暗證禪人之屬所得而闚𨵦也是以大毘盧遮那經疏第二云如餘教中菩薩行於方便對治道次第漸除心垢禪門談無佛無衆生淨治心地又在此中經無量阿僧祇劫或有得至菩提或不至者今此教諸菩薩則不如是直以眞言爲乘超入淨菩提心門已上應知言文是乘故音遍諸字字具衆音亦復應知音又成鹽梅遍諸字則是言説本體故也無畏三藏所謂直以眞言字言説義爲乘字則二字爲諸字鹽梅之義也鹽梅是助縁是豈非三密金剛以爲増上縁乎形音義則是三密豈非眞言爲乘耶後之覽者熟察則可重問若然字有衆音太有深意何字記註文祇也音云訛乎答也音正音祇也傍音故且云訛音也問餘單即重章頗有深意耶答諸字皆成點畫是助縁修生隨縁門也字體是本法本有法爾門也衆字皆雖本有成助縁則修生故立餘單名雖然隨縁法體即法爾故云即重章也問合字之上下各省點畫有軌則乎答藏三四及要集記釋四種異一上省下存謂等二上存下省謂等三上下倶存謂等四上下倶省謂等也二第三章又三初明名數二出字體三釋餘義初名數者問此章生字幾多乎答此章除二字故字母三十有三生字三百九十有六名上已解二出字體者此章諸字用音皆同上章故不別注自下五章倣之當章各行第五第六二轉皆作之形書者勿誤藏八云可除盎羅字已上今云彼連聲法非今所用故不除之已下諸章五處分別不必下註讀者知之次因出當章字漢註注諸梵文傍之者兩重麼多字并帶空涅槃音之字皆準上知已下並同迦上略上字記倶囉同上迦略平字記吃囉胎軌羯羅瑜祇訖蘭孔雀王軌訖羅金輪念誦法己里字記機釐字記苟婁字記鉤婁呂鉤反字記倶婁同上矩嚕不空蘖囉胎軌誐囉同上釳囉同上吃哩金釳哩略出吃嚟金伽囉佛頂日囉胎上則日月之日打囉大日疏馹囉不空𮍗切身囉慈氏日哩金穰哩略出日唎金日嚧金日嚕略出折嚕略出日覽尊勝日𠻴金日㘓同上喞𠻱胎惹嚕吽大妙金剛經吒嚕吽胎拏嚕唵白傘蓋軌怛囉胎怛哩胎底哩寶篋底唎佛頂底哩同上怛哩觀智軌咄𭋳胎咄嚕佛頂怛𡃤胎怛㘑底㘑帝囇帝㘑四倶佛頂怛𡃤尊勝怛藍金怛𠸪金怛陵胎捺囉胎娜羅金涅哩佛頂訥嚧佛頂捺㘑隨求訥嚧佛頂捺藍金訥嚕吽大妙經地𠻱胎鉢囉胎跛囉必哩金畢囇必隷二共佛頂畢隷隨求薛茘玄應俾禮孔雀經鉢濫阿閦軌沒囉佛頂物囉同上沒胎沒囉胎沒囇胎奢羅字記室囉胎軌佛頂失囉佛頂尸羅日經室哩胎室囉集經師利法花輸嚕胎輸嚕吽胎訶羅胎賀羅紇唎胎頡唎胎紇林胎紇哩吽大妙經訖燐羅簡反引無量壽軌紇唎金訖哩𭋴唎金奚哩略出訶啉胎矩嚕吽大妙經賀㘑金二釋餘義者問當章迦略等者反切而成其音耶將本音耶答反音而非本音謂以兩箇半體合諸字則必反音也所以者何是省故有夷也音是省故有阿囉音此故己也字迦夷也二字反切迦夷合成己音也音不歸入迦故己加也音成己也音又迦囉字迦阿囉二字反切迦阿合成迦音囉音不歸入迦故迦加羅音成迦囉音是則夷也阿羅二字以韻爲上夷阿以聲爲下也囉韻夷阿在上故能與上頭字和合而轉自餘等聲在上韻各字有終韻在下故下字之韻不應超越自聲成上字韻若捨自聲而不取者更呼何音若不呼音者豈有有形無音耶以之思之前七章中第二第三兩章反音成枳耶迦略音是則兩箇半體類似點畫故也餘單之稱職而之由第四五六七章如本字音呼之無反音義謂聲與聲相對則反音難成之故也此義猶有分別至次下章詳已上創學鈔意問字記用迦略對註略字入聲何不如註字呼之耶答爲顯字具涅槃點音也凡遍口九字皆主涅槃點如上卷述故等多用入聲字而對註就中字本自舌起而遍口中涅槃點多分舌内故此字殊帶入聲也同上三重章四初第四章二第五章三第六章四第七章初第四章又三初明名數二出字體三釋餘義初明名數者問何名重章耶答就餘單重章得名振古諸師安然宗睿仁海寛智俊譽異義蘭菊各吐奇芬今據正傳述其本義謂前七章中唯單初章獨字母故唯重四五六七等二字重成故亦單亦重二三兩章亦單者非重全體故亦重者加半體故亙單重故立餘單名餘者簡單彰形重之義單者簡唯重示屬單之義後七章準之應解今章等立重名者四字體文字而非如半體而類點畫故也雖有衆説斯義爲正問當章生字凡幾多耶答此章除三字故母字三十有二生字三百八十有四二出字體者當章諸字下半字若惡書住處字法界字異形字又諍論字異形字混同住處字右竪點長下引字異形左右點一畫書左點端曲卷字異形右引點藏八云可除盎攞字今云第十五章是連聲法今哦攞字是如字呼故不可除次因出當章字對註在諸梵文傍者迦攞字記枳履胎稽禮金吃哩胎儞履胎弭履胎始㘑佛頂訶邏金呬履胎三釋餘義者問與合成迦攞音反切成其音不答反切成之音也問前云重章諸字非反切法今何却爲所反音乎答上約一往今就再往故非過失凡梵文合字之法必存二字合歸一音之勢是故無合字而非反音也雖然異漢字反音法之二字合成一音二音混成一音梵文之法隨形成音毎有其形無不發音是以二合成一不失本二音然合字日必以上字爲聲下字爲韻成一音聲勢是反音意也若能得此意則雖非聲韻和合成所生一音二字合呼其音自是反音也今且從親之疎論之應有四句分別謂一反之反體文加麼多成反音是也二反之不反第二三章諸字下加二字此字雖在體文中帶麼多音成夷也阿羅音故殊有類點畫之義是故云反然非純同麼多故云不反也三不反之反第四五六七章諸字下加字是也此四字者雖不帶麼多音猶是清濁未分字故猶有類韻之功雖然未如麼多并二字故云不反之反也四不反之不反除麼多并六字自餘之諸字合則無類韻之功故云不反之不反雖然此是一往分別而實諸合字皆有反音之功也重問所言諸合字皆反音呼之者如何答凡聲與韻則一音體聲用韻更非別法譬如燈與光光之凝結爲燈燈散亂爲光燈光殊異剋體無差今亦如是聲韻似殊其體實同謂韻遍聲初中後而施功譬如日輪欲出先發其光出已同時發光沒猶有光且約當章字者音前有韻此爲韻上爲聲合成迦音呼加下成迦攞音重詳言之則迦與攞欲直合者倶是聲故不能密合然迦與攞之中間有韻即前也此與上合時得歸一音初與上同故後自爲上有連合功如言字諸字準知微細翫味漢字反切亦復如是如徳紅切東音徳初與紅初合成音而連紅後韻成東音矣然則麁論門梵漢反切似有差別細論日究竟同歸本無異轍此故梵文一切合字皆反切成音也已上創學鈔四取要三密鈔卷中本終
