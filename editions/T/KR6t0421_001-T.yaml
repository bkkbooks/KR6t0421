body:
  text: 三密鈔悉曇三密鈔序詳夫悉曇梵章之爲學也入眞言門之閫閾升瑜伽堂之階梯不由閫閾而入門不踐階梯而升堂者未之有也故學金剛乘者要須先肄悉曇凡梵字有字相有字義所言字相者如中國隷楷訓詁竺乾人兒女走卒亦通習之若夫據字義則聲字實相法佛境界不染指眞道者雖大人耆宿非所得而窺窬佛言若出法性外別有世間文字者妄心謬見非眞言也自字義觀則世間文字即法然聲字亦是法身之語密也與身心二密平等無差故云法身三密一一皆至第一實際妙極之境語等於心身等於語所以名爲三密平等法門也悉曇三密之稱蓋亦由茲乎繹其世間字本有梵王毘伽羅論摩醯悉地囉窣覩等章厥餘支流者不可勝言曁悉曇之學流于中華高僧名士專攻純精者稍多獨山陰智廣法師撰悉曇字記嵩嶽一行禪師頌字母表學者服習以爲手鑑焉論其東被也肇弘法大師承來而著字母及釋義式弘其傳爾來吾邦禀味研覈立一家者亦復不少元慶中睿峯安然公編悉曇藏八卷多引經論章疏證義詳事洽博纖悉寔梵學之大成也然人猶或議間有拘攣顯網濶略祕要又始渉者多苦於檢閲矣有内州覺彦闍梨名淨嚴神智天發幻有奇童之聲嘗籍名野山礪刃講席歴扣淵匠搜羅玄微不幾歸歇於扮郷棲神于林下素粹於悉曇禪暇輒操觚纂悉曇三密鈔一部門目次第解義弗滯凡八卷靡不罄其祕要可謂悉曇門露裸裸赤灑灑豈非梵字之祕府而後學之奇珍乎至其會釋字義者詞義無礙如轉圓珠痛快醇至誠可嘉歎焉尋撰光明眞言觀誦要門二卷亦是眞觀誦之要門也名實不忒曷不欽若哉頃承寄予二部且索拙語爲辨於卷首予惟老極衰朽斷無文思固辭不諾而索之益力故筆此以塞其意云時貞享元年歳在甲子抄秋吉旦瑞應老比丘泊如運敞敬題悉曇三密鈔叙引有客問余曰頃聞子製悉曇三密鈔擅以竺邦文字傳會眞言教法漫爲字義眞實之説矣夫聲名句文也者則不相應法而非色心法體亦是因縁而生之假事也豈本有不改之眞理耶又子之所謂三密也者世尊名之於如來不測之身口意誰關世間麁淺之文字乎又問子翫味梵國之風俗果有何益子儻有説莫負鐘谷余從容而告之曰吁子來前余雖不敏蚤入密林或作樸樕試爲論之夫習分大小根殊頓漸或紆曲而到或直截而入是故如來設教三一作條顯密別科紆曲則顯教權巧直截則密藏本分也其顯教也者則寂滅理體説爲自然無作動轉事相以爲隨縁有爲或譚性具隨縁或立法界縁起雖誇事理融即而以事假理實假實體別果落隔歴故至其實説則泯事歸理遮情入空寂滅絶離以爲宗極金剛頂守護國界等經云一切義成就菩薩身證十地不見身心寂滅平等住如實際者是也佛華法華法界眞如及禪門所宗無位眞人本分田地當之矣次密藏也者則直示唯佛果地之法故不立常途如情之事理所謂事者色心也胎藏金剛也色則五大心則識大理者名色智者名心是此色心無始本有自然法爾常恒眞實無礙相應之故顯形表色名句文身聲香味觸飛沈動植無有一法而非眞實之者一塵包萬法而同歸一念收曠劫而融攝是故山河草木與人天鬼畜心性同一更不増減諸世天等與毘盧遮那徳相平等無有勝劣是則偏就此有爲事相而説不二未曾寄彼無相眞如而立圓融也若夫説因縁假有則隨迷情所見而權示之耳若約覺者所知則塵法常恒現起而超過生滅遠離假實更非彼因位言心之所能及也所以諸顯教中説之言斷心滅終不厝一言句也顯密優降權實差品以之可識矣曰若大日薄伽梵爲將來末世最上乘者據自覺聖智本地境界加持世間童蒙所知文字而説眞言道句法所謂梵書阿字等乃至迦字等是也斯阿字等則遮那恒演釋迦傳説淨天弘宣而約實體則達磨爾有常存不亡故大毘盧遮那經説祕密主此眞言相非一切諸佛所作不令他作亦不隨喜何以故以是諸法法如是故若諸如來出現若諸如來不出諸法法爾如是住謂諸眞言眞言法爾故上明法爾下示加持祕密主成等正覺一切知者一切見者出興于世而自此法説種種道隨種種樂欲種種諸衆生心以種種句種種文種種隨方語言種種諸趣音聲而以加持説眞言道下明眞言道及能所加持祕密主云何如來眞言道謂加持此書寫文字乃至祕密主以要言之諸如來一切智智一切如來自福智力自願智力一切法界加持力隨順衆生如其種類開示眞言教法下出教體云何眞言教法謂阿字門一切諸法本不生故迦字門一切諸法離作業故乃至訶字門一切諸法因不可得故無畏三藏説世尊以未來世衆生鈍根故迷於二諦不知即俗而眞是故慇懃指事言祕密主云何如來眞言道謂加持此書寫文字以世間文字語言實義是故如來即以眞言實義而加持之若出法性外別有世間文字者即是妄心謬見是則墮於顛倒非眞言也已上而此阿等即是形音形音必帶義趣形音則可見可聞豈非身語二密義則可念豈非意密形音全體即是義趣無二無別故云聲即字字即實相經云眞言相獨爲此也而以單言隻字含苞法界故禮誦之則曠劫業海忽竭修觀之則無始煩塵頓袪乃至現生證如來地故經又云眞言三昧門圓滿一切願所謂諸如來不可思議果具足衆勝願眞言決定義超越於三世無垢同虚空住不思議心起作諸事業到修行地者授不思議果是第一眞實諸佛所開示若知此法教當得諸悉地最勝眞實聲眞言眞言相行者諦思惟當得不壞句已上然則彼梵書者即是眞言道又是法佛法然三密而有如斯勝益然儞未辨顯密兩乘之大歸猥將空見小管而窺不生義天提偏執拙蠡而測無盡徳海苟加疑難豈可當耶客唯唯而退矣今剞劂氏請梓行之故叙其始末而以冠其端不顧鄙野之誚惟冀後之學者知其要樞云時天和第二龍集玄黓閹茂季夏初朔布灑星日住河州延命密寺傳瑜伽上乘小苾芻淨嚴書于寶輪堂三密鈔科目此書一部大分八門三密鈔科目終
