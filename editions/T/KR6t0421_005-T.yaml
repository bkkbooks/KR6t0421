body:
  text: 三密鈔卷中末第四門之餘二第五章二初明字數二出字體初明字數者名上已解問此章生字幾多乎答當章除三字故母字三十有二生字三百八十有四二出字體者當章所加諸字字或云不省上頭横畫也然諸梵文或省或不省如下見出藏八云應除盎嚩字今云彼連聲法今重字法故不應除次因出當章字對註在諸眞言等中者此中不加空涅槃點而注其音者即連聲法迦嚩入嚩胎什嚩佛頂攝嚩略出什皤集經怛嚩胎哆嚩佛頂埵底尾金底吠怛吠金哆吠佛頂怛微瑜祇怛鍐金怛挽瑜祇怛嚩金娜嚩佛頂今時人多字書是誤又前字埵字對註出是反音埵故正埵呼儞吠佛頂駄嚩娜嚩底哩三昧耶經特嚩金突嚩略出陀嚩地尾達凡略出特𭊃金特奉佛頂特懵胎儞尾瑜伽護摩軌尸嚩佛頂濕嚩尊勝澁嚩造塔延命經爍鉢千手大悲心呪室佛同上爍皤千手濕拂千手呪尸吠娑嚩胎塞嚩佛頂娑嚩隨求訶嚩胎賀嚩日經賀吠蘘麌利毒女軌三第六章又二初明字數二出字體初明字數者問當章生字幾多乎答此章除三字故母字三十有二生字三百八十有四凡此章諸字下加字右點引高書低書字省字混能用心世人下字書右點低如書是誤知事次因出當章字對註在諸梵文中者兩重麼多并空涅槃點字悉準上知迦麼怛麼金胎娜麼胎納麼胎隨求娜弭金納迷如意輪軌娜迷納謨娜𤚥寶篋印捨麼佛頂顯彌金濕茗尊勝濕弭菩提場莊嚴經參彌佛頂悉泯瑜伽護摩軌薩民略出經娑麼胎薩麼胎娑莽佛頂參麼悉弭訶麼訶弭佛頂訶彌佛頂憾銘隨求乞史麼瑜祇經四第七章又二初出字數二列字體初出字數者問當章生字幾多耶答此章除三字故母字三十有二生字三百八十有四二列字體者次因出當章字對註在諸眞言中之者兩重麼多并空涅槃音並同上看焉迦娜擬曩胎蘖南同上姑娜略出起娜起泥胎祇儞佛頂㘈儞佛頂覲曩隨求覲南立印軌怛曩胎怛寧金怛怒胎馱那胎般曩佛頂跛難隨求二後七章二初餘單章二重章初餘單章三初第八章三初明名數二出字體三釋餘義初明名數者問當章何名耶答名餘單章又名阿勒迦章初名者此章諸字上所加半體非全體字故猶點畫是以名餘單矣後名者取一章最初字名之如論語學而等名其篇焉據斯義故前七章又名迦迦章初枳也枳耶章二迦略迦略章三等藏八具出問當章生字幾許乎答此章除二字故母字三十有三生字三百九十有六此章諸字加等點或加上頭或加本體字如下出此一行用音以普一章通用又是以第十四章貫通反音軌則定藏八云此中下字莫必省頭已上次因出當章字對註在諸眞言等中者空涅槃點等注皆準上知阿勒迦上字記阿勒迦平同上伊上力同上伊力機同上歐鹿苟上同上歐鹿鉤平同上醫力葪醫力介阿勒勾阿勒憍脚號反阿勒劍阿勒迦去並字記諸眞言等中出當章字多不呼初阿音其漢註如下引焉又用當章字多連聲法然今時誦呪多直呼其音少用入聲若從本音定須入聲今粗出其證以告可畏希後學生無闕支分囉迦佛頂囉旨胎梨爾胎囉抳佛頂囉多胎㗚底金囉底隨求囉他金𡃤他金峯㗚他佛頂㗚體佛頂囉兎佛頂囉駄佛頂㗚𩕳隨求㗚婆胎囉薄佛頂囉婆同上囉嚩字記㗚吠胎囉奢胎囉捨千手軌囉灑胎履灑胎哩灑金哩使護摩軌唎瑟大悲心呪唎史佛頂哩晒佛頂㗚釤胎阿囉訶佛頂囉曷無量壽軌囉訶十一面軌阿囉罕佛頂阿羅漢法華次出連聲字者此中多一體不絶鮮有二體相續也薩嚩惹薩吠訥擗蘖婆者囉薄儗儞楞祇帝罔誐跛右並大佛頂呪陛儗抳灑冒跛霓引馱曩二合引彦嚩鉢囉丁野反剔迦達𩕳帝右並大隨求呪字當體重雖孤合章字今因便出後覽勿怪磨左涅佐涅惹儞社儞佐儞惹儞丁逸反左竝同嚩拏舊云涅槃部涅素娜曩磨薩鍐矩嚕懵散寧右並胎軌馱哩白傘蓋軌儞逸反尾他婆也賀㘑摩沙磨怛那羯迷右並金界軌次上二件亦當體重因便附出蘖誐哩隨求蘖底尊勝千眼大悲心呪引誐菩提場莊嚴經儞捨寧寶樓閣經毘吉利帝涅瞿沙禰涅伽陀尼右三法華經娑達泥八名經呪娑鉢捨曩千手軌底金輪王念誦法是亦孤合章字因便附出多耶不空羂索經是又孤合章字三釋餘義者問自當章至第十四章通冠字有何故乎答示三十四體文應各加前七章字上之義其中且擧字以爲規準也重問字記釋第十五章名異章之所由云不由韻合名爲異章已上探此文意前十四章以唯清非濁類韻之六字加諸字而建立故是由韻合也第十五章異之故云不由韻合若如還答後七章又有不由韻合之義何至第十五始立異章名乎重答凡異章得名有兩所以一如所引二云不得依字呼之異於諸章故云異章已上若依斯文更無違乖但會來難者凡一十八章建立擧略示廣所有梵法無不該攝所謂前七章中初章唯單字母無別意趣後六章以初章爲體各成二合言其合法三十四字各有合成用無所局故若具示則以字加初章字下乃至以字加初章字下應成三十四章并初章成三十五章然三十四字中取等六字以爲楷式使知餘字亦爾殊取六字則以類韻也後七章又前七章字上各加一字是又通三十四字故具出則有三十四種三十五章乃成一千一百九十章今略示方隅故唯以字加前七上示餘復然殊取字六字之中親韻義強今就現前建立論之前十四章皆悉由韻故云不由韻合也不妨別有多章誰敢難當知今斯一十八章略而不漏爲梵書之大觀也重難前七後七相待而立未甞言合餘字何忽致無窮暗推耶重答雖不字記云爾見他師悉曇章或以字字加於諸字之下佛哲智慧輪等或以字加諸字上佛哲全雅等或以字加諸字上全雅智慧輪等建立其章是則擧一示一之明證也若云六字之外無増加字者其故如何餘字已有其證所立之義何不然乎若今字記異章已前唯局六字者一十八章未盡梵法智廣又招不究微致之譏切勸但知一十八章以略攝廣摭要就簡諸難自遮重難鐘谷不默酬答誠詳若以前十四章爲軌轍恣合餘字者與彼第十七章如何異乎第十七章雖字源守次能合字無窮盡難覺之稱良由斯矣若濫之者虚設何益重答第十七與前來所言之建立對望有三異一彼第十七二合或三四五合多少不定此最初單字成章次三十四章二合成章次一千一百九十章或二合成章或三合成章而不錯亂也二彼無其字而呼阿聲此但如字呼也三彼一章之中能合字多數此彼彼章必以一字貫通以三事故前後相貎玄黄異色勿恐相濫重問指示明細疑關頓開但前所聞字殊親韻者是有何義重答此有三重初三十四字中六字有類韻之功次六字中二字殊帶麼多音而施韻功用後字雖帶音不直呼或呼祇耶或稱蛇未如字直呼音是以前言字獨親韻義彊故於後七章殊簡用之也重問字近韻雖領其旨加字上頭猶嬰疑網請爲啓沃重答此有二由一若第八章以字加諸字下則與第三章全同今恐其濫故加初章上第八已爲後七上首戴字故後之六章隨皆加頭二前十四章皆用初章爲字體體是猶聲所加則用亦是猶韻是此體用陰陽理智表示有彊弱異前七章中後之六章以等六合諸字下上聲體彊下韻用弱後七章中後之六章若下合之以韻合韻力用微劣其音叵成若體上下加韻字則力用増強連持有功後六章已加上故第八順之加上頭也已下一義淨嚴加之私解第三以爲諸字足者阿羅阿音逼附體聲其音易成第八已下通爲字冠阿是開口之初必在諸音之先若終不冠上頭則此義遂隱沒今賞阿音故在字上猶有深義至下應悉重問以加上其義應知何不呼阿羅迦呼阿勒迦耶重答先囉呼勒凡有二由一爲顯字具諸韻謂韻者不過五今擧初後攝其中間若呼阿羅倶是韻此義不彰故用勒音二所引入聲借音韻故呼勒音謂借音韻即脣聲也勒韻又脣聲也本末雖異倶脣聲故相連有便若呼阿洛韻喉内音脣内超越舌内喉脣連屬其音不便故用勒音字記後段第八章字具出之中字諸轉阿伊甌等音悉呼之是良證也但此義頗叵甘心次用入聲者林記云羅迦其音逼附故致勒音已上逼附二字連合之時自下字連上字成涅槃音是自音成他連聲也已上七重問答出創學鈔第四卷二第九章二初明名數二出字體初明名數者問斯章又名餘單是何義乎答當章上下共是半體故字體爲單二半爲餘號餘單章問當章字數又如何答此章除三字故生字三百八十有四若爲本來半體則不除故生字三百九十有六二出字體者當章至第十四章六章用音反切軌轍同第八章故不煩注藏八云應除郎野今云彼連聲法此如字呼故不應除問重體加諸字上者爲無音非字其故如何答字初具音是本不生際如木之根似水之源支派應多根源豈二是故不可有阿羅阿羅之音復次上字如主下字如伴伴類應多主必須一若重加上似有二主故爲重重非字也但第二義似理不盡當章字諸眞言中或有在也然未詳其對註字記唯出其初二字阿勒己也阿勒枳耶三第十章又二初明名數二出字體初明名數者問何此章亦名餘單耶答此章上戴下履上下共是半體故字體爲單半體爲餘名餘單章問當章字數又幾何答斯章除二字故母字三十有三生字三百九十有六二出字體者藏八云應除郎囉字今云彼連聲法此如字呼故不可除也當章字諸眞言中或有在也然未詳其對註字記唯出其初二字阿勒迦略上阿勒迦囉二重章四初第十一章二第十二章三第十三章四第十四章初第十一章二初明名數二出字體初明名數者問何名重章耶答此章已下至第十四章第四五六七章字上各冠囉半體故亦同彼名也問當章字數又如何答此章除三字故母字三十有二生字三百八十有四斯章諸字用音皆同次上章故不煩點也二出字體者藏八云應除郎攞字今云彼連聲法是如字而呼故不應除也此章中字諸眞言中在無未詳唯字記中出初二字對註阿勒迦攞阿勒迦攞二第十二章又二初明字數名上已解二出字體初明字數者問當章生字又幾許乎答斯章除三字故母字三十有二生字三百八十有四二出字體者藏八云應除郎嚩字今云彼連聲法此如字呼故不可除也此章諸字諸眞言等中或有出也未詳所註字記唯出其初二字阿勒迦嚩上阿勒迦嚩平三第十三章二初明字數二列字體初明字數者問斯章所生字數又幾何乎答當章除三字故母字三十有二生字三百八十有四二出字體者此章諸字諸眞言等中未詳其對註唯字記中出其初二字阿勒迦麼阿勒迦麼四第十四章二初明字數二出字體初明字數者問當章所生字數又如何答此章除三字故母字三十有二生字三百八十有四二出字體者此章諸字對註諸眞言等中未考其所出唯字記中出其初二字阿勒迦那阿勒迦那右前十四章建立了斯等諸章皆由韻合依字呼之此故一列建立自茲已下四章自存差異彼彼章下指示梗概須者往檢三密鈔卷中末終
