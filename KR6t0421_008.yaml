body:
  text: 三密鈔卷下下二體文二初五句二遍口初五句二十五謂迦上字門一切法離作業故金剛頂大日經同之稱迦上字時是入業異熟聲文殊問唱迦上字時出入業果聲大莊嚴明覺曰大論云迦羅迦秦言作者文造也作也業也已上迦者於諸衆生起大慈悲生於子想明覺曰悲也如羅羅作妙善義是故名迦涅槃經唱迦字時入般若波羅蜜門名無差別雲華嚴稱迦上字時入差別種類般若波羅蜜門悟一切法作者不可得故四十二字門迦字門入諸法作者不可得故大品清涼大疏云迦字悟作者不可得則作業如雲皆無差別鈔云既無作者何有作業業既如雲不可承攬無我無造故無差別已上大日疏第七云迦字門云一切諸法離作業故者梵音迦哩耶是作業義如諸外道計有作者使作者等諸部論師亦説有作有作者有所用作法三事和合故有果報若因般若方便謂有決定即墮無因若墮無因一切法即無因果能生法名因所生法名果是二法無故作及作者所用作法罪福果報及涅槃道一切皆無復次作作者相因待生若定有作法則當定有作者皆是不異外道論議如中論觀作作者品中廣説今正觀察作作者等悉從衆緣生即入本不生際解曰因緣所生三法悉本有法界故即緣生法即入本不生際本不生際者有佛無佛法爾如是誰造作之首乎是故若見迦字則知一切諸法皆是造作所成名為自相是則字相則顯若是作法者當知畢竟無作本不生故無有可始作法名為真實義也是則字義則祕守護國界主陀羅尼經第三陀羅尼品云迦上字印者遠離世論無作者故已上私會諸義者業因是作者異熟果則所作法大慈大悲是佛菩薩所作羅睺羅受如來遺寄護持像教利濟有情如此慈雲不別怨親普皆覆燾有作則諸法差殊無作則一味平等若約玄祕即作法爾則法位本體凡聖因果歷然峙立是凡即是佛之旨大安樂菩薩以字為種子深思應知佉上字門一切法等虛空不可得故金剛頂大日經稱佉上字時是出一切法等虛空聲文殊問大莊嚴呿字入諸法虛空不可得故大品呿伽秦云虛空大論唱佉字時入般若波羅蜜門名修因地智慧藏華嚴稱佉字時入現行因地智慧藏般若波羅蜜門悟一切法如虛空性不可得故四十二字門清涼疏云佉字即如虛空性鈔云若會經者智慧等空故能含藏已上呿者名非善友非善友者名曰雜穢不信如來祕密之藏是故名呿涅槃大日疏第七云佉字門一切諸法等虛空不可得故者梵音佉字是虛空義世間共許虛空是無生無作法若一切法本不生離諸作是畢竟如虛空相今此空相亦復不可得也何以故如世間無色處名虛空相色是作法無常若色未生未生則無滅爾時無虛空相因色故有無色處無色處名空中論觀六種品中廣説此中義亦如是若色本來不生何者名為無色處無色處不可説則無虛空定相復次諸法如虛空相是為不誑相如涅槃經説五陰滅更不生餘五陰是涅槃義若五陰本來不生今何所滅而名涅槃耶是故如虛空相亦不可得是佉字門真實義已上守護國經云佉字印者悟如虛空無盡法故已上問所前聞字相則顯字義則祕今所引大品呿字諸法虛空不可得與兩部大經所明等空不可得義如何差別答語言則同其心則異其例多在大品言虛空不可得指寂滅真理謂若言虛空是有空一相空相亦無是曰不可得所謂畢竟空故不可得之者也是顯乘至極證理所謂字相也兩部大經所説等空不可得太與彼異指顯教所説無相絶離境界曰等虛空然此絶離唯是偏空未證有空不二大空偏空智是則生佛而二隔執亡不二大空智彰矣是曰不可得是則本不生實義表德玄談也即密藏本分字義則祕也亦復應知等空即不可得也大師即身義指等虛空字相釋即是空大是當相即道深旨也守護經云如虛空無盡以之知字實義非唯絶空非面叵罄深義更問誐上字門一切法行不可得故兩部大經云行也伽字門入諸法去者不可得故大品去者即行也若聞伽字即知一切法底不可得伽陀秦言底大論稱誐字時入普遍輪長養般若波羅蜜門悟一切法行取性不可得故四十二字門唱伽上聲輕呼字時入般若波羅蜜門名普安立華嚴清涼疏云伽字即一切法行取性鈔云若會經以行取故而能安立智論云如上引釋曰行取即生死底甚深故已上稱誐上字時是甚深法聲文殊問唱伽上字時出甚深法入緣起聲大莊嚴云甚深也伽者名藏藏者即是如來祕藏一切衆生皆有佛性是故名伽涅槃云藏也大日疏云哦字門一切諸法一切行不可得故者梵云哦哆也二合是名為行行謂去來進退不住之義今從阿字門展轉釋之以諸法本不生故無作無作故則無所待對可説為空空者即是不行處不行處尚不可得況行處耶中論觀去來品明行止義以相續故名行如從榖子生牙莖葉及無明緣諸行等以斷故名止如榖子滅故牙莖滅無明滅故諸行等滅若法已行則無行已行故未行亦無行未有行法故行時亦無行不離已行未行故以如是等種種門觀察畢竟無行無行故則無所止以無行無所止故則是無有往來諸趣者亦無住涅槃者復次若人不動本處即是所詣處者當知是人無行無到故云一切行不可得也已上守護經云誐字印者入甚深法無行取故已上私會諸義者有行有取入生死海底深難窮無行無到是法性海底又甚深安立生死長養有情惟行取故真如無行是如來藏廣大無涯澄深無底法性行來緣起甚深不可窺𨵦此有相義應甄思擇伽去引字門一切法一合不可得故兩部大經伽字門入諸法厚不可得故大品若聞伽字即知諸法不厚不薄伽那秦言厚大論稱伽去字時入持一切法雲堅固海藏般若波羅蜜門悟一切法厚平等性不可得故四十二字門唱伽上聲字時入般若波羅蜜門名持一切法雲堅固海藏華嚴清涼疏云伽字即厚平等性鈔云若會經者如地之厚平等能持亦能含藏如海平等能持能包雲雨説法智論云如上引釋曰厚薄之事事則已入般若矣已上稱伽上字時是摧稠密無明暗冥聲文殊問唱伽字時出除滅一切無明黑暗厚重翳膜聲大莊嚴𠷐南云重音伽者如來常音明覺曰音也何等名為如來常音所謂如來常住不變是故名𠷐大涅槃大日疏云伽字門一切諸法一合不可得故者梵云伽那是密合義如衆微相合成一細塵諸蘊相合而成一身等中論觀合品諸論師言以見可見見者三事故而有所見當知有合聞可聞聞者乃至染可染染者等諸煩惱亦然答者云凡物皆以異故有合而今一切法異相不可得是故無合如彼廣説以字門展轉相釋故且以行義明之凡有所行當字必有行可行行者三事相合今一切法本不生故則無所行若無所行云何行可行行者得合耶復次若諸法各各異相終無合時若至本不生際則無異相亦不可合是故一切法畢竟無合也已上守護國經云伽上字印者散滅重雲無明翳故已上私解一法才起則二法存乃至展轉無量無邊是故無明雲厚則白善薄善法淳厚則黑業薄若證性空無厚無薄是大品意若會諸義者物合則厚轉成薄物離則厚變成薄若無合相則無離相無離合故自無厚薄無無明重雲衆生故亦不須覺智説法是遮情義字相復次離合厚薄皆本有故無明大地法性智海並咸不生合者塵滴皆同六大真如離者飛沈差異各自建立一多法界無礙融攝是表德義字義仰鼻聲呼字門一切法支分不可得故金剛頂明覺曰支也分也唱哦字時出銷滅衆生十二支聲大莊嚴稱仰字時是五趣清淨聲文殊問華嚴大品守護國等經不説字大日經亦同之故大疏不釋之大涅槃云俄者一切諸行破壞之相是故名俄已上釋曰十二支十二因緣總舉因業果五趣別約苦報一切諸行者諸有有為遷流造作之法如是之法悉皆緣生無性即是字相顯教復次諸法皆有支流分齊悉從本際是不可得字義密藏是又大空故大疏十四云若見仰等五字當知即大空之點也大空離一切諸相緣起之相即是成佛義也已上大日經第六百字成就持誦品第二十二云仰壤儜曩莽等於一切法自在而轉已上是則有空不二實義也左字門一切法離一切遷變故兩部大經遮字門一切法終不可得故諸法不終不生故大品若聞遮字即時知一切諸行皆非行遮梨夜秦言行大論稱左輕呼字時入普輪斷差別般若波羅蜜門悟一切法無諸行故四十二字門唱者字時入般若波羅蜜門名普輪斷差別華嚴清涼疏云者者諸法無有諸行謂諸行既空故遍摧差別鈔云大般若云入者字門悟一切法遠離生死若生若死皆無所得釋曰諸行即生死體也然諸經多明生死之行大品涅槃義當遮字俱明出世之行大品云遮字修不可得涅槃云遮者即是修義調伏一切諸衆生故然出世行亦不可得方為般若之門耳已上明覺曰修斷也唱者字時出觀四諦聲大莊嚴稱左字時是四聖諦聲文殊問明覺曰四聖諦也大日疏云遮字門一切諸法離一切遷變故梵云遮庾二合底即是遷變義又梵音遮唎耶是諸行義如見遮字時即知諸行遷變不住中論觀行品云諸行名五陰以從諸行生故是五陰皆虛妄無有定相如嬰兒時色乃至老年時色中間念念不住分別決定性不可得性名決定有不可變異如真金不變今諸法雖生不住自性是故當知無性如彼廣説若無性者即是本初不生本初不生者即是如來之身六大法身也常恆安住無有變易故云離遷變也復次若一切法必是和合所成則有遷變今諸法無生無作乃至略等虛空義也無所行故則無和合無和合故則離一切遷變是順旋轉凡諸字門皆當逆順旋轉相釋使無罣礙今且約次第相承耳已上守護國界經云者字印者眼及諸行皆清淨故私云是眼義也私釋逆旋轉者凡無遷變者字必無去來絶去來故無可和合字無有和合則無能行亦無所行字無能所行故湛如虛空字如虛空故不見作及作者字無造作故本不生字自下諸字皆準而釋又會四聖諦義者苦集則流演遷變道滅則還滅遷變若語深義四者皆本來不生故經説日可令冷月可令熱佛説四諦真實無異豈非遷變即無遷變耶復次眼根動靜不定是又遷變磋字門一切法影像不可得故金剛頂大日經明覺曰影也稱磋字時是不覆欲聲文殊問唱車上字時出永斷貪欲聲大莊嚴稱磋上字時入修行加藏蓋差別道場般若波羅蜜門悟一切法欲樂覆性不可得故四十二字門車字門入諸法欲不可得故如影五衆亦不可得故大品若聞車字即知一切法無所去伽車秦言去大論唱車上聲呼字時入般若波羅蜜門名修行方便藏各別圓滿華嚴清涼疏云車字即欲樂覆性鈔云車字別譯為縒若會經文既方便隨喜樂故各別圓滿智論云若聞車字即知一切法無所去以伽車秦言去故大品亦云聞車字時入諸法欲不可得而論云去者以放光云車者無可棄去即是樂欲所去耳明覺曰欲也車者如來覆蔭一切衆生譬如大蓋是故名車涅槃明覺曰普賢讃云縒怛羅二合傘蓋也文千字文云大日疏云車字門一切諸法影像不可得者梵音車上野是影義如人影像皆依自身如是三界萬法唯是識心因緣變似衆境是事如密嚴經廣説乃至修瑜伽者有種種不思議事或能面見十方諸佛普現色身亦皆是心之影像以心本不生故當知影像亦無所生無所生故乃至心無遷變故影像亦無遷變所以然者如影自無定性行止隨身心影亦爾以心動作戲論無一念住時故世間萬用亦復為之流轉若了心如實相時影亦如實相故不可得也已上守護國經云者捙上二合字印者遠離貪瞋癡覆性故已上私會諸義者凡物覆蔭則必有影生三毒蓋心則境界之影像散漫而生又一念樂欲定覆淨心樂生則覆死樂有則覆空若無蓋覆則無來去如來慈悲方便覆蔭法界衆生各各圓滿彼彼樂欲如是事事皆住本際畢竟常住無起無滅是為字實義問守護經云者捙二合如何答重合則字異形故則是形問何故重之答影像必有本質今自心轉動字以為本質故是心字即心故深義更問惹字門一切法生不可得故兩部大經稱惹字時是超老死聲文殊問唱社字時出度一切生死彼岸聲大莊嚴闍者是正解脫無有老相是故名闍涅槃闍字門入諸法生不可得故大品若聞闍社音字即知諸法生老不可得闍提生也闍羅老也秦言生老大論稱惹蘇我反字時入世間流轉窮源清淨般若波羅蜜門悟一切法能所生起不可得故四十二字門唱社字時入般若波羅蜜門名入世間海清淨華嚴清涼疏云社字即能所生起鈔云若會經者有能有所是世間海故賢首品能緣所緣力一切法出生速滅不暫停念念悉如是今不可得成般若矣已上惹字門一切諸法生不可得故者梵云喏哆也是生義如泥團輪繩陶師等和合故有瓶生縷繩機杼織師等和合故有㲲生持地築基梁椽泥草人功等和合故有舍生酪酪器鑽人功等和合故有酥生種子地水火風虛空時節等和合故有牙生內法因緣亦如是無明行等各各生因而復生是故若見惹字門即知一切諸法無不從緣生如説偈言衆因緣生法是即無自性若無自性者云何有是法是故生不可得也外道論師説種種邪因緣或無因緣生一切法佛法中人亦有失般若方便故取著因緣生滅相如中論廣破復次阿字門是諸法本性不生惹字門以十喻觀生雖從緣有而不可得若生畢竟不可得則不異無生際又十喻是心之影像影像不出法界故生亦不出無生際也已上惹字印者超過老死能所生故守護國經若會諸義者老是異相生死是滅相生流轉則無明生窮源則法性生諸法本有即生不生是為字實義鄼上字門一切法戰敵不可得故兩部大經稱鄼才舸反字時是制伏惡語言聲文殊問唱闍字時出降一切魔軍衆聲大莊嚴膳者南云重音闍煩惱繁茂喻如稠林是故名膳大涅槃大日疏云社字門一切諸法戰敵不可得故者梵云社麼攞是戰敵義若見社字則知一切諸法皆有戰敵如世間善不善法逆生死流順生死流法布施慳貪持戒破戒乃至智慧無明等更相待對勝負無常乃至如來出世以一切智力破魔軍衆亦名為戰然一切法中我義不成故智慧煩惱竟為屬誰而言毗婆舍那此云觀能破煩惱耶若言明生時暗滅故名為破者為已生故破未生故破耶已生則無暗更何所破未生則自無有體又何能破若生時名為半已生半未生故明暗畢竟不相及又一切法本不生乃至無影像故便同一相不出於如云何佛界如與魔界如戰故佛坐道場時但了知諸法無對而世間談議自立戰勝之名耳已上私會諸義者制惡語言是戰勝義煩惱與智戰四魔本自不生則戰即無戰遍周法界無有不戰之者無有不勝之者是戰敵之實義娘上字門一切智不可得故金剛頂日經不説字是故大疏不釋稱娘上字時是制伏他魔聲文殊問智為自魔為他唱壤字時出覺悟一切衆生聲大莊嚴若者是智慧義知真法性是故名若大涅槃私云若以字為二合則字字義須附于茲大品云若字門入諸法智不可得故已上大論云若聞若字即知一切法中無智相若那秦言智已上守護國經云枳攘二合字印者一切衆生智慧體故已上四十二字門云稱娘輕呼上字時入生世間差別般若波羅蜜門悟一切法能所知性不可得故已上華嚴經云唱壤字時入般若波羅蜜門名作世間智慧門已上清涼大疏云壤字即能所知性鈔云若會經者能所知性即智慧門能知為智慧智慧即門所知為智慧智慧之門智論云如上引釋曰但有能知必有所耳已上吒上字門一切法慢不可得故兩部大經稱吒上字時是斷結聲文殊問斷或作聲結或作語唱吒上字時出永斷一切道聲大莊嚴吒者於閻浮提示現半身而演説法喻如半月是故名吒大涅槃吒字門入諸法驅不可得故大品若聞吒字即知一切法此彼岸不可得吒羅秦言岸大論稱吒字時入無我利益衆生究竟邊際般若波羅蜜門悟一切法相驅迫性不可得故四十二字門唱侘字時入般若波羅蜜門名以無我法開曉衆生華嚴清涼疏云侘字即相驅迫性謂無我以曉之即為驅迫鈔云智論云如上引釋曰即無我以驅迫令至彼岸亦不可得若約表位此當等覺故法身欲滿始本欲齊故亡二岸已上吒字門一切諸法慢不可得故者梵音吒迦囉是慢義謂見彼法卑下此法高勝如三界六趣種種優劣不同所起慢心無量差別略説有七種相如毗曇中廣明乃至求三乘人猶有上地下地不平等見今觀諸法無生乃至無待對故則知阿耨多羅三藐三菩提於法平等無有高下是故如來亦名一切金剛菩薩亦名四果聖人亦名凡夫外道亦名種種惡趣衆生亦名五逆邪見人大悲漫荼羅正表此義也此文甚有深意守護國經云吒上字印者斷生死道得涅槃故己上私會諸義者斷結斷一切道是有敵對見此高彼下是慢故此岸生死卑下之法彼岸涅槃高上之法也示現半身是應身對于滿月法身則下也大日疏八云薩跢二合𪘜岸也已上此以下字為字界歟上字下等亦準而應知吒上字門一切法長養不可得故兩部大經稱姹上字時是出置答聲文殊問大莊嚴咃南云侘者法身具足喻如滿月是故名咃大涅槃他字門入諸法處不可得故大品若聞咃土荼反字即知諸法無住處南天竺咃那秦言處大論稱吒上字時入願往詣十方現前見一切佛般若波羅蜜門悟一切法積集性不可得故四十二字門唱吒字時入般若波羅蜜門名隨願普見十方諸佛華嚴清涼大疏云吒字即積集性鈔云若會經者積集念佛故能普見智論云如上引釋曰即積念念即處也巳上大日疏云吒字門一切諸法長養不可得故者梵音毗吒鉢那是長養義如世間種子為因五大時節為緣漸次滋長得成果實內法亦爾於業田中下識種子無明所覆愛水所潤而得滋長如稻竿經中廣明今此經違世順世八心相續增長亦有因緣乃至淨菩提心以五字門為緣生大悲根佛娑羅樹增長彌布滿於法界然一切法即由此五字門本不生離言説自性淨無因緣如虛空相故長養不可得復次從阿迦字以來展轉相釋乃至諸法畢竟平等無有高下以無高下故當知即無有增長也已上守護國經云姹字印者積集諸行窮盡體故已上私會諸義者積集惡行長養生死積集聖行長養法身長養故能使令圓滿是則窮極之處復次捨置記答則無措問之處即能長養答者之義拏上字門一切法怨對不可得故兩部大經稱拏上字時是出攝伏魔諍聲文殊問唱拏字時出斷一切魔惱亂聲大莊嚴荼者是愚癡僧不知常與無常喻如小兒是故名荼大涅槃荼字門諸法荼字淨故大品若聞荼字即知諸法無熱相南天竺荼闍他秦言不熱大論稱拏上字時入普遍輪般若波羅蜜門悟一切法離熱矯穢得清涼故四十二字門唱荼音徒解切字時入般若波羅蜜門名曰普輪華嚴清涼疏云是普摧義鈔云智論云如上引釋曰若荼是不熱則前離熱以是所遣得清涼故方為般若之相已上大日疏云拏字門一切諸法怨對不可得故者梵音云拏麼囉是怨對義如世間仇讐更相報傷故名為對又前云戰敵是彼此相加此中怨對是避仇之義梵音各自不同毗尼中佛説以怨報怨怨終不絶唯有無怨怨乃息耳又説女人是梵行者怨無量義經亦説生死怨敵自然散壞證無生忍半佛國寶是故行者見拏字門時則知一切法悉有怨對名為了知字相又以諸法本不生乃至長養不可得故當知怨對亦復本來不生乃至無有長養是故如來畢竟無有怨對名為字門真實義也已上拏上重字印者離諸怨敵及憂惱故守護國經私會諸義者有怨對則熱惱摧滅熱惱是清涼輪愚癡則智慧之怨讐法性大癡不分怨親魔佛同如是無諍怨對之實義也荼去字門一切法執持不可得故兩部大經稱荼字時是滅穢境界聲文殊問唱荼字時出一切境界皆是不淨聲大莊嚴袒者南云重音荼不知師恩喻如羝羊是故名袒大涅槃荼字門入諸法邊竟處故不終不生過荼無字可説何以故更無字故大品若聞荼字即知一切法必不可得波荼秦言必荼外更無字若有者是四十二字枝派大論稱荼引去字時入法輪無差別藏般若波羅蜜門悟一切法究竟處所不可得故四十二字門唱陀字時入般若波羅蜜門名一切法輪差別藏華嚴清涼疏云陀字即究竟處所謂此究竟處含藏一切法輪鈔云智論云如上引釋曰唯至究竟為必不可得故般若中以無所得則得菩提又約表位此四十二當妙覺故大品云荼字門入諸法邊竟處光讃云是吒字門一切法究竟邊際盡其處所無生無死無有作者皆菩提意也若約初發心時便成正覺則初阿最後荼已上荼者一切諸法無有畢竟大集經大日疏云荼字門一切諸法執持不可得故者梵音瑒迦是執持義以荼字上安置點是故轉聲為瑒其體則同又云蘖哩訶者亦是此別名經云鬼魅所著或云非人所持智度云著衰皆是蘖哩訶鬼所作以著人不相捨離故以為名其日月五星等亦以終始相隨故梵語名蘖哩訶翻為九執正相會一處天竺曆名正著時此執持義與陀羅不同也見此荼字門即知一切衆生從無始來為四魔所著不能捨離是名字相今以阿字等種種門展轉觀一切法皆不可得故當知一切法無有怨對以怨對本不生故終不以平等法界執著平等法界故云一切諸法執持不可得也已上又云第十九或災變離故荼字形現是災變義謂世間蝗蟲水火之異及盜賊侵伐來是也私會諸義者愚癡如羝羊故汚穢不淨諸法畢竟似彼極癡一切法輪能滅穢境界癡故執著癡著故災變起邪崇生若滅穢境災變自除如綖貫花衆花一串都歸一撥拏陀爽反仍鼻音呼字門一切法諍論不可得故金剛頂稱拏鼻聲呼字時是除諸煩惱聲文殊問唱拏上聲字時出永拔微細煩惱聲大莊嚴拏者非是聖義喻如外道是故名拏大涅槃稱儜上字時入字輪積集俱胝字般若波羅蜜門悟一切法離諸喧諍無往無來行住坐臥不可得故四十二字門拏字門入諸法不來不去不立不坐不臥故大品唱拏嬭可切字時入般若波羅蜜門名觀察字輪有無盡諸億字華嚴經清涼疏云拏字即離諸喧諍無往無來行住坐臥謂以常觀字輪故鈔云智論云若聞拏字即知一切法及衆生不去不來不生不滅不臥不立衆生空法空故南天竺云拏秦言不故釋曰去等即是喧諍無即是不上二俱不可得方為般若已上私會諸義者諸字相別是有諍論諸義盡歸本不生則無復諍論是旋轉字輪之實義也餘如清涼多上字門一切法如如不可得故兩部大經稱多上字時是真如無間斷聲文殊問唱多上聲字時出一切法真如無別異聲大莊嚴多者如來於彼告諸比丘宜離驚畏當為汝等説微妙法是故名多大涅槃多字門入諸法如相不動故大品若聞多字即知諸法在如中不動多他秦言如大論多上字印者悟一切法真實義故守護國經稱多上字時入照曜塵垢般若波羅蜜門悟一切法真如不動故四十二字門唱哆音都我切字時入般若波羅蜜門名圓滿光華嚴清涼疏云悟一切法真如不動故不動則圓滿發光鈔云如密室燈定如止水影圓契於如如知無動矣已上大日疏云多字門一切諸法如如不可得故者梵云哆他多是如如義語勢中兼有得聲證得如如即是解脫義如謂諸法實相種種不如實見戲論皆滅常如本性不可破壞若見多字門即知一切諸法皆是如如相名為字相然有一類外道計有如如之性若知見此有名為解脫雖作此説只是於我見上轉作異名龍樹以為聲聞經中言法住者亦是諸法如如義以所入未深故而生滅度之想謂證涅槃然生死涅槃是相待法若知生死從本際已來常自如涅槃相復待誰故説為涅槃是故一切法畢竟非實非虛非如非異中論亦云涅槃之實際及與世間際如是二際者毫釐無別以無差別故一切法無怨對無怨對故無執持無執持故亦無如如解脫也已上私會涅槃者説真如理即是妙法蓮華亦是大般涅槃復次約祕密妙法者三昧契經云如義語者實空不空空實不實離於二相中間不中不中之法離於三相不見處所如如如説故文是則如義極妙獨尊教法也他上字門一切法住處不可得故兩部大經稱他上字時是勢力進無畏聲文殊問唱他上聲字時出勢力無畏聲大莊嚴娑他上二合字印者顯示勢力不可得故守護國經是勢義他者名愚癡義衆生流轉生死纒裹如蠶蜣蜋大涅槃稱他上字時入真如無差別般若波羅蜜門悟一切法處所不可得故四十二字門咃字門入諸法處不可得故大品若聞他字即知四句如去不可得多陀阿伽陀秦言如去大論唱他音他可切字時入般若波羅蜜門名真如平等藏華嚴清涼大疏云他字即是處所生鈔云會者真如平等是所依處出生一切終歸此故智論云如上引如去即是處所如來時去故已上大日疏云他字門一切諸法住處不可得故者梵音薩他娜是住處義亦是住義如人從此住處升上其處其所依處所説名為住諸賢聖地位亦如是約諸行道人心迹所依所止息處故説種種名若見他字時即知一切諸法無不待緣成故當知悉有所依住處是為字相然諸法本來不生乃至如如解脫亦不可得則無去無來無行無住如是寂滅相中當有何次位耶復次入多字門時了知諸法皆空故不住生死中即此如如亦不可得故不住涅槃中爾時行處盡息諸位皆盡遍一切處的無所依是名以不住法住於如來大住也私會者勇進勢力無住處故愚癡故住著生死苦處去則此無住處住則彼無去處是緣生故無所住而住其心是表德實義也餘如清涼那字門一切法施不可得故兩部大經稱娜字時是施調伏律儀寂靜安隱聲文殊問唱陀上字時出施戒質直聲大莊嚴陀者名曰大施所謂大乘是故名陀大涅槃疏三云即是乘義道義陀亦一切法門陀者性能調伏一切法性大集拏上字印者悟入清淨十力門故守護國經云十也陀字門諸法善心生故亦施相故大品若聞陀字即知一切法善相陀摩秦言善大論稱娜字時入不退轉加行般若波羅蜜門悟一切法調伏寂靜真如平等無分別故四十二字門唱柁音輕呼字時入般若波羅蜜門名不退轉方便華嚴清涼疏云柁字悟一切法調伏寂靜真如平等無分別故方為不退轉方便鈔引智論會曰調伏寂靜真如平等善之極也已上大日疏云娜字門一切諸法施不可得故者梵云檀娜是捨施義若見娜字即知一切諸法皆是可捨相所以者何以一切法離合在緣無有堅住若於中執著生愛必為所焚乃至十地諸菩薩於自地所生淨妙功德未到捨彼岸故猶有不思議退失不名第一安樂處今觀諸法不生故施者施處及所施物皆悉本來不生乃至一切法無住處無住處故即此三事亦無住處是故佛坐道場都無所得亦無所捨於虛空藏中無所蘊積而普門流出遍施群生是名見檀實相亦名具足檀波羅蜜又如來祕寶之藏皆是法然所得不可授人若施他時還就衆生心室中開出之耳是故經云一切諸法施不可得名為字門真實義也若會諸義者施戒質直是善之行是善是行調伏律儀是則戒行復次施則有取有取有捨凡夫之行不取遮不捨表則佛地之行不二中道真第一義然則實相者是理智一體摩尼圓滿金剛妙體仰覺薩埵不可不思馱字門一切法界不可得故兩部大經法也界也又分也體也性也稱馱字時是七聖財聲文殊問唱陀字時出希求七聖財聲大莊嚴財也彈者南云重音陀稱讃功德所謂三寶如須彌山高峻廣大無有傾倒是故名彈大涅槃曇亦一切法門曇者於法界中不生分別大集馱字門入諸法性不可得故大品若聞馱字即知一切法中法性不可得馱摩秦言法大論馱字印者法界體性不雜亂故守護國經稱馱字時入觀察法界道場般若波羅蜜門悟一切法能持界性不可得故四十二字門唱柁字時入般若波羅蜜門名觀察簡擇一切法聚華嚴清涼大鈔云經云揀擇法聚即能持界性法聚差別即是界義各各持自性也智論云如上引大日疏云馱字門一切諸法法界不可得故者梵云達摩馱都名為法界界是體義分義佛之舍利亦名如來馱都言是如來身分也若見馱字門即知一切諸法悉皆有體謂以法界為體所以者何若離諸法實相則一切法體義不成故夫法界者即是心界以心界本不生故當知法界亦本不生乃至心界無得無捨故當知法界亦復無得無捨捨尚自無無法可捨況可得乎若法界是可得相者即是從衆因緣生若衆因緣生當知自無本體何況為諸法體故法界者唯是自證常心無別法也復次如來大施者所謂大悲漫荼羅法界者即是普門實相如是實相不可以加持神力示人是故無法可得已上同十七云馱囉持也已上同第十云馱迦光威也已上大佛頂陀羅尼云馱囉抳地也已上若會諸義則七聖財者信戒聞捨慧慚愧豈非法之支分乎三寶是法之分界堅實體性無有傾動地是堅性能持萬法性然威光光即法界曩字門一切法名不可得故金剛頂稱曩字時是遍知名色聲文殊問唱那字時出遍知名色聲大莊嚴那者三寶安住無有傾動喻如門閫是故名那涅槃娜字印者名色性相不可得故守護經那字門諸法離名性相不得不失故大品若聞那字即知一切法不得不失不來不去那秦言不大論稱曩舌頭呼字時入無阿賴耶際般若波羅蜜門悟一切法性相不可得故四十二字門唱那字時入般若波羅蜜門名得無依無上華嚴清涼疏云五那者諸法無有性相言説文字皆不可得謂性相雙亡故無所依能所詮亡是謂無上鈔云普曜云其言不者出不隨衆生離名色之音故涅槃云如上引釋曰真實三寶永離名相略鈔大日疏九云曩忙勿也不也曩演道也曩無也同十云難陀是觀義也同五云娜伽龍也瑜祇經云那麼是名字也私釋大日疏以字為大空證處若約字相即顯空絶名相不得不失無來無去是則空觀亦即絶相大道無所依故不應傾動勿取勿念是遮情極理也若就字義即祕一切名教本不生故不出字名是真言總持之體空彰空名無盡無字凡諸法體無不容名以之為性為相以之為觀為道名言即體別無所依名詮是法不可外得不可他失不自彼來不從此去若能如是即名了旨即色悟心此曰一切遍知之人亦名自然智大龍也大日疏云直以真言為乘超入淨菩提心門豈非名字即真心乎跛字門一切法第一義諦不可得故兩部大經稱跛字時是勝義聲文殊問唱波上聲字時出證第一義諦聲大莊嚴跛字印者勝義諦門不可得故守護經波者名顛倒義若言三寶悉皆滅盡當知是人為自疑惑是故名波涅槃波字門一切法第一義故大品若聞波字即時知一切法入第一義中波羅末陀秦言第一義大論稱跛字時入法界際般若波羅蜜門悟一切法勝義諦不可得故四十二字門唱波字時入般若波羅蜜門名普照法界華嚴清涼疏云三波者五字經云亦無第一義諦諸法平等謂真俗二諦雙亡是真法界諸法皆等即是普照鈔云大般若言跛者一切法勝義教放光云跛者諸法泥洹最第一義釋曰上諸經皆獨明第一義但是所遣唯金剛頂云跛者第一義不可得則具般若相矣故疏云謂真俗雙亡下會經前二字以第一義遣俗今亦無第一義則復遣真為雙亡真俗是真法界上即所照從諸法皆等下合普照義已上波者即第一義大集大日疏八云鉢喇麼二合山也鉢怛羅二合葉也大佛頂云白也鉢囉二合他上門最初也鉢囉二合社難引諸衆生也鉢囉二合嚩囉勝法也鉢囉二合嚩殊勝也鉢𭌆勿㗚圍繞也跛尾怛二合吉義也同九云鉢吒瞙也鉢囉二合底嚩像也鉢囉二合迦引奢也開示也鉢囉二合勃哩二合𫪭已後也同十七云鉢囉解脫也金剛頂略出經云播波罪障也跛寧執也大疏云手掌也鉢娜麼蓮華也鉢囉底得也鉢羅二合畝儞耶喜也鉢囉枳惹慧也鉢囉娑囉舒也波那飯也鉢囉到也鉢囉底車授也跛捨索也播娜足也大隨求中云跛左煮也播引攞野護也鉢囉二合迦去引囉牆也大疏云異類也鉢囉二合婆光也大日疏十三云婆盧普也鉢囉底訶帝害也礙也鉢囉補多至也得也跛梨補囉迦滿足也同七云波字門一切諸法第一義諦不可得故者梵云波羅麼他翻為第一義或云勝義薩底也此翻為諦諦義於娑字門説之今此波字門正明第一義相龍樹云第一義名諸法實相不破不壞故復次諸法中第一名為涅槃如阿毗曇云云何無上法謂智緣盡智緣盡即是涅槃若見波字即知一切法不離第一義第一義不離諸法實相是為字相若字門真實義者第一義亦不可得何以故無愛無著故智論又云以衆生著涅槃音聲而作戲論若有若無以破著故説涅槃空是名第一義空不破聖人心中所得以聖人於一切法中不取相故復次一切法皆入平等法界則無高下豈欲令無生法中有勝劣相耶是故第一義不可得也私釋云清涼以不可得為般若相雙亡真俗是真法界猶是滯遮情觀門矣金剛頂云不可得是約表德實義謂諸法本不生則何為第一何為第二故第一義亦不可得也復次諸法平等無高下故諸法悉皆第一義是曰第一義外一法不可得矣頗字門一切法不堅如聚沫故兩部大經稱頗字時是得果作證聲文殊問唱頗字時出得果入現證聲大莊嚴頗字印者周遍圓滿果報體故守護經頗者是世間災若言世間災起之時三寶亦盡當知是人愚癡無智違失聖旨是故名頗涅槃頗字門入諸法邊不可得故大品若聞頗字即知一切法因果空故頗羅秦言果大論稱頗字時入成就一切衆生際往詣道場般若波羅蜜門悟一切法遍滿果報不可得故四十二字門唱娑蘇紇切頗字時入般若波羅蜜門名化衆生究竟處華嚴清涼疏云娑頗字即遍滿果報鈔云別譯但云頗字若會經者化生究竟方為遍滿果報私解報身是度生最勝主大日疏云頗字門一切諸法不堅如聚沫故者梵云沛奴譯云聚沫如大水中波濤鼓怒相激而成聚沫有種種相生乃至固結相持遂有堅用然從麁至細一一觀察只是緣復從緣不可撮摩都無實性至其本際則舉體是水都無所生今世間種種五陰亦復如是今攝末歸本去丈就尺觀之乃至如絲忽之際介然微動皆是展轉從緣若是從衆緣生則無自性若無自性當知是生即不生至於本不生際但是心性海耳而隨六趣妄情遂有世界之目夫心性海者即是法界法界者即是勝義涅槃若能如是見時雖復洪波震蕩作種種普現色身亦不壞澄清之性也已上釋曰因果性空則不堅固往詣道場得果時處三災起世間滅壞不堅三寶常住無有變易堅固者猶是堅與危脆相對故未表德玄旨若徹不生極際則無堅無脆泡沫即金剛輪故是為字實義亦為果地極談矣麼字門一切法縛不可得故兩部大經稱麼字時是解脫繫縛聲文殊問唱婆上字時出解脫一切繫縛聲大莊嚴婆者名佛十力是故名婆涅槃明覺曰縛也力也麼字印者力及菩提分皆清淨故守護國經婆者修八正道大集若聞婆字即知一切法無縛無解婆陀秦言縛大論婆字門諸法婆字離故大品稱麼字時入金剛場般若波羅蜜門悟一切法離縛解故四十二字門唱婆音蒲我切字時入般若波羅蜜門名金剛場華嚴演義鈔云會經如佛入金剛三昧斷如金剛或在金剛場則無縛解為真斷如智論云如上引麼字門一切諸法縛不可得故者梵云滿馱此翻為縛如人為縷紲所拘不可得動轉是縛義若以方便解是結時則名解脫若離身繩無別縛解法如天帝釋以微細縛縛阿修羅王置忉利天上起念欲還時五縛已在其身若息念時縛自除解若波旬羂網復過於此百千倍數何況業煩惱無為縛等耶以要言之若離諸因緣不墮諸法數者乃謂無縛是為字義中論云離五陰別有衆生者則應以五陰縛衆生而實離五陰無衆生若離五陰別有煩惱者別應以煩惱縛五陰而實離五陰無別煩惱以如是等種種因緣當知無縛無縛則無解無縛解故涅槃即生死生死即涅槃如觀縛解品中廣説復次若諸法本來不生乃至如聚沫者是中誰為能解誰為所縛是故諸縛不可得也釋云如來十力離諸縛故八正道者約位則初果初地離我縛故婆重字門一切法有不可得故兩部大經稱婆去字時是出三有聲文殊問唱婆字時出斷一切有聲大莊嚴滼南云重音婆者名為重擔堪任荷負無上正法當知是人是大菩薩是故名滼涅槃婆字印者慣習觀察覺悟體故守護經婆字門入諸法破壞不可得故大品若聞婆字即知一切法不可得破相婆伽秦言破大論稱婆引去字時入一切宮殿道場莊嚴般若波羅蜜門悟一切法可破壞性不可得故四十二字門唱婆蒲我切字時入般若波羅蜜門名一切智宮殿圓滿莊嚴華嚴清涼疏云圓滿之言不空譯為道場鈔云以梵云曼荼羅通圓滿道場二義故釋曰經中宮殿莊嚴以從緣故亦可破壞以不可得即非莊嚴方為圓滿成般若矣已上一字頂輪王軌説字義云諸法本無壞已上大日疏云婆字門一切諸法一切有不可得故者梵云婆嚩此翻為有有謂三有乃至二十五有等若見婆字即知一切諸法皆悉有因緣衆緣合故説名為有無決定性所以者何若法定有有相則終無無相是則為常如説三世者未來中有法相是法來至現在轉入過去不捨本相則墮常見若説定有無是無必先有今無是則為斷滅見因是二見故遠離佛法如中論破有無中廣明今觀諸有從緣即是本不生義以本不生故無作無行乃至無縛無脫是故婆字門以從緣有故具足一切字門若具一切字門即是三昧王三昧能破二十五有釋迦牟尼由此義故名為破有法王也已上同十九云或一切法觀無所得婆字形現觀即觀照也以觀照成即有受生處若了本無即無生無觀也已上同七云又婆嚩娜是觀義是故供養法中云婆字門一切法離諸法觀已上同一云薄伽梵者論師所解佛地論具有六義自在熾盛端嚴名稱吉祥尊貴今此宗中薄伽梵是能破義釋論亦云婆伽名破婆名能能破淫怒癡故名婆伽婆復次帝釋聲論謂女人為薄伽是欲求因緣能息煩惱義又是所從生義金剛頂宗即翻此義云女人者即是般若佛母無礙知見人皆悉從是生其有志求因緣得與相應煩惱戲論皆悉永息非如世間欲熱雖少止息而實更增也以密教不可直宣故多有如是隱語學者當觸類思之釋論亦云婆伽言德婆者言有是名有德婆伽名名聲婆者言有是名有名聲一切世間無有德名聲如佛者則其義也已上仁王疏下云跋捺囉二合此云賢也已上大日疏五云婆尾屣也二合他得也已上私會涅槃者荷負正法為度三有復能觀察法義觀知機宜故堪任荷擔也莽字門一切法吾我不可得故金剛頂稱莽鼻音呼字時是息憍慢聲文殊問唱摩上聲字時出銷滅一切憍慢聲大莊嚴摩者是諸菩薩嚴峻制度所謂大乘大般涅槃是故名摩大涅槃莽輕呼字印者悟一切法清淨道故守護國經若聞磨字即知一切法離我所磨磨我也迦羅所也秦言我所大論稱莽輕呼字時入大迅疾衆峯般若波羅蜜門悟一切法我所執性不可得故四十二字門唱麼字時入般若波羅蜜門名大流湍激衆峯齊峙華嚴清涼疏云麼字即我所執性我慢高舉若峯齊峙我慢則生死長流湍馳奔激已上大日疏五云磨𡃤伽二合道也摩訶引大也麼伽引奢虛空也麼嵐垢也同九云莽無也莽去瑳上𭌆延慳也同十云麼也體也空也麼努薩麼二合囉憶念也明覺曰憍慢也私會諸義者有我見故必生憍慢慳是我所之甚是我周遍則太虛如能容一切此空則法界體又空與無猶如眼目大我則諸佛妙道見垢則生死險道大乘大般涅槃是諸聖所軌豈非嚴峻制度清淨之道乎世間我能憶念曾所經境法界我又憶念本初之法無有本初則無應憶念之者矣野字門一切法一切乘不可得故兩部大經稱野字時是佛通達聲文殊問唱也字時出通達一切法聲大莊嚴蛇者南云耶是諸菩薩在在處處為諸衆生説大乘法是故名蛇涅槃也字印者稱如實理而演説故守護國經蛇者言善思惟大集夜字門入諸法如實不生故大品若聞夜字即知諸法入實相中不生不滅夜他跋秦言實大論唱也音以可切字時入般若波羅蜜門名差別積聚華嚴稱野字時入差別積聚般若波羅蜜門悟一切法如實不生故四十二字門清涼疏云也字悟如實不生故則諸乘差別積聚皆不可得已上大日疏云野字門一切諸法一切乘不可得故者梵云衍那此翻為乘亦名為道如人乘馭舟車則能任重致遠有所至到若見野字門則知一切衆生以種種因緣趣向生死果報及趣涅槃者各有所乘亦知無量諸乘悉是佛乘名為字相今觀諸法本不生故即是無行無住不動不退是中誰為乘者當乘何法耶復次是乘從三有中出至薩婆若中住若見三有實報即是薩婆若五百由旬無非寶處者欲行何道往詣何處乎是故一切乘不可得乃名摩訶衍道已上此中具釋字義諒惟能乘人所乘法乘因行乘果證同一故一一法各周遍法界然則即能而所全因即果是曰遍一切乘亦名摩訶衍道彌勒大士在于果方名金剛因轉輪即法慈氏是人豈非人法因果一體無二名為廣乘大道耶復次會諸義者諸佛通達如實大道不動此道能説一三五乘及無量乘積聚即蘊所謂八萬四千妙法蘊也行者由聞此如實説故善思惟而行是能所乘也故皆字相名之顯略囉字門一切法離諸塵染故兩部大經稱囉梨假反字時是樂求勝義聲文殊問唱囉字時出厭離生死欣第一義諦聲大莊嚴囉者能壞貪欲瞋恚愚癡説真實法是故名囉涅槃囉字印者以一切法無染著故守護國經羅字門一切法離垢故大品若聞羅字即隨義知一切法離垢相羅闍秦言垢大論稱羅字時入無邊際差別般若波羅蜜門悟一切法離塵垢故四十二字門大日疏云囉字門一切諸法離一切塵染故者梵云囉逝是塵染義塵是妄情所行處故説眼等六情行色等六塵若見囉字門則知一切可見聞觸知法皆是塵相猶如淨衣為塵垢所染亦如遊塵紛動使太虛昏濁日月不明是為字相中論以種種門諦求見法無有見者若無見者誰能用見法分別外色見可見見法無故識觸受愛四法皆無以無愛故十二因緣分亦無是故眼見色時即是涅槃相餘塵例爾復次以阿字門展轉觀察諸塵以其本不生故無造作故乃至無所乘法及乘者故當知所可見聞觸知法悉是淨法界豈以淨法界染汚如來六根耶鴦掘摩羅經以佛常眼具足無滅明見常色乃至意法亦如是是囉字門真實義也已上同十七云落叉見義亦垜義已上同九云𡀩吃鏟二合護也囉乞叉二合亦同喇旨是焰明已上仁王疏云囉怛曩二合寶也囉惹王也金剛頂云囉他二合義利也囉誐愛也釋云字火大種子萬物遇火則成灰塵亦灰是色白則離垢清淨色也又悟塵實相即是法界即塵無塵是為表德字義也又南方火大寶部能出生溫育萬物即是擁護義也又王者南面布政護世為業又寶珠能圓滿衆生義利又火發光焰使見諸物又有塵垢則物有邊際無塵垢則法無邊際矣邏上字門一切法相不可得故兩部大經稱砢字時是斷愛枝聲文殊問唱羅上聲字時出斷一切生死枝條聲大莊嚴羅者南云輕囉名聲聞乘動轉不住大乘安固無有傾動捨聲聞乘精勤修集無上大乘是故名羅涅槃邏字門諸法度世間故亦愛支因緣滅故大品若聞邏字即知一切法離輕重相邏求秦言輕大論稱攞字時入無垢般若波羅蜜門悟一切法出世間故愛支因緣永不現故四十二字門唱邏字時入般若波羅蜜門名離依止無垢華嚴清涼疏云邏字悟一切法離世間故愛支因緣永不現故離世故無依愛不現故無垢鈔云智論云如上引意明有惑為重斷即為輕今不可得亦無輕矣已上攞字印者愛支因緣連續不斷皆不現故守護國經邏字門一切諸法一切相不可得故者梵云邏吃灑此翻為相有人言性相無有差別如説火性即是熱相或言少有差別性言其體相言可識如釋子受持禁戒是其性剃髮割截染衣是其相若見邏字門即知一切法皆悉有相相復二種一者總相謂無常苦空無我相別謂諸法雖無常無我而有各各相如地堅水濕火熱風動等捨為施相不悔不惱為持戒相心不變異為忍相發勤為精進相攝心為禪相無所著為慧相能成事為方便相織作生死為世間相無織為涅槃相等今觀有為無為法體性皆空此相與誰為相耶如中論三相品及十二門中廣説復次淨法界中百六十心等種種諸相本不生則無造作無造作故乃至畢竟無塵無塵故離一切相以離一切相故名為諸佛自證三菩提也日疏同五云邏婆引利也同十云羅入陀獲也證也得也明覺曰枝也輕也私會諸義者性如根如幹相如枝如條幹重枝輕輕如鴻毛便能傾動愛支則煩惱現行必彰其相望之種子猶如枝之於幹也貪愛則世間之本著相之者不能離世即相無相世又不縛垢又不汚是為第一之利是為真實證獲又名當相即道亦曰即俗而真矣問即相無相其義幽邃其窮微妙後進末學叵輒窺窬請更詳之答常途顯乘撥却諸相唯存理性曰之無相法華説妙法又言諸法從本來常自寂滅相又言常寂滅相終歸於空華嚴談情盡體露又判果分不可説禪家示實際理地不立一法純是一般更無異路密宗所談非斯寂絶無相所謂無盡者無相之別名者也謂世間凡夫多滯著境故唯取一相不知諸相之宛然也假令如怨我之人癡人唯思之違境雖然剋體覓尋則非唯違相謂為彼之妻夫也為彼之父子也為彼之子父也為兄弟也為弟兄也姪之伯叔也伯叔之姪也乃至為祖曾高為孫曾玄豈非怨體即親乎又如彼怨人為太夫比公卿則為賤比士及商農則為貴又如彼怨人聞一知十比聞一知一為賢比聞一知百千為愚如斯則賢愚貴賤怨親等之諸相統具一身豈唯此乎哉因果自他常無常等僉集一人豈執之怨耶復次約隱顯論之則生界顯而佛界隱有為行而無為藏是猶約迷見若據佛知見則常現起故萬像歷然各具衆相不論能具所具而能所宛爾如此之相相相法然都絶因緣是則無相不具故云無相常途教禪所珍無相是我無相之中空之一相此字字相也自家所談無相諸法明明不存取捨此曰不可得即字字義也惜乎末法濁世密侶或將遮情頑空渾淆表德無相謂空有齊致禪密同品是執琨瑤混碔砆以江河同溟浣本不生之實義於茲墜地何在彼知道之族乎若自宗以絶空為宗者五部灌頂儀式三密瑜伽軌則金剛頂并相應經三十七尊所作事業果同兒戲也謹勸後學祕密上乘非情量之所能測焉此故必經稟承信而方入然彼寂滅之徒不詳祖承信心胡説奚足規模冀諸末學欽承祖訓直入法界必勿迂回嚩字門一切法語言道斷故兩部大經稱嚩無可反字時是最上乘聲文殊問唱婆字時出最上乘聲大莊嚴明覺曰勝也啝者如來世尊為諸衆生雨大法雨所謂世間呪術經書是故名啝涅槃明覺曰雨也嚩字印者不二之道言語斷故守護國經和字門入諸法語言道斷故大品若聞和字即知一切諸法離語言相和于波反波他秦言語言大論稱嚩字時入普遍生安住般若波羅蜜門悟一切法言語道斷故四十二字門唱縛音房可切字時入般若波羅蜜門名普生安住華嚴清涼疏云十一縛字悟一切法言語道斷故能遍安住已上大日疏云嚩字門一切諸法語言道斷故者梵音嚩却跋名為語言若見嚩字時即知一切諸法不離語言地以是諸法無不有因有緣故若法本來不生則是離諸因緣是故語言道斷復次若法是作相則可宣説無作則語言道斷若虛空相是有相者則可宣説以諸法如虛空相亦復無相是故語言道斷若法有行有遷變有影像則可宣説若無行無遷變無影像則語言道斷乃至諸法若是有相者則可宣説今一切法離一切相故不可表示不可授人是故語言道斷復次無相亦無定相當知一切法即相無相即非相非無相如彼三目不可思議是故語言道斷餘法門例此可知也已上同十云嚩勢多自在也又云嚩囉衣也又云嚩路吉多觀也拔折羅金剛也又云皤囉提與願也勝願也又唯云皤囉願也同九云沫無割反喇哆二合也輪轉也已上私釋最上乘法離語言道是遮情之談旨復次分別聖位以真言教為最上乘真言教法則字字等是也此是文字各吞法界而無餘賸是故等之外更無別法此曰言説不可得實義是表德實談也捨字門一切法本性寂故兩部大經稱捨字時是出信進念定慧聲文殊問唱捨字時出一切奢摩他毗鉢舍那聲大莊嚴奢南云賖者遠離三箭是故名奢大涅槃捨字印者入深止觀皆滿足故守護國經賒字門入諸法定不可得故大品若聞賒字即知諸法寂滅相賒多都餓反秦言寂滅大論稱捨字時入隨順一切佛教般若波羅蜜門悟一切法寂靜性不可得故四十二字門唱奢音尸苛切字時入般若波羅蜜門名隨順一切佛教輪光明華嚴演義鈔云寂靜則順佛教已上奢字門一切諸法本性寂故者梵云扇底此翻為寂如世間凡夫獲少分恬怕之心止息喧動亦名為寂乃至二乘人等永斷諸行輪回得涅槃證亦名為寂然非本性常寂所以然者諸法從本來常自寂滅相三界六道何者非是涅槃無漏智生時復與凡夫何異而今猶於其中作滅度想豈非顛倒耶又若諸法本性寂者於四十二地中何者非是如來地何者非是凡夫地若彌勒菩薩以本性寂故得一生記者一切衆生皆亦應得記若一切衆生於本性寂中不妨修學凡夫事者彌勒菩薩亦應修學凡夫事而今作差別想豈非戲論耶若入奢字門時則知是法平等無有高下常無所動而無所不為故云解脫之中多所容受大般涅槃能建大義皆以此也大日疏七商佉螺也同九商迦羅此云骨鎖因明論疏釋云信進念慧皆從寂定而得增盛故心寂則三毒箭不克入故能入定故吹大法螺骨鎖則行世禪而苦行之形也復次有漏寂定二乘灰斷相宗廢詮談旨三論不可得空法華常寂滅相華嚴情盡體露悉包括斯字本寂是則字相也復次如上世間出世寂滅猶滯著絶離而未及有無一體本宮故云本寂不可得是不二之中遮又一切諸法本來有故不始生不始滅不今動不今靜不新去不新來生則常生滅則常滅動則恆動寂則恆寂長去長來是名本不生又曰本性寂若約聲則字中有聲故是不二之中表是本寂中攝藏萬法無復餘物故云不可得也若就諸尊三摩地則大寂定不動豈非息災息災無異變動豈非大盤石座常生豈非增益常滅豈非降伏常來則鉤召常去則寂災常合敬愛常離降魔又夫恆動則迦樓羅炎吞噉煩惱大龍大智利劍截斷生死重纒恆靜則一目諦視示生佛之不二雙童側侍彰善惡之一如本寂無染之心蓮鮮開頂上不生恆有之意寶宛在髻中如此文殊觀音普賢彌勒例而皆爾惜哉末學膚受棄醍醐而覓牛乳拋摩尼以拾魚珠也灑字門一切法性鈍故兩部大經稱灑字時是制伏六處得六通智聲文殊問唱沙上聲字時出制伏六處得六神通聲大莊嚴沙者名具足義若能聽是大涅槃經則為已得聞持一切大乘經典是故名沙涅槃玄義記云沙者譯云六胡法以六為具足義也已上明覺曰六也沙者遠離一切諸法大集灑字印者六通圓滿無罣礙故守護國經沙字門諸法六自在王性清淨故大品若聞沙字即知人身六種相沙秦言六大論稱灑字時入海藏般若波羅蜜門悟一切法無罣礙故四十二字門唱沙音史我切字時入般若波羅蜜門名為海藏華嚴清涼疏云沙字悟一切法無罣礙故如海含像鈔云如海含像者會經像之與水不相礙故大品云如上引即內六處為六自在王心海湛然不礙見聞覺知猶如湛海不礙像故已上大日疏云沙字門一切諸法性鈍故者若梵本存質當云性同於頑明覺曰翻梵語云師羅者頑也頑謂猶如木石無所識知無觸受之義所云同者是興喻之言非一向即同於彼也又大品云般若無知自性鈍故即與此字門義合故飾文者存古譯之辭耳夫自性鈍者即是極無分別心不愚不智不慧無識無智無妄無覺乃至一切諸法不能動搖但是一純固金剛地耳所以然者如世間人以取捨不忘故尚智慧而棄愚癡尊涅槃而賤生死而今一概本不生乃至一概本性寂則誰利誰鈍耶如彼金剛利刃以對不堅物故以偏用一邊故則名為利若令所向之處悉是金剛舉體皆圓不可偏用則利相同歸於鈍矣釋云六神通者六根清淨見聞嗅嘗觸知不復壅滯是通義也天然慧性以為之體故名神矣而今六根一概鋭利則還同於鈍焉復次祕釋者六自在王者則是六大眼空耳水鼻風舌火身地意識此是六大普遍於一切有情非情作自在王六大猶如埏埴六根喻似瓶瓫此六大平等遍故無可不可故疏以一概本不生釋自性鈍也本不生與六大名異體同學者知之娑上字門一切法一切諦不可得故兩部大經一切也諦也稱娑上字時是現證一切智聲文殊問唱娑字時出現證一切智聲大莊嚴一切智也娑字印者悟四真諦皆平等故守護國經娑者為諸衆生演説正法令心歡喜是故名娑涅槃字蓮部觀音即法也唯識疏云舊云喜已上娑字門入諸法時不可得故大品時也若聞娑字即知一切法一切種不可得娑婆秦言一切大論稱娑上字時入現前降霔大雨般若波羅蜜門悟一切法時平等性不可得故四十二字門唱娑音蘇我切字時入般若波羅蜜門名降霔大雨華嚴演義鈔云智論云如上引論云一切種智故普曜云其言智者出智慧不壞音涅槃云如上引意明種智應時而説亦不可得故今經名降注大雨也已上娑字門一切諸法一切諦不可得故者梵云薩跢也二合此翻為諦諦謂如諸法真相而知不倒不謬如説日可令冷月可令熱佛説苦諦不可令異集真是因更無異因因滅則果滅滅苦之道即是真道更無餘道復次涅槃云解苦無苦是故無苦而有真諦餘三亦爾乃至分別四諦有無量相及一實諦如聖行品中説之是為字門之相然一切法本不生乃至畢竟無相故語言斷故本性寂故自性鈍故當知無見見苦無斷斷集無證證滅無修修道如是見斷證修悉是不思議法界亦空亦假亦中不實不妄無定相可示故云諦不可得中論四諦品中亦廣辨其義也日疏同五云薩他二合攝也同八云薩正也妙也塞吃㗚三合作也同九云娑嚩三合自身也薩怛二合多諸有也薩喇瞞二合所作也三昧耶是平等義是本誓義是除障義是警覺義娑摩是等義同十云三曼多等也即普遍也娑是不動義又堅也又諸漏也薩頗二合吒也殘害破障娑麼二合囉憶念也三婆嚩生也同四云娑嚩訶是警覺義祕藏記此外出四義謂究竟圓滿成就散去也同十三云三補吒此云虛心娑嚩婆嚩自性也薩嚩他遍也普也薩嚩囉言音也薩埵衆生也薩嚩自也理趣釋經云三昧耶者名為本誓亦名時亦名期契亦為曼荼羅之異名已上大日疏一云薩埵名衆生或名勇心又云此索多者是忍樂修行堅持不捨義也又七云娑哆是著義是故供養法中云娑字門一切諸法無染著已上華嚴大品等四十二字門中有字下合於餘字今悉附于此是準大日疏所言下引稱娑嚩二合字時入念一切佛莊嚴般若波羅蜜門悟一切法安隱性不可得故四十二字門大品云簸字大論云濕波字又云無義故不釋華嚴云唱鎖字時入般若波羅蜜門名念一切佛莊嚴演義鈔云若會經者念佛莊嚴是安隱故已上濕嚩二合字印者煩惱所行皆遠離故守護國經稱娑䫂二合字時入摧諸煩惱清淨光明般若波羅蜜門悟一切法任持處非處令不動性不可得故四十二字門唱娑蘇紇切多上聲呼字時入般若波羅蜜門名蠲諸惑障開淨光明華嚴清涼疏云娑多字即任持處非處令不動性惑障為非處開淨光明為其處已上大品云哆字門入諸法有不可得故演義鈔云智論云若聞娑多字即知諸法邊不可得以阿利迦多度求那秦言是事邊不可得釋曰以大品云多字門諸法有不可得故論為此釋以有即有邊必對無故有是妄惑故為非處以為有邊無是真空故名為處以為無邊惑智雙絶即不可得已上娑上多也阿四合字印者遠離昏沈懈怠障故守護國經稱娑麼二合字時入現見十方諸佛旋般若波羅蜜門悟一切法可憶念性不可得故四十二字門大品云魔字華嚴云唱娑蘇紇切麼字時入般若波羅蜜門名隨十方現見諸佛演義鈔云智論云若聞濕渺字即知諸法堅牢如金剛石義以阿濕渺秦言石故釋曰意明專念堅牢我心匪石不可轉也亦不可得已上娑莽二合字印者念不散動無忘失故守護國經稱多娑二合字時入一切功德海趣入修行源底般若波羅蜜門悟一切法勇健性不可得故四十二字門唱縒音七可切字時入般若波羅蜜門名修行趣入一切功德海華嚴演義鈔云若會經者勇健方能修入功德智論云若聞縒字知一切法無慳無施以末縒羅秦言慳故釋曰無慳最勇健施為行首勇而能行故偏説耳已上守護國經云娑哆二合字印者勇猛驅逐諸惑體故已上私釋云諦是所證一切智是能證音聲則能演教法則所説智能知時非時佛之言教為降霔法雨若住本不生際則能所一際無殊無異是為普遍法界自性然則十界都是曼荼羅故衆生即菩薩又即佛莊嚴是為自他平等最安隱極歡喜信解此理名勇鋭無惑大度量人復次若約字相則自數論二十五諦勝論六諦以至聲聞四諦大乘三諦空假中二諦真俗一諦一實皆攝斯字如此諸諦悉是實有邊又遮情方便未契有無一體表德故云一切諦不可得復次一切諸法本來有故諦實不錯此諦之外無復別法故云諸法諦不可得是表德顯實之玄旨也賀字門一切法因不可得故兩部大經稱賀字時是害煩惱離欲聲文殊問唱呵字時出永害一切業煩惱聲大莊嚴訶者名心歡喜奇哉世尊離一切行怪哉如來入般涅槃是故名訶涅槃賀字印者摧惡進善體皆離故訶婆上二合字印者可以呼召請命體故守護國經字是界字是緣也火字門入諸法喚不可得故大品若聞火字即知一切法無音聲相火夜秦言喚來大論稱訶嚩二合字時入觀察一切衆生堪任力遍生海藏般若波羅蜜門悟一切法可呼召性不可得故四十二字門唱訶婆訶婆二字皆上聲呼字時入般若波羅蜜門名觀察一切無緣衆生方便攝受令出生無礙力華嚴清涼疏云訶婆字即可呼召性無緣召令有緣故係是八轉中呼聲也大日疏云訶字門一切諸法因不可得故者梵云係怛嚩即是因義因有六種及因緣義中因有五種如阿毗曇廣説若見訶字門即知一切諸法無不從因緣生是為字相以諸法展轉待因成故當知最後無依故説無住為諸法本所以然者如中論以種種門觀諸法因緣悉不生故當知萬法唯心心之實相即是一切種智即是諸佛法界法界即是諸法之體不得為因也以是言之因亦是法界緣亦是法界因緣所生法亦是法界前説阿字門從本歸末畢竟到如是處阿字從本不生生一切法今亦以無因待為諸法因終始同歸則中間旨趣皆可知矣已上金剛頂云訶娑笑也笑聲也又喜也私釋云害煩惱離欲因不可得故摧惡進善是皆行因也以呼召而顯法體故名則因也因緣所生皆是法界即諸法本不生真勝義諦也若徹見勝義則心大歡喜是名佛乘初地即菩提心為因也又菩提心即字字是一切名言之本體依名教故摧惡進善又自宗實義人即法故名即實體人之本體是息風風即字無邊深義更俟面囑乞叉二合字門一切法盡不可得故金剛頂稱乞灑二合字時是一切文字究竟無言聲文殊問唱差字時出諸文字不能詮表一切法聲大莊嚴荼者南云羅來家反名曰魔義無量諸魔不能毀壞如來祕藏是故名荼復次荼者乃至示現隨順世間有父母妻子是故名荼涅槃乞叉二合字印者入於盡智無生智故守護國經叉字門入諸法盡不可得故大品若聞叉字即知一切法盡不可得叉耶秦言盡大論稱訖灑二合字時入決擇息諸業海藏般若波羅蜜門悟一切法窮盡性不可得故四十二字門唱叉楚我切字時入般若波羅蜜門名息諸業海藏華嚴演義鈔云若會經者業海深廣無不包含非是無為終竟須盡已上私釋云字二合攝諸作業歸自性鈍是盡竟也而自性無盡故盡不可得復次文字盡竟不能詮法實體是常途名事互為客之談也文字直實相此外無有別法自宗玄旨也又名相盡故諸魔不毀隨順世間則盡世邊又為息他業海也復次體文三十三字始自作業字終於因業字字居最末表作業海風濤止息也又二合則業止歸寂也三合論者問何故諸經所説字義如斯殊異答或約遮表或就相義或據名言異故如此不同大日疏云復次一切名言中有阿聲者悉入阿字門有迦聲者悉入迦字門乃至有訶聲者悉入訶字門是故一字門中具無量義非從訶字門中但有無因義也餘字門當知例爾且如娑哆也是諦義是故經云娑字門一切諸法諦不可得又娑哆是著義是故供養法中云娑字門一切諸法無染著又如婆嚩是有義是故經云婆字門一切諸法有不可得又婆嚩娜是觀義是故供養法中云婆字門一切法離諸法觀餘皆放此所以大品經及華嚴入法界品皆説四十二字門涅槃文字品文殊所問經大集陀羅尼自在王品各釋悉曇字母與此經所説其義或異或同若得此意則諸經冷然懸會無所違妨也已上請看此釋一具無盡昭昭無疑復次無邊字義皆不出本不生此故會則歸于一揆問上相義分別之中及字義釋文明不可得也雖然情解劣鈍多眩碧盧冀重分辨答韙矣斯問多有利益今據的傳之宗旨任愚衷之了解以吐露蓄念之一二夫同説不可得有顯略有祕密密之中又有遮空有表有雖云遮表而實體一不生初顯略者寂滅絶離以説不可得是也此猶因分遣迷之談未是果上直示之義諸顯經中字義云不可得皆屬此分間有涉密唯是義逐機根而顯耳次密中遮表者且如字言説不可得義者本不生法體諸法本有故非諸生滅斷常空有等言之所能及是為不二中遮真如寂絶而離言説則顯略不可得而此種種名言本來不生故能詮表法體聲字即實相是為不二中表此中更有無窮深旨更問此是遮表不二名本不生又曰不可得故大日疏云復次一一字門皆言不可得者為明中道義故今且寄車字門説之如觀鏡中面像以本質為因淨鏡為緣有影像現見是為所生之法從凡見且云緣生而實法爾妍媸之相現前不謬故名為有以種種方便推求都不可得是名為空此有此空皆不出鏡體體即一名中三相不同而同不異而異是故世間論者不能思議今真言門亦爾以觀心為因三密為緣普門海會現前不謬故名為有以種種門推求都不可得是名為空此有此空皆不出法界故説為中三諦不同而同不異而異一切方便乘人不能思議餘法門例皆如此不可遍舉也已上同疏三云空則畢竟不生有則盡其性相中則舉體皆常已上字三諦其義如此顯兩一乘所言三諦者寂滅無相理上建立三諦謂事法緣生故剋體都無自性名空雖空而隨緣暫有名假雖假有而空雖空而假有名中又空假不二故一念不生名中是故此中道以空為體故空中二諦二而無二雖誇事理融即而實理寂事動故究竟論之事理逈隔顯密殊異以之知之遮表殊異不須筆盡惟俟而罄四旋轉者釋凡八種大日疏云復次此中旋陀羅尼字輪相者謂以一字釋一切字義一以一切字釋一字義二以一字義成立一切字義三以一切字義成立一字義四以一字義破一切字義五以一切字義破一字義六如一字一切字者逆順旋轉例此可知云何以一字釋一切字如釋迦字時但以種種因緣觀本不生即見無所作義乃至釋訶字時亦以種種因緣觀本不生即見無因義云何以一切字釋一字如釋阿字門時以種種因緣觀無造作即見本不生義乃至以種種因緣觀諸法無因即見本不生義餘字例爾當廣説之云何一切字成立一字謂一切法本不生以無作故如虛空無相故無行故無合故乃至無因故云何一字成一切字謂一切法無作以其本不生故乃至一切法無因以其本不生故云何以一切字破一字如人執諸法有本有生應破彼言若諸法離於造作而云有生者是義不然乃至若諸法因不可得而云有生者是義不然云何一字破一切字如人執有造作應破彼言若諸法本不生義已成立而云有作是義不然乃至執有因者亦破彼言若諸法本不生義已成立而云有因是義不然云何逆順旋轉所謂若法本來不生則無造作若無造作則如虛空無相若如虛空無相則無有行若無有行則無有合若無有合則無遷變乃至若無因者當知法本不生是名為順若法無因則諦不可得若諦不可得則自性鈍若是自性鈍者當知本性寂若本寂者當知無相乃至若本不生者當知無因如是八種義門自在旋轉説之乃至又一一門當約真言住心品中淺深之相次第分別以字門轉故義亦不同以是義故能出生百千萬億旋陀羅尼也已上若據十六玄門此外有一字攝多多字歸一二科也又若就五字門釋旋總持則字本不生故不可以言宣字言語路絶故更無應起煩惱塵垢字無塵垢故無造因業字無因緣故如虛空亦不可得字是為順旋轉逆旋轉者如虛空相尚不可得字況有新起因業字因緣亡故煩惱塵垢亦不起字內心客塵無故外妄言語亦絶字言詮絶即是本不生字也復次約順旋轉者凡因緣之法必有對比字遠離於因緣故無有對比之法無對則無自他高下無高下故憍慢不可得字憍慢亡故生佛自他一如平等而入本不生際本不生則無有造作字無造作故離空假中是故三諦了義亦無有自性字無空假中故離無常遷變字是為順旋若逆旋則無有遷變則本不生際字本有諸法離因緣故絶空假中字了義三諦亡故無有造作起動字無造作是各具萬德無高下異是名無上正等正覺字無對故因緣皆入本不生際字本不生何六大一實六大之體含蓄諸法無有遺餘是故生佛一如自他不二大愛大染非凡夫迷執貪愛是名大愛染三摩地也復次約字而釋者經云觀念於一字思惟其字義諸法本無壞無塵亦無染清淨如虛空清淨如空故一切法無壞諸法不壞故一切法本淨諸法本淨故一切法無染諸法非染故空淨不可得已上謂三有是可破壞法字三有不可得故常恆不壞諸法常住本不生故無有生滅斷常等迷妄塵垢字本淨無垢即是無染點也損減增益皆染汚故無染汚故清淨如虛空空點即字也清淨如空故無可破敗字是順旋如前然將終字又旋接初字凡經疏等説多以如此師説逆順皆次第也後生知之凡生無窮慧則必由真言字義字義則旋總持為最也惜乎末季有教無行有稟無智以故密徒或淫禪學以豁達頑空同不生妙有恐後學生莽莽蕩蕩有撥因果余雖愚陋抑忍而不克辨哉三密鈔卷下下終
